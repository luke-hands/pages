<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Luke Hands — personal site. Something is coming soon.">
<title>Luke Hands — Coming Soon</title>
<style>
  :root {
    --bg: #07080f;
    --fg: #e8eaf2;
    --muted: #8a90a6;
    --accent-1: #7c6cff;
    --accent-2: #46c8ff;
    --accent-3: #ff6ec7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--fg);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  canvas#sky {
    position: fixed;
    inset: 0;
    display: block;
  }

  /* soft colour glow behind the content */
  .glow {
    position: fixed;
    left: 50%;
    top: 50%;
    width: 70vmax;
    height: 70vmax;
    transform: translate(-50%, -50%);
    background:
      radial-gradient(closest-side, rgba(124, 108, 255, 0.14), transparent 70%),
      radial-gradient(closest-side at 35% 60%, rgba(70, 200, 255, 0.10), transparent 70%),
      radial-gradient(closest-side at 65% 40%, rgba(255, 110, 199, 0.07), transparent 70%);
    filter: blur(10px);
    pointer-events: none;
    animation: breathe 9s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
    50%      { opacity: 1;   transform: translate(-50%, -50%) scale(1.06); }
  }

  main {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    gap: 1.4rem;
  }

  .eyebrow {
    font-size: 0.8rem;
    letter-spacing: 0.45em;
    text-indent: 0.45em; /* balance the tracking so text stays centred */
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0;
    animation: rise 0.9s ease-out 0.2s forwards;
  }

  h1 {
    font-size: clamp(2.6rem, 9vw, 6.5rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    background: linear-gradient(100deg, var(--fg) 20%, var(--accent-2) 45%, var(--accent-1) 60%, var(--fg) 85%);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    animation: rise 0.9s ease-out 0.35s forwards, shimmer 7s linear 1.5s infinite;
    opacity: 0;
  }

  @keyframes shimmer {
    0%   { background-position: 0% 0; }
    100% { background-position: -200% 0; }
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .type-line {
    min-height: 1.6em;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: clamp(0.95rem, 2.6vw, 1.25rem);
    color: var(--muted);
    opacity: 0;
    animation: rise 0.9s ease-out 0.55s forwards;
  }

  .type-line .prompt { color: var(--accent-2); }
  .type-line .typed  { color: var(--fg); }

  .cursor {
    display: inline-block;
    width: 0.55em;
    height: 1.15em;
    margin-left: 2px;
    vertical-align: text-bottom;
    background: var(--accent-1);
    animation: blink 1.1s steps(1) infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  .links {
    display: flex;
    gap: 1rem;
    opacity: 0;
    animation: rise 0.9s ease-out 0.75s forwards;
  }

  .links a {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.65rem 1.25rem;
    border: 1px solid rgba(232, 234, 242, 0.18);
    border-radius: 999px;
    color: var(--fg);
    text-decoration: none;
    font-size: 0.9rem;
    background: rgba(232, 234, 242, 0.04);
    backdrop-filter: blur(6px);
    transition: border-color 0.25s ease, background 0.25s ease, transform 0.25s ease;
  }

  .links a:hover {
    border-color: var(--accent-1);
    background: rgba(124, 108, 255, 0.12);
    transform: translateY(-2px);
  }

  .links a svg { width: 18px; height: 18px; fill: currentColor; }

  footer {
    position: fixed;
    bottom: 1.25rem;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    opacity: 0;
    animation: rise 0.9s ease-out 1s forwards;
    z-index: 1;
  }

  @media (prefers-reduced-motion: reduce) {
    .glow, h1 { animation-iteration-count: 1; }
    .eyebrow, h1, .type-line, .links, footer {
      animation: none;
      opacity: 1;
      transform: none;
    }
    .cursor { animation: none; }
  }
</style>
</head>
<body>
<canvas id="sky" aria-hidden="true"></canvas>
<div class="glow" aria-hidden="true"></div>

<main>
  <p class="eyebrow">Coming soon</p>
  <h1>Luke Hands</h1>
  <p class="type-line" aria-live="polite">
    <span class="prompt">$&nbsp;</span><span class="typed" id="typed"></span><span class="cursor"></span>
  </p>
  <nav class="links" aria-label="Links">
    <a href="https://github.com/luke-hands" rel="me">
      <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      GitHub
    </a>
  </nav>
</main>

<footer>© <span id="year"></span> Luke Hands</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  // --- typing effect -------------------------------------------------------
  const phrases = [
    'building something new...',
    'git commit -m "watch this space"',
    'npm run something-cool',
    'deploying soon(ish)...',
  ];
  const typedEl = document.getElementById('typed');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  if (reduceMotion) {
    typedEl.textContent = phrases[0];
  } else {
    let phrase = 0, char = 0, deleting = false;
    (function tick() {
      const current = phrases[phrase];
      char += deleting ? -1 : 1;
      typedEl.textContent = current.slice(0, char);

      let delay = deleting ? 35 : 60 + Math.random() * 60;
      if (!deleting && char === current.length) {
        delay = 2400;
        deleting = true;
      } else if (deleting && char === 0) {
        deleting = false;
        phrase = (phrase + 1) % phrases.length;
        delay = 400;
      }
      setTimeout(tick, delay);
    })();
  }

  // --- constellation background -------------------------------------------
  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');
  const mouse = { x: null, y: null };
  const LINK_DIST = 130;
  let stars = [], width, height, dpr;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const count = Math.min(160, Math.floor((width * height) / 11000));
    stars = Array.from({ length: count }, () => ({
      x: Math.random() * width,
      y: Math.random() * height,
      vx: (Math.random() - 0.5) * 0.18,
      vy: (Math.random() - 0.5) * 0.18,
      r: 0.6 + Math.random() * 1.4,
      tw: Math.random() * Math.PI * 2, // twinkle phase
    }));
  }

  window.addEventListener('resize', resize);
  window.addEventListener('pointermove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  window.addEventListener('pointerleave', () => { mouse.x = mouse.y = null; });
  resize();

  function frame(t) {
    ctx.clearRect(0, 0, width, height);

    for (const s of stars) {
      s.x += s.vx;
      s.y += s.vy;
      if (s.x < -10) s.x = width + 10; else if (s.x > width + 10) s.x = -10;
      if (s.y < -10) s.y = height + 10; else if (s.y > height + 10) s.y = -10;

      const twinkle = 0.55 + 0.45 * Math.sin(s.tw + t / 900);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200, 210, 255, ${0.5 * twinkle})`;
      ctx.fill();
    }

    // faint lines between nearby stars, brighter near the pointer
    for (let i = 0; i < stars.length; i++) {
      for (let j = i + 1; j < stars.length; j++) {
        const a = stars[i], b = stars[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const dist = Math.hypot(dx, dy);
        if (dist > LINK_DIST) continue;

        let alpha = (1 - dist / LINK_DIST) * 0.14;
        if (mouse.x !== null) {
          const mx = (a.x + b.x) / 2 - mouse.x;
          const my = (a.y + b.y) / 2 - mouse.y;
          if (Math.hypot(mx, my) < 160) alpha *= 3;
        }
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = `rgba(124, 140, 255, ${alpha})`;
        ctx.stroke();
      }
    }

    if (!reduceMotion) requestAnimationFrame(frame);
  }

  if (!reduceMotion) {
    requestAnimationFrame(frame);
  } else {
    // one static frame so the page still has its backdrop
    frame(0);
  }
</script>
</body>
</html>
