<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Last Parry</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/joypad.js/dist/joypad.min.js"></script>
    <style>
        :root {
            --bg: #07080f;
            --violet: #7c6cff;
            --cyan: #46c8ff;
            --pink: #ff6ec7;
            --fg: #e8eaf2;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--fg);
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .stats {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        #score {
            font-size: 32px;
            font-weight: 800;
            text-shadow: 0 0 10px var(--cyan);
        }

        #multiplier {
            font-size: 18px;
            font-weight: 600;
            color: var(--pink);
            text-shadow: 0 0 5px var(--pink);
        }

        #best {
            font-size: 14px;
            color: #8a90a6;
            text-align: right;
        }

        #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(7, 8, 15, 0.8);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid rgba(124, 108, 255, 0.3);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: opacity 0.3s;
        }

        h1 {
            margin: 0;
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff, var(--violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hint {
            color: #e8eaf2;
            font-size: 1.2rem;
            font-weight: 500;
        }

        .instructions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            text-align: left;
            margin-top: 0.5rem;
            max-width: 500px;
        }

        .instruction-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .instruction-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--violet);
            font-weight: 700;
        }

        .instruction-text {
            font-size: 0.85rem;
            line-height: 1.4;
            color: #8a90a6;
        }

        .touch-only { display: none; }
        .kbd-only { display: inline; }
        .joy-only { display: none; }

        @media (pointer: coarse) {
            .touch-only { display: inline; }
            .kbd-only { display: none; }
            .instructions {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }

        .joy-connected .joy-only {
            display: inline;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
<style>
  /* --- Back to Gallery Floating Button --- */
  .back-to-gallery {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 99999;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: rgba(7, 8, 15, 0.6);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(232, 234, 242, 0.15);
    border-radius: 999px;
    color: #e8eaf2;
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    pointer-events: auto;
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
  }
  .back-to-gallery:hover {
    background: rgba(124, 108, 255, 0.2);
    border-color: rgba(124, 108, 255, 0.6);
    color: #ffffff;
    box-shadow: 0 0 15px rgba(124, 108, 255, 0.5);
    transform: translateX(-50%) translateY(-1px);
  }
  .back-to-gallery:active {
    transform: translateX(-50%) translateY(1px);
  }
  @media (max-width: 768px) {
    .back-to-gallery {
      top: 15px;
      padding: 6px 12px;
      font-size: 12px;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .back-to-gallery {
      transition: none;
    }
  }
</style>
</head>
<body>
    <a href="../index.html" class="back-to-gallery" aria-label="Back to Gallery">&larr; Back to Gallery</a>

    <div id="ui">
        <div class="stats">
            <div id="score">0</div>
            <div id="multiplier">×1</div>
        </div>
        <div id="best">BEST: 0</div>
    </div>

    <div id="overlay">
        <h1 id="title">LAST PARRY</h1>
        <p class="hint" id="hint">
            <span class="touch-only">Tap anywhere</span>
            <span class="kbd-only">Press Space</span>
            <span class="joy-only">or Button</span>
            to Parry
        </p>
        <div id="how-to" class="instructions">
            <div class="instruction-item">
                <div class="instruction-label">Defense</div>
                <div class="instruction-text">Wait for pink enemies to dash. Parry as they enter your rings.</div>
            </div>
            <div class="instruction-item">
                <div class="instruction-label">Perfect</div>
                <div class="instruction-text">Time it perfectly to launch enemies back and chain huge combos.</div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas" aria-label="Last Parry - Survival Action Game" role="img"></canvas>

    <script>
        // Initial setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const multEl = document.getElementById('multiplier');
        const bestEl = document.getElementById('best');
        const overlayEl = document.getElementById('overlay');
        const titleEl = document.getElementById('title');
        const hintEl = document.getElementById('hint');

        let width, height, dpr, u;

        // GC Optimization
        const toRemove = new Set();

        // Entities
        let enemies = [];
        let particles = [];
        let slashes = [];
        let feedbacks = [];
        let player = { x: 0, y: 0, r: 0 };

        // CSS Color Caching
        const COLORS = {};
        function cacheColors() {
            const root = document.documentElement;
            const vars = ['--bg', '--violet', '--cyan', '--pink', '--fg'];
            const style = getComputedStyle(root);
            vars.forEach(v => {
                COLORS[v] = style.getPropertyValue(v).trim();
            });
        }
        cacheColors();

        function resize() {
            const oldWidth = width;
            const oldHeight = height;
            const oldU = u;

            dpr = Math.min(window.devicePixelRatio || 1, 2);
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            u = Math.min(width, height);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            if (oldWidth && oldHeight && (gameState === STATE_PLAYING || gameState === STATE_GAMEOVER)) {
                const scaleX = width / oldWidth;
                const scaleY = height / oldHeight;
                const scaleU = u / oldU;

                player.x = width / 2;
                player.y = height / 2;
                player.r = PLAYER_RADIUS * u;

                enemies.forEach(e => {
                    e.x *= scaleX;
                    e.y *= scaleY;
                    e.r *= scaleU;
                    e.vx *= scaleU;
                    e.vy *= scaleU;
                    e.trail.forEach(t => {
                        t.x *= scaleX;
                        t.y *= scaleY;
                    });
                });

                particles.forEach(p => {
                    p.x *= scaleX;
                    p.y *= scaleY;
                    p.vx *= scaleU;
                    p.vy *= scaleU;
                });

                slashes.forEach(s => {
                    s.x = width / 2;
                    s.y = height / 2;
                });
            }
        }

        window.addEventListener('resize', resize);
        resize();

        // Game Constants
        const STATE_START = 'START';
        const STATE_PLAYING = 'PLAYING';
        const STATE_GAMEOVER = 'GAMEOVER';

        // Game State
        let gameState = STATE_START;
        let score = 0;
        let multiplier = 1;
        let bestScore = 0;
        try {
            bestScore = parseInt(localStorage.getItem('last-parry-best')) || 0;
        } catch (e) {}
        let lastTime = 0;
        let dt = 0;
        let timeScale = 1;
        let targetTimeScale = 1;
        let slowMoTimer = 0;
        let hitStopTimer = 0;
        let screenShake = { val: 0 };
        let parryLockout = 0;
        let playerPulse = { val: 1 };

        // Gameplay Constants
        const PLAYER_RADIUS = 0.035;
        const ENEMY_RADIUS = 0.028;
        const SPAWN_DIST = 0.6;
        const PARRY_WINDOW_TOTAL = 200;
        const PARRY_WINDOW_PERFECT = 80;


        // Spawning logic
        let spawnTimer = 0;
        let spawnInterval = 1400;
        let spawnCount = 0;
        let gameTime = 0;
        let pendingSpawns = [];

        bestEl.textContent = `BEST: ${bestScore}`;

        function setGameState(newState) {
            gameState = newState;
            if (gameState === STATE_START || gameState === STATE_GAMEOVER) {
                gsap.to(overlayEl, {
                    opacity: 1,
                    duration: 0.5,
                    ease: "power2.out",
                    onStart: () => overlayEl.classList.remove('hidden')
                });
                gsap.fromTo(titleEl,
                    { scale: 0.8, opacity: 0 },
                    { scale: 1, opacity: 1, duration: 0.8, ease: "elastic.out(1, 0.5)" }
                );

                titleEl.textContent = gameState === STATE_START ? 'LAST PARRY' : 'GAME OVER';

                const action = gameState === STATE_START ? 'Parry' : 'Retry';
                hintEl.innerHTML = `
                    <span class="touch-only">Tap anywhere</span>
                    <span class="kbd-only">Press Space</span>
                    <span class="joy-only">or Button</span>
                    to ${action}
                `;

                if (gameState === STATE_GAMEOVER && score > bestScore) {
                    bestScore = score;
                    try {
                        localStorage.setItem('last-parry-best', bestScore);
                    } catch (e) {}
                    bestEl.textContent = `BEST: ${bestScore}`;
                }
            } else if (gameState === STATE_PLAYING) {
                gsap.to(overlayEl, {
                    opacity: 0,
                    duration: 0.3,
                    ease: "power2.in",
                    onComplete: () => overlayEl.classList.add('hidden')
                });
                resetGame();
            }
        }

        function resetGame() {
            score = 0;
            multiplier = 1;
            gameTime = 0;
            spawnTimer = 0;
            spawnInterval = 1400;
            spawnCount = 0;
            enemies = [];
            particles = [];
            slashes = [];
            feedbacks = [];
            pendingSpawns = [];
            player = { x: width / 2, y: height / 2, r: PLAYER_RADIUS * u };
            updateUI();
        }

        function updateUI(isPerfect = false) {
            scoreEl.textContent = Math.floor(score);
            multEl.textContent = `×${multiplier}`;

            gsap.fromTo([scoreEl, multEl],
                { scale: isPerfect ? 1.5 : 1.2 },
                { scale: 1, duration: 0.6, ease: "elastic.out(1, 0.3)" }
            );
        }

        // Visibility handling
        let isPaused = false;
        document.addEventListener('visibilitychange', () => {
            isPaused = document.hidden;
            if (!isPaused) lastTime = performance.now();
        });

        function loop(t) {
            if (isPaused) {
                requestAnimationFrame(loop);
                return;
            }

            dt = Math.min(t - lastTime, 50);
            lastTime = t;

            update(dt);
            draw();

            requestAnimationFrame(loop);
        }

        function applyShake(intensity) {
            gsap.killTweensOf(screenShake);
            screenShake.val = intensity;
            gsap.to(screenShake, {
                val: 0,
                duration: 0.5,
                ease: "power2.out"
            });
        }

        function update(dt) {
            if (hitStopTimer > 0) {
                hitStopTimer -= dt;
                return;
            }

            if (slowMoTimer > 0) {
                slowMoTimer -= dt;
                if (slowMoTimer <= 0) targetTimeScale = 1;
            }

            // Smoothly interpolate timeScale towards targetTimeScale
            const easeSpeed = targetTimeScale > timeScale ? 0.005 : 0.02;
            timeScale += (targetTimeScale - timeScale) * (1 - Math.pow(1 - easeSpeed, dt));

            if (gameState !== STATE_PLAYING) return;

            const effectiveDt = dt * timeScale;
            gameTime += effectiveDt;

            // Update Slashes (now handled by GSAP)

            if (parryLockout > 0) {
                parryLockout -= dt;
            }

            // Spawning
            spawnTimer -= effectiveDt;
            if (spawnTimer <= 0) {
                spawnCount++;
                spawnInterval = Math.max(450, 1400 * Math.pow(0.97, spawnCount));
                spawnTimer = spawnInterval;

                if (gameTime > 30000 && Math.random() < 0.3) {
                    const firstAngle = Math.random() * Math.PI * 2;
                    spawnEnemy(firstAngle);
                    const secondAngle = firstAngle + Math.PI + (Math.random() - 0.5) * 0.5;
                    pendingSpawns.push({ angle: secondAngle, delay: 250 });
                } else {
                    spawnEnemy();
                }
            }

            for (let i = pendingSpawns.length - 1; i >= 0; i--) {
                pendingSpawns[i].delay -= effectiveDt;
                if (pendingSpawns[i].delay <= 0) {
                    spawnEnemy(pendingSpawns[i].angle);
                    pendingSpawns.splice(i, 1);
                }
            }

            // Dash speed ramp 0.9U/s -> 1.6U/s over 90s
            const dashSpeed = (0.9 + Math.min(1, gameTime / 90000) * 0.7) * u / 1000;
            // Telegraph time ramps 600ms -> 350ms
            const telegraphTime = 600 - Math.min(1, gameTime / 90000) * 250;

            // Update enemies
            toRemove.clear();
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                if (toRemove.has(e)) continue;

                if (e.state === 'TELEGRAPH') {
                    e.telegraphTimer -= effectiveDt;
                    if (e.telegraphTimer <= 0) {
                        e.state = 'DASH';
                        const dx = player.x - e.x;
                        const dy = player.y - e.y;
                        const dist = Math.hypot(dx, dy);
                        e.vx = (dx / dist) * dashSpeed;
                        e.vy = (dy / dist) * dashSpeed;
                    }
                } else if (e.state === 'DASH') {
                    e.trail.push({ x: e.x, y: e.y, t: 150 });
                    if (e.trail.length > 10) e.trail.shift();

                    e.x += e.vx * effectiveDt;
                    e.y += e.vy * effectiveDt;

                    const dx = player.x - e.x;
                    const dy = player.y - e.y;
                    const dist = Math.hypot(dx, dy);

                    if (dist < player.r + e.r) {
                        gameOver();
                    }
                } else if (e.state === 'LAUNCHED') {
                    e.trail.push({ x: e.x, y: e.y, t: 150 });
                    if (e.trail.length > 15) e.trail.shift();
                    e.x += e.vx * effectiveDt;
                    e.y += e.vy * effectiveDt;

                    // Chain kill check
                    for (let j = 0; j < enemies.length; j++) {
                        const other = enemies[j];
                        if (e === other || other.state === 'LAUNCHED' || toRemove.has(other)) continue;
                        const dx = e.x - other.x;
                        const dy = e.y - other.y;
                        if (Math.hypot(dx, dy) < e.r + other.r) {
                            toRemove.add(other);
                            killEnemy(other, true, false); // Don't splice immediately
                        }
                    }

                    const margin = 100;
                    if (e.x < -margin || e.x > width + margin || e.y < -margin || e.y > height + margin) {
                        toRemove.add(e);
                    }
                } else if (e.state === 'KNOCKBACK') {
                    e.pauseTimer -= effectiveDt;
                    if (e.pauseTimer <= 0) {
                        e.state = 'TELEGRAPH';
                        e.telegraphTimer = telegraphTime;
                    }
                }

                for (let j = e.trail.length - 1; j >= 0; j--) {
                    e.trail[j].t -= effectiveDt;
                    if (e.trail[j].t <= 0) e.trail.splice(j, 1);
                }
            }
            // Actual removal
            if (toRemove.size > 0) {
                enemies = enemies.filter(e => !toRemove.has(e));
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx * effectiveDt;
                p.y += p.vy * effectiveDt;
                p.life -= effectiveDt;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Update feedbacks (now handled by GSAP)
        }

        function spawnEnemy(forceAngle = null) {
            const angle = forceAngle !== null ? forceAngle : Math.random() * Math.PI * 2;
            const dist = SPAWN_DIST * u;
            const x = player.x + Math.cos(angle) * dist;
            const y = player.y + Math.sin(angle) * dist;
            const telegraphTime = 600 - Math.min(1, gameTime / 90000) * 250;

            enemies.push({
                x, y,
                r: ENEMY_RADIUS * u,
                state: 'TELEGRAPH',
                telegraphTimer: telegraphTime,
                maxTelegraph: telegraphTime,
                vx: 0, vy: 0,
                trail: []
            });
        }

        function killEnemy(e, isChain, performSplice = true) {
            spawnParticles(e.x, e.y, e.state === 'LAUNCHED' ? varColor('--cyan') : varColor('--violet'));
            if (isChain) {
                multiplier++;
                score += 50 * multiplier;
                applyChainSlowMo();
            }
            if (performSplice) {
                const idx = enemies.indexOf(e);
                if (idx > -1) enemies.splice(idx, 1);
            }
            updateUI();
        }

        function spawnParticles(x, y, color) {
            for (let i = 0; i < 12; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = (Math.random() * 0.2 + 0.1) * u / 1000;
                const life = 400 + Math.random() * 400;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life,
                    maxLife: life,
                    color
                });
            }
        }

        function varColor(name) {
            return COLORS[name] || '#ffffff';
        }

        // Audio
        let audioCtx = null;
        function playSound(mult) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = mult > 0 ? 'triangle' : 'square';
            const freq = 220 * Math.pow(2, Math.min(mult, 24) / 12);
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function gameOver() {
            setGameState(STATE_GAMEOVER);
            spawnParticles(player.x, player.y, varColor('--cyan'));
            applyShake(15);
            hitStopTimer = 300;
            if (navigator.vibrate) navigator.vibrate(200);
        }

        function applyChainSlowMo() {
            const levels = [0.7, 0.55, 0.4, 0.3];
            const currentLevel = Math.max(0, multiplier - 2);
            targetTimeScale = levels[Math.min(currentLevel, levels.length - 1)];
            slowMoTimer = 350;
        }

        // Input Handling
        function onParry() {
            if (gameState === STATE_START || (gameState === STATE_GAMEOVER && hitStopTimer <= 0)) {
                setGameState(STATE_PLAYING);
                return;
            }

            if (gameState !== STATE_PLAYING || parryLockout > 0) return;

            let hit = false;
            let bestTier = 'WHIFF';

            const dashSpeed = (0.9 + Math.min(1, gameTime / 90000) * 0.7) * u / 1000;

            enemies.forEach(e => {
                if (e.state !== 'DASH') return;

                const dx = player.x - e.x;
                const dy = player.y - e.y;
                const dist = Math.hypot(dx, dy);
                const gap = dist - (player.r + e.r);
                const timeToContact = gap / dashSpeed;

                if (timeToContact <= PARRY_WINDOW_TOTAL && timeToContact >= -50) {
                    hit = true;
                    if (timeToContact <= PARRY_WINDOW_PERFECT) {
                        e.state = 'LAUNCHED';
                        e.vx = -e.vx * 3;
                        e.vy = -e.vy * 3;
                        bestTier = 'PERFECT';
                        spawnFeedback(e.x, e.y, 'PERFECT!', varColor('--cyan'));
                    } else {
                        e.state = 'KNOCKBACK';
                        e.pauseTimer = 400;
                        const angle = Math.atan2(e.y - player.y, e.x - player.x);
                        const kbDist = 0.45 * u;
                        e.x = player.x + Math.cos(angle) * kbDist;
                        e.y = player.y + Math.sin(angle) * kbDist;
                        if (bestTier !== 'PERFECT') {
                            bestTier = 'LOOSE';
                            spawnFeedback(e.x, e.y, 'LOOSE', varColor('--violet'));
                        }
                    }
                }
            });

            if (hit) {
                if (bestTier === 'PERFECT') {
                    multiplier++;
                    score += 50 * multiplier;
                    hitStopTimer = 120;
                    applyShake(8);
                    spawnSlash(player.x, player.y);
                    playSound(multiplier);
                    applyChainSlowMo();
                    if (navigator.vibrate) navigator.vibrate([40, 30, 40]);

                    playerPulse.val = 1.5;
                    gsap.to(playerPulse, { val: 1, duration: 0.5, ease: "elastic.out(1, 0.3)" });
                    updateUI(true);
                } else {
                    multiplier = 1;
                    score += 10;
                    applyShake(3);
                    playSound(0);
                    if (navigator.vibrate) navigator.vibrate(20);
                    updateUI(false);
                }
            } else {
                multiplier = 1;
                parryLockout = 250;
                updateUI(false);
            }
        }

        window.addEventListener('keydown', e => {
            if (e.code === 'Space') {
                e.preventDefault();
                onParry();
            }
        });

        window.addEventListener('pointerdown', e => {
            e.preventDefault();
            onParry();
        });

        // Joypad.js integration
        joypad.on('connect', (e) => {
            document.body.classList.add('joy-connected');
            spawnFeedback(width / 2, height / 2 + 100, 'CONTROLLER CONNECTED', varColor('--cyan'));
        });

        joypad.on('button_press', (e) => {
            const { buttonName } = e.detail;
            // Map face buttons (0, 1, 2, 3) to parry
            if (['button_0', 'button_1', 'button_2', 'button_3'].includes(buttonName)) {
                onParry();
            }
        });

        function spawnFeedback(x, y, text, color) {
            const f = { x, y, text, color, life: 1, maxLife: 1 };
            feedbacks.push(f);
            gsap.to(f, {
                y: y - 0.1 * u,
                life: 0,
                duration: 1,
                ease: "power2.out",
                onComplete: () => {
                    const idx = feedbacks.indexOf(f);
                    if (idx > -1) feedbacks.splice(idx, 1);
                }
            });
        }

        // Slash effect
        function spawnSlash(x, y) {
            const s = { x, y, life: 200, r: player.r * 1.5 };
            slashes.push(s);
            gsap.to(s, {
                life: 0,
                r: player.r * 3.5,
                duration: 0.3,
                ease: "power2.out",
                onComplete: () => {
                    const idx = slashes.indexOf(s);
                    if (idx > -1) slashes.splice(idx, 1);
                }
            });

            // Add sparks
            for (let i = 0; i < 25; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = (Math.random() * 0.4 + 0.2) * u / 1000;
                const life = 300 + Math.random() * 300;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life,
                    maxLife: life,
                    color: '#fff'
                });
            }
        }

        function draw() {
            ctx.save();

            if (screenShake.val > 0) {
                const sx = (Math.random() - 0.5) * screenShake.val;
                const sy = (Math.random() - 0.5) * screenShake.val;
                ctx.translate(sx, sy);
            }

            ctx.fillStyle = '#07080f';
            ctx.fillRect(0, 0, width, height);

            if (gameState === STATE_PLAYING || gameState === STATE_GAMEOVER) {
                // Draw Slashes
                slashes.forEach((s) => {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${s.life / 200})`;
                    ctx.lineWidth = 4 * (s.life / 200);
                    ctx.stroke();
                });

                // Draw Player (glowing diamond)
                if (gameState === STATE_PLAYING) {
                    const dashSpeed = (0.9 + Math.min(1, gameTime / 90000) * 0.7) * u / 1000;
                    const rOuter = player.r + ENEMY_RADIUS * u + dashSpeed * PARRY_WINDOW_TOTAL;
                    const rInner = player.r + ENEMY_RADIUS * u + dashSpeed * PARRY_WINDOW_PERFECT;

                    // Draw Parry Rings
                    ctx.save();
                    ctx.setLineDash([5, 5]);
                    ctx.lineWidth = 2;

                    // Outer Ring
                    ctx.beginPath();
                    ctx.arc(player.x, player.y, rOuter, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(124, 108, 255, 0.2)';
                    ctx.stroke();

                    // Inner Ring
                    ctx.beginPath();
                    ctx.arc(player.x, player.y, rInner, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(70, 200, 255, 0.4)';
                    ctx.setLineDash([]);
                    ctx.stroke();
                    ctx.restore();

                    // Player Diamond
                    ctx.save();
                    ctx.translate(player.x, player.y);
                    ctx.rotate(Math.PI / 4);

                    if (parryLockout > 0) {
                        ctx.strokeStyle = varColor('--pink');
                        ctx.shadowColor = varColor('--pink');
                        ctx.globalAlpha = 0.5;
                    } else {
                        ctx.strokeStyle = varColor('--cyan');
                        ctx.shadowColor = varColor('--cyan');
                    }

                    ctx.shadowBlur = 15 * playerPulse.val;
                    ctx.lineWidth = 3 * playerPulse.val;
                    const pSize = player.r * 1.4 * playerPulse.val;
                    ctx.strokeRect(-pSize / 2, -pSize / 2, pSize, pSize);

                    // Lockout indicator
                    if (parryLockout > 0) {
                        ctx.restore();
                        ctx.save();
                        ctx.translate(player.x, player.y);
                        ctx.beginPath();
                        ctx.arc(0, 0, player.r * 1.8, -Math.PI/2, -Math.PI/2 + (parryLockout/250) * Math.PI * 2);
                        ctx.strokeStyle = varColor('--pink');
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                    ctx.restore();
                }

                // Draw Enemies
                enemies.forEach(e => {
                    // Draw Trail
                    if (e.state === 'DASH' || e.state === 'LAUNCHED') {
                        e.trail.forEach((t, i) => {
                            const alpha = (i / e.trail.length) * 0.5;
                            ctx.beginPath();
                            ctx.arc(t.x, t.y, e.r * (i / e.trail.length), 0, Math.PI * 2);
                            ctx.fillStyle = e.state === 'LAUNCHED' ? `rgba(70, 200, 255, ${alpha})` : `rgba(255, 110, 199, ${alpha})`;
                            ctx.fill();
                        });
                    }

                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);

                    if (e.state === 'TELEGRAPH') {
                        const p = 1 - e.telegraphTimer / e.maxTelegraph;
                        ctx.shadowBlur = 10 + p * 15;
                        const r = 124 + p * (255 - 124);
                        const g = 108 + p * (110 - 108);
                        const b = 255 + p * (199 - 255);
                        ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                        ctx.shadowColor = ctx.fillStyle;
                    } else if (e.state === 'DASH') {
                        ctx.fillStyle = varColor('--pink');
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = varColor('--pink');
                    } else if (e.state === 'LAUNCHED') {
                        ctx.fillStyle = '#fff';
                        ctx.shadowBlur = 20;
                        ctx.shadowColor = varColor('--cyan');
                    } else if (e.state === 'KNOCKBACK') {
                        ctx.fillStyle = varColor('--violet');
                        ctx.shadowBlur = 5;
                        ctx.shadowColor = varColor('--violet');
                    }

                    ctx.fill();
                });

                // Draw Feedbacks
                ctx.save();
                ctx.textAlign = 'center';
                ctx.font = `bold ${Math.floor(u * 0.04)}px ui-sans-serif, system-ui`;
                feedbacks.forEach(f => {
                    ctx.globalAlpha = f.life / f.maxLife;
                    ctx.fillStyle = f.color;
                    ctx.fillText(f.text, f.x, f.y);
                });
                ctx.restore();

                // Draw Particles
                particles.forEach(p => {
                    ctx.globalAlpha = p.life / p.maxLife;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;
            }

            ctx.restore();
        }

        requestAnimationFrame(loop);
    </script>
</body>
</html>
