<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Grazer</title>
    <style>
        :root {
            --bg: #07080f;
            --fg: #e8eaf2;
            --accent: #ff6ec7;
            --bullet-1: #7c6cff;
            --bullet-2: #46c8ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--fg);
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 1rem;
        }
        .score-label {
            font-size: 1.2rem;
            opacity: 0.8;
            letter-spacing: 0.1em;
        }
        .score-value {
            font-size: 2.5rem;
            font-weight: 800;
        }
        .best-score {
            font-size: 0.9rem;
            opacity: 0.6;
        }
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(7, 8, 15, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            text-align: center;
        }
        #game-over h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--accent);
        }
        #game-over p {
            font-size: 1.2rem;
            opacity: 0.8;
        }
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            text-align: center;
            z-index: 100;
        }
        #start-screen h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: var(--accent);
            letter-spacing: 0.2em;
        }
        .instructions {
            margin-bottom: 2rem;
        }
        .instruction-line {
            font-size: 1.1rem;
            margin: 0.5rem 0;
            opacity: 0.7;
            letter-spacing: 0.1em;
        }
        .cta {
            font-size: 1.4rem;
            color: var(--fg);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="ui">
        <div class="score-label">SCORE</div>
        <div id="score" class="score-value">0</div>
        <div id="best" class="best-score">BEST: 0</div>
    </div>
    <div id="game-over">
        <h1>SHATTERED</h1>
        <p>TAP OR SPACE TO RESTART</p>
    </div>
    <div id="start-screen">
        <h1>GRAZER</h1>
        <div class="instructions">
            <div class="instruction-line">DRAG ANYWHERE OR USE ARROWS/WASD</div>
            <div class="instruction-line">GRAZE BULLETS FOR COMBO</div>
            <div class="instruction-line">HITBOX IS THE WHITE DOT</div>
        </div>
        <div class="cta">TAP OR SPACE TO START</div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const gameOverEl = document.getElementById('game-over');
        const startScreenEl = document.getElementById('start-screen');

        let width, height, dpr, u;
        let gameStarted = false;
        let lastTime = 0;
        let paused = false;

        const ship = {
            x: 0,
            y: 0,
            tx: 0,
            ty: 0,
            coreRadius: 0,
            haloRadius: 0,
            angle: 0,
            dead: false
        };

        const mouse = { x: 0, y: 0 };
        const touchOrigin = { x: 0, y: 0 };
        const shipOrigin = { x: 0, y: 0 };
        let isTouch = false;

        const bullets = [];
        const bulletPool = [];
        const emitters = [];

        let bulletSpeed = 0;
        let fireRateMultiplier = 1;
        let difficultyTimer = 0;
        let spawnGrace = 2;

        let score = 0;
        let combo = 0;
        let comboTimer = 0;
        let maxComboMilestone = 0;
        let bestScore = 0;
        try {
            bestScore = parseInt(localStorage.getItem('grazer-best'), 10) || 0;
            bestEl.textContent = `BEST: ${bestScore}`;
        } catch(e) {}

        let timeDilation = 1;
        let bulletTimeTimer = 0;
        let hitStopTimer = 0;

        const particles = [];
        const sparkPool = [];
        let screenShake = 0;
        let vignetteIntensity = 0;

        function getSpark() {
            return sparkPool.pop() || { x: 0, y: 0, vx: 0, vy: 0, life: 0, maxLife: 0, color: '#ffd700' };
        }

        function spawnSparks(x, y, angle, count) {
            for (let i = 0; i < count; i++) {
                const s = getSpark();
                const a = angle + (Math.random() - 0.5) * 1;
                const speed = (2 + Math.random() * 4) * u;
                s.x = x;
                s.y = y;
                s.vx = Math.cos(a) * speed;
                s.vy = Math.sin(a) * speed;
                s.life = s.maxLife = 0.3 + Math.random() * 0.4;
                s.color = '#ffd700';
                particles.push(s);
            }
        }

        function spawnShatter(x, y) {
            for (let i = 0; i < 200; i++) {
                const s = getSpark();
                const a = Math.random() * Math.PI * 2;
                const speed = (Math.random() * 15) * u;
                s.x = x;
                s.y = y;
                s.vx = Math.cos(a) * speed;
                s.vy = Math.sin(a) * speed;
                s.life = s.maxLife = 0.5 + Math.random() * 1;
                s.color = (Math.random() > 0.5) ? '#ff6ec7' : '#fff';
                particles.push(s);
            }
        }

        // Audio
        let audioCtx;
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playChime(combo) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            const freq = 440 * Math.pow(1.05946, (combo % 24)); // steps up ladder
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.type = 'sine';

            if (bulletTimeTimer > 0) {
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(2000, audioCtx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.2);
            } else {
                filter.type = 'allpass';
            }

            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function getBullet() {
            return bulletPool.pop() || {
                x: 0, y: 0, vx: 0, vy: 0, r: 0, active: false, grazed: false,
                trailX: new Float32Array(10),
                trailY: new Float32Array(10),
                trailIndex: 0,
                trailCount: 0
            };
        }

        function spawnBullet(x, y, angle, speed) {
            const b = getBullet();
            b.x = x;
            b.y = y;
            b.r = 0.9 * u;
            b.vx = Math.cos(angle) * speed;
            b.vy = Math.sin(angle) * speed;
            b.active = true;
            b.grazed = false;
            b.trailIndex = 0;
            b.trailCount = 0;
            bullets.push(b);
        }

        class Emitter {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.timer = 0;
                this.patternTimer = 0;
                this.patternType = 'spiral';
                this.angle = 0;
                this.deck = ['spiral', 'fan', 'burst', 'wall'];
                this.shuffleDeck();
                this.nextPattern();
            }

            shuffleDeck() {
                for (let i = this.deck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.deck[i], this.deck[j]] = [this.deck[j], this.deck[i]];
                }
            }

            nextPattern() {
                if (this.deck.length === 0) {
                    this.deck = ['spiral', 'fan', 'burst', 'wall'];
                    this.shuffleDeck();
                }
                this.patternType = this.deck.pop();
                this.patternTimer = 4 + Math.random() * 3;
                this.timer = 0;
            }

            update(dt) {
                this.patternTimer -= dt;
                if (this.patternTimer <= 0) this.nextPattern();

                this.timer -= dt * fireRateMultiplier;

                if (this.patternType === 'spiral') {
                    this.angle += dt * 2;
                    if (this.timer <= 0) {
                        spawnBullet(this.x, this.y, this.angle, bulletSpeed);
                        this.timer = 0.1;
                    }
                } else if (this.patternType === 'fan') {
                    if (this.timer <= 0) {
                        const count = 7;
                        const spread = Math.PI * 0.4;
                        const baseAngle = Math.atan2(ship.y - this.y, ship.x - this.x);
                        for (let i = 0; i < count; i++) {
                            const a = baseAngle - spread / 2 + (spread / (count - 1)) * i;
                            spawnBullet(this.x, this.y, a, bulletSpeed * 0.8);
                        }
                        this.timer = 1.2;
                    }
                } else if (this.patternType === 'burst') {
                    if (this.timer <= 0) {
                        const baseAngle = Math.atan2(ship.y - this.y, ship.x - this.x);
                        this.burstCount = (this.burstCount || 0) + 1;
                        spawnBullet(this.x, this.y, baseAngle, bulletSpeed * 1.2);
                        if (this.burstCount >= 3) {
                            this.timer = 1.5;
                            this.burstCount = 0;
                        } else {
                            this.timer = 0.15;
                        }
                    }
                } else if (this.patternType === 'wall') {
                    if (this.timer <= 0) {
                        const angle = Math.atan2(ship.y - this.y, ship.x - this.x);
                        const perp = angle + Math.PI / 2;
                        const gapSize = 12 * u;
                        const count = 12;
                        const spacing = 4 * u;
                        for (let i = -count; i <= count; i++) {
                            const offset = i * spacing;
                            if (Math.abs(offset) < gapSize / 2) continue;
                            const bx = this.x + Math.cos(perp) * offset;
                            const by = this.y + Math.sin(perp) * offset;
                            spawnBullet(bx, by, angle, bulletSpeed * 0.7);
                        }
                        this.timer = 2.5;
                    }
                }
            }
        }

        function resize() {
            const oldW = width;
            const oldH = height;
            dpr = Math.min(window.devicePixelRatio || 1, 2);
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
            const oldU = u;
            u = Math.min(width, height) / 100;

            if (oldW && oldH) {
                const rx = width / oldW;
                const ry = height / oldH;
                ship.x *= rx;
                ship.y *= ry;
                ship.tx *= rx;
                ship.ty *= ry;
                bulletSpeed *= (u / oldU);
            } else {
                bulletSpeed = 22 * u;
            }

            ship.coreRadius = 0.6 * u;
            ship.haloRadius = 5.5 * u;
        }

        window.addEventListener('resize', () => {
            resize();
            initEmitters();
        });
        resize();
        ship.x = ship.tx = width / 2;
        ship.y = ship.ty = height / 2;
        initEmitters();

        function restart() {
            if (!ship.dead) return;

            bullets.forEach(b => {
                b.active = false;
                bulletPool.push(b);
            });
            bullets.length = 0;

            particles.forEach(p => {
                sparkPool.push(p);
            });
            particles.length = 0;

            ship.dead = false;
            ship.x = ship.tx = width / 2;
            ship.y = ship.ty = height / 2;
            ship.angle = 0;

            score = 0;
            combo = 0;
            comboTimer = 0;
            maxComboMilestone = 0;
            bulletTimeTimer = 0;
            hitStopTimer = 0;
            screenShake = 0;
            bulletSpeed = 22 * u;
            fireRateMultiplier = 1;
            difficultyTimer = 0;
            spawnGrace = 2;

            scoreEl.textContent = '0';
            gameOverEl.style.display = 'none';
            initEmitters();
        }

        window.addEventListener('pointermove', e => {
            initAudio();
            isTouch = e.pointerType === 'touch';
            mouse.x = e.clientX;
            mouse.y = e.clientY;

            if (isTouch) {
                const dx = mouse.x - touchOrigin.x;
                const dy = mouse.y - touchOrigin.y;
                ship.tx = shipOrigin.x + dx;
                ship.ty = shipOrigin.y + dy;
            } else {
                ship.tx = mouse.x;
                ship.ty = mouse.y;
            }

            // Clamp
            ship.tx = Math.max(0, Math.min(width, ship.tx));
            ship.ty = Math.max(0, Math.min(height, ship.ty));
        });

        window.addEventListener('pointerdown', e => {
            initAudio();
            if (audioCtx) audioCtx.resume();
            if (!gameStarted) {
                gameStarted = true;
                startScreenEl.style.display = 'none';
                lastTime = performance.now();
            }
            isTouch = e.pointerType === 'touch';
            if (isTouch) {
                touchOrigin.x = e.clientX;
                touchOrigin.y = e.clientY;
                shipOrigin.x = ship.tx;
                shipOrigin.y = ship.ty;
            }
            if (ship.dead) restart();
        });

        window.addEventListener('touchstart', e => {
            if (e.cancelable) e.preventDefault();
        }, { passive: false });

        const keys = {};
        window.addEventListener('keydown', e => {
            initAudio();
            if (audioCtx) audioCtx.resume();
            keys[e.code] = true;
            if (e.code === 'Space') {
                if (!gameStarted) {
                    gameStarted = true;
                    startScreenEl.style.display = 'none';
                    lastTime = performance.now();
                }
                if (ship.dead) restart();
            }
        });

        window.addEventListener('keyup', e => {
            keys[e.code] = false;
        });

        document.addEventListener('visibilitychange', () => {
            paused = document.hidden;
            if (!paused) lastTime = performance.now();
        });

        function loop(t) {
            if (paused) {
                requestAnimationFrame(loop);
                return;
            }
            const dt = Math.min((t - lastTime) / 1000, 0.1);
            lastTime = t;

            update(dt);
            draw();

            requestAnimationFrame(loop);
        }

        function initEmitters() {
            emitters.length = 0;
            emitters.push(new Emitter(0, 0));
            emitters.push(new Emitter(width, 0));
            emitters.push(new Emitter(0, height));
            emitters.push(new Emitter(width, height));
        }

        function update(dt) {
            if (!gameStarted) return;

            // Keyboard movement
            const moveSpeed = 60 * u * dt;
            let kdx = 0;
            let kdy = 0;
            if (keys['ArrowLeft'] || keys['KeyA']) kdx -= 1;
            if (keys['ArrowRight'] || keys['KeyD']) kdx += 1;
            if (keys['ArrowUp'] || keys['KeyW']) kdy -= 1;
            if (keys['ArrowDown'] || keys['KeyS']) kdy += 1;

            if (kdx !== 0 || kdy !== 0) {
                const mag = Math.hypot(kdx, kdy);
                ship.tx += (kdx / mag) * moveSpeed;
                ship.ty += (kdy / mag) * moveSpeed;
                ship.tx = Math.max(0, Math.min(width, ship.tx));
                ship.ty = Math.max(0, Math.min(height, ship.ty));
            }

            if (hitStopTimer > 0) {
                hitStopTimer -= dt;
                return;
            }

            if (screenShake > 0) screenShake -= dt * 16;
            if (screenShake < 0) screenShake = 0;

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= dt;
                if (p.life <= 0) {
                    sparkPool.push(particles.splice(i, 1)[0]);
                }
            }

            if (ship.dead) return;

            // Bullet-time logic
            if (bulletTimeTimer > 0) {
                bulletTimeTimer -= dt;
                timeDilation = 0.45;
            } else {
                timeDilation = 1;
            }

            const gameDt = dt * timeDilation;

            if (spawnGrace > 0) {
                spawnGrace -= dt;
            } else {
                difficultyTimer += dt;
                if (difficultyTimer >= 10) {
                    difficultyTimer = 0;
                    bulletSpeed = Math.min(bulletSpeed * 1.06, 22 * u * 3);
                    fireRateMultiplier = Math.min(fireRateMultiplier * 1.08, 3);
                }
                emitters.forEach(e => e.update(gameDt));
            }

            // Combo decay
            if (comboTimer > 0) {
                comboTimer -= gameDt;

                // Continuous drain instead of cliff-drop
                // Decay combo based on timer progress
                if (combo > 0) {
                    const decayRate = combo / 1.5;
                    combo -= decayRate * gameDt;
                }

                if (comboTimer <= 0) {
                    combo = 0;
                    comboTimer = 0;
                    maxComboMilestone = 0;
                }
            }

            // Update bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.vx * gameDt;
                b.y += b.vy * gameDt;

                b.trailX[b.trailIndex] = b.x;
                b.trailY[b.trailIndex] = b.y;
                b.trailIndex = (b.trailIndex + 1) % 10;
                if (b.trailCount < 10) b.trailCount++;

                if (b.x < -100 || b.x > width + 100 || b.y < -100 || b.y > height + 100) {
                    b.active = false;
                    bulletPool.push(bullets.splice(i, 1)[0]);
                    continue;
                }

                const dist = Math.hypot(b.x - ship.x, b.y - ship.y);

                // Collision
                if (dist < b.r + ship.coreRadius) {
                    die();
                }
                // Graze
                else if (!b.grazed && dist < b.r + ship.haloRadius) {
                    b.grazed = true;
                    combo++;
                    const newCombo = Math.floor(combo);
                    comboTimer = 1.5;
                    score += 10 * newCombo;
                    scoreEl.textContent = Math.floor(score);

                    const milestone = Math.floor(newCombo / 20) * 20;
                    if (milestone > 0 && milestone > maxComboMilestone) {
                        bulletTimeTimer = 2;
                        maxComboMilestone = milestone;
                    }

                    spawnSparks(b.x, b.y, Math.atan2(b.vy, b.vx), 10);
                    playChime(combo);
                }
            }

            // Exponential smoothing
            const lerp = 1 - Math.exp(-10 * dt);
            const prevX = ship.x;
            const prevY = ship.y;
            ship.x += (ship.tx - ship.x) * lerp;
            ship.y += (ship.ty - ship.y) * lerp;

            // Update angle based on movement
            const dx = ship.x - prevX;
            const dy = ship.y - prevY;
            if (Math.hypot(dx, dy) > 0.1) {
                ship.angle = Math.atan2(dy, dx);
            }

            // Vignette intensity based on nearest bullet
            let minDist = Infinity;
            for (const b of bullets) {
                const dist = Math.hypot(b.x - ship.x, b.y - ship.y);
                if (dist < minDist) minDist = dist;
            }
            const targetVignette = Math.max(0, 1 - (minDist / (25 * u)));
            vignetteIntensity += (targetVignette - vignetteIntensity) * (1 - Math.exp(-15 * dt));
        }

        function die() {
            if (ship.dead) return;
            ship.dead = true;
            hitStopTimer = 0.12;
            screenShake = 8;
            spawnShatter(ship.x, ship.y);
            if (score > bestScore) {
                bestScore = score;
                bestEl.textContent = `BEST: ${bestScore}`;
                try {
                    localStorage.setItem('grazer-best', bestScore);
                } catch(e) {}
            }
            gameOverEl.style.display = 'flex';
        }

        function draw() {
            ctx.save();
            if (screenShake > 0) {
                ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
            }

            ctx.fillStyle = '#07080f';
            ctx.fillRect(0, 0, width, height);

            if (bulletTimeTimer > 0) {
                // Subtle chromatic ghosting
                ctx.save();
                ctx.globalAlpha = 0.2;
                ctx.globalCompositeOperation = 'screen';

                ctx.save();
                ctx.translate(1.5 * u, 0);
                drawContent(true, '#ff0000');
                ctx.restore();

                ctx.save();
                ctx.translate(-1.5 * u, 0);
                drawContent(true, '#00ffff');
                ctx.restore();

                ctx.restore();
            }

            drawContent();
            drawVignette();
            ctx.restore();
        }

        function drawVignette() {
            if (vignetteIntensity <= 0.01) return;
            const grad = ctx.createRadialGradient(ship.x, ship.y, 0, ship.x, ship.y, Math.max(width, height));
            grad.addColorStop(0, `rgba(7, 8, 15, 0)`);
            grad.addColorStop(0.3, `rgba(7, 8, 15, ${vignetteIntensity * 0.3})`);
            grad.addColorStop(1, `rgba(7, 8, 15, ${vignetteIntensity * 0.9})`);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
        }

        function drawContent(ghost = false, ghostColor = null) {
            // Draw particles
            if (!ghost) {
                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    ctx.globalAlpha = p.life / p.maxLife;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, 2, 2);
                }
                ctx.globalAlpha = 1;
            }

            ctx.globalCompositeOperation = 'lighter';
            for (let i = 0; i < bullets.length; i++) {
                const b = bullets[i];
                ctx.beginPath();
                ctx.moveTo(b.x, b.y);
                for (let j = 0; j < b.trailCount; j++) {
                    const idx = (b.trailIndex - 1 - j + 10) % 10;
                    ctx.lineTo(b.trailX[idx], b.trailY[idx]);
                }
                ctx.strokeStyle = ghost ? ghostColor : (i % 2 === 0 ? '#7c6cff' : '#46c8ff');
                ctx.lineWidth = b.r * 2;
                ctx.lineCap = 'round';
                ctx.globalAlpha = 0.5;
                ctx.stroke();
                ctx.globalAlpha = 1;

                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.fillStyle = ghost ? ghostColor : '#fff';
                ctx.fill();
            }
            ctx.globalCompositeOperation = 'source-over';

            if (!ship.dead) {
                // Draw Halo
                ctx.beginPath();
                ctx.arc(ship.x, ship.y, ship.haloRadius, 0, Math.PI * 2);
                ctx.strokeStyle = ghost ? ghostColor : 'rgba(232, 234, 242, 0.2)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Draw Ship (Dart)
                ctx.save();
                ctx.translate(ship.x, ship.y);
                ctx.rotate(ship.angle);

                // Dart body
                ctx.beginPath();
                ctx.moveTo(1.5 * u, 0);
                ctx.lineTo(-1 * u, -0.8 * u);
                ctx.lineTo(-0.5 * u, 0);
                ctx.lineTo(-1 * u, 0.8 * u);
                ctx.closePath();
                ctx.fillStyle = ghost ? ghostColor : '#ff6ec7';
                ctx.fill();

                // Core hitbox
                ctx.beginPath();
                ctx.arc(0, 0, ship.coreRadius, 0, Math.PI * 2);
                ctx.fillStyle = ghost ? ghostColor : '#fff';
                ctx.fill();

                ctx.restore();

                // Combo readout
                if (combo >= 1) {
                    ctx.fillStyle = ghost ? ghostColor : '#fff';
                    ctx.font = `bold ${3 * u}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.fillText(`x${Math.floor(combo)}`, ship.x, ship.y - 8 * u);
                }
            }
        }

        requestAnimationFrame(t => {
            lastTime = t;
            requestAnimationFrame(loop);
        });
    </script>
</body>
</html>
