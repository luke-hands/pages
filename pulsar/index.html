<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulsar</title>
    <style>
        :root {
            --bg: #07080f;
            --accent: #7c6cff;
            --player: #46c8ff;
            --bullet: #ff6ec7;
            --ui-font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            color: white;
            font-family: var(--ui-font);
            touch-action: none;
        }

        #left-glow, #right-glow {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1;
        }

        #left-glow {
            left: 0;
            background: linear-gradient(to right, rgba(70, 200, 255, 0.15), transparent);
        }

        #right-glow {
            right: 0;
            background: linear-gradient(to left, rgba(70, 200, 255, 0.15), transparent);
        }

        .active-glow {
            opacity: 1 !important;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
        }

        #score-container {
            text-align: center;
            margin-top: 20px;
        }

        #score {
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(124, 108, 255, 0.5);
        }

        #best-score {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: -5px;
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(7, 8, 15, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: auto;
            text-align: center;
        }

        #overlay h1 {
            font-size: 5rem;
            margin-bottom: 0.5rem;
            color: var(--accent);
            letter-spacing: 0.5rem;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(124, 108, 255, 0.4);
        }

        #controls-hint {
            display: flex;
            gap: 20px;
            margin-bottom: 2rem;
            pointer-events: none;
        }

        .control-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(70, 200, 255, 0.2);
            padding: 15px;
            border-radius: 12px;
            min-width: 140px;
        }

        .control-box .key {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-box .action {
            font-size: 1.2rem;
            color: var(--player);
            font-weight: 600;
            text-transform: lowercase;
        }

        .mobile-label { display: none; }
        .desktop-label { display: block; }

        @media (pointer: coarse) {
            .mobile-label { display: block; }
            .desktop-label { display: none; }

            #overlay h1 {
                font-size: 3.5rem;
                letter-spacing: 0.3rem;
            }
        }

        #overlay .final-score {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--bullet);
            font-weight: 800;
        }

        #overlay .restart-msg {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        #mute-toggle {
            position: absolute;
            bottom: 20px;
            right: 20px;
            pointer-events: auto;
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="left-glow"></div>
    <div id="right-glow"></div>
    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <div id="score-container" aria-live="polite">
            <div id="score">0</div>
            <div id="best-score">BEST: 0</div>
        </div>

        <div id="overlay">
            <h1 id="title">PULSAR</h1>
            <div id="controls-hint">
                <div class="control-box">
                    <span class="key desktop-label">Space</span>
                    <span class="key mobile-label">Left Tap</span>
                    <span class="action">Reverse</span>
                </div>
                <div class="control-box">
                    <span class="key desktop-label">Down Arrow</span>
                    <span class="key mobile-label">Right Hold</span>
                    <span class="action">Dive</span>
                </div>
            </div>
            <div id="game-over-info" class="hidden">
                <p class="final-score">SCORE: <span id="final-score-val">0</span></p>
            </div>
            <p class="restart-msg">tap or press Space to start</p>
        </div>

        <button id="mute-toggle" aria-label="Toggle Mute">Mute</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('best-score');
        const overlay = document.getElementById('overlay');
        const titleEl = document.getElementById('title');
        const controlsHint = document.getElementById('controls-hint');
        const leftGlow = document.getElementById('left-glow');
        const rightGlow = document.getElementById('right-glow');
        const gameOverInfo = document.getElementById('game-over-info');
        const finalScoreVal = document.getElementById('final-score-val');
        const muteToggle = document.getElementById('mute-toggle');

        let width, height, minDim, dpr;
        let outerRadius, innerRadius, coreRadius, flareRadius;

        function resize() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);

            minDim = Math.min(width, height);
            outerRadius = 0.34 * minDim;
            innerRadius = 0.20 * minDim;
            coreRadius = 0.07 * minDim;
            flareRadius = 0.24 * minDim;
        }

        window.addEventListener('resize', resize);
        resize();

        // Audio & Rhythm
        let audioCtx;
        let masterGain;
        const BPM_START = 100;
        const BPM_INC = 6;
        const BPM_CAP = 180;

        const rhythm = {
            bpm: BPM_START,
            beatDuration: 60 / BPM_START,
            nextBeatTime: 0,
            beatCount: 0,
            measureCount: 0,
            started: false
        };

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.connect(audioCtx.destination);
            updateMute();
        }

        function updateMute() {
            if (masterGain) {
                masterGain.gain.setTargetAtTime(state.muted ? 0 : 1, audioCtx.currentTime, 0.02);
            }
            muteToggle.textContent = state.muted ? 'Unmute' : 'Mute';
        }

        function playKick(time) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(masterGain);

            osc.frequency.setValueAtTime(150, time);
            osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.5);
            gain.gain.setValueAtTime(0.5, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.5);

            osc.start(time);
            osc.stop(time + 0.5);
        }

        function playHat(time) {
            const bufferSize = audioCtx.sampleRate * 0.05;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            filter.type = 'highpass';
            filter.frequency.value = 7000;

            source.connect(filter);
            filter.connect(gain);
            gain.connect(masterGain);

            gain.gain.setValueAtTime(0.1, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.05);

            source.start(time);
        }

        let droneOsc, droneGain;
        function startDrone() {
            if (droneOsc) return;
            droneOsc = audioCtx.createOscillator();
            droneGain = audioCtx.createGain();
            droneOsc.type = 'sawtooth';
            droneOsc.frequency.value = 50;

            const lpf = audioCtx.createBiquadFilter();
            lpf.type = 'lowpass';
            lpf.frequency.value = 200;

            droneOsc.connect(lpf);
            lpf.connect(droneGain);
            droneGain.connect(masterGain);

            droneGain.gain.setValueAtTime(0, audioCtx.currentTime);
            droneGain.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 1);
            droneOsc.start();
        }

        function stopDrone() {
            if (!droneOsc) return;
            const osc = droneOsc;
            const gain = droneGain;
            gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            setTimeout(() => {
                try { osc.stop(); } catch(e) {}
            }, 600);
            droneOsc = null;
            droneGain = null;
        }

        function playLaser(time) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(masterGain);

            osc.frequency.setValueAtTime(800, time);
            osc.frequency.exponentialRampToValueAtTime(100, time + 0.1);
            gain.gain.setValueAtTime(0.1, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);

            osc.start(time);
            osc.stop(time + 0.1);
        }

        function playThump() {
            if (!audioCtx) return;
            const time = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(masterGain);

            osc.frequency.setValueAtTime(60, time);
            osc.frequency.exponentialRampToValueAtTime(30, time + 0.2);
            gain.gain.setValueAtTime(0.4, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);

            osc.start(time);
            osc.stop(time + 0.2);
        }

        const COLORS = {
            bg: '#07080f',
            accent: '#7c6cff',
            player: '#46c8ff',
            bullet: '#ff6ec7'
        };

        // Game State
        let initialBest = 0;
        try { initialBest = parseInt(localStorage.getItem('pulsar-best')) || 0; }
        catch (e) { console.warn("Storage access denied", e); }

        const state = {
            running: false,
            gameOver: false,
            score: 0,
            bestScore: initialBest,
            muted: false,
            lastTime: 0,
            dt: 0,
            visibilityPaused: false,
            activePatterns: [],
            lastNearMissTime: 0
        };

        bestScoreEl.textContent = `BEST: ${state.bestScore}`;

        function updateRhythm() {
            if (state.visibilityPaused) return;

            const currentTime = audioCtx ? audioCtx.currentTime : performance.now() / 1000;

            if (!rhythm.started) {
                rhythm.nextBeatTime = currentTime + 0.1;
                rhythm.started = true;
            }

            while (rhythm.nextBeatTime < currentTime + 0.1) {
                const beatTime = rhythm.nextBeatTime;

                // Trigger audio
                if (audioCtx) {
                    playKick(beatTime);
                    if (rhythm.beatCount % 2 === 1) playHat(beatTime);
                }

                // Beat event
                onBeat(rhythm.beatCount, rhythm.measureCount);

                rhythm.beatCount++;
                if (rhythm.beatCount >= 4) {
                    rhythm.beatCount = 0;
                    rhythm.measureCount++;
                    // BPM Increase every measure
                    rhythm.bpm = Math.min(BPM_CAP, BPM_START + rhythm.measureCount * BPM_INC);
                    rhythm.beatDuration = 60 / rhythm.bpm;
                }

                rhythm.nextBeatTime += rhythm.beatDuration;
            }
        }

        let gameOverTimeout;
        function startGame() {
            initAudio();
            startDrone();

            if (gameOverTimeout) clearTimeout(gameOverTimeout);

            state.running = true;
            state.gameOver = false;
            state.score = 0;
            scoreEl.textContent = '0';

            resetPlayer();
            visuals.bullets = [];
            visuals.telegraphs = [];
            state.activePatterns = [];
            scheduledEvents.length = 0;

            rhythm.bpm = BPM_START;
            rhythm.beatDuration = 60 / BPM_START;
            rhythm.beatCount = 0;
            rhythm.measureCount = 0;
            rhythm.started = false;

            overlay.classList.add('hidden');
            gameOverInfo.classList.add('hidden');
            controlsHint.classList.remove('hidden');
        }

        function endGame() {
            if (state.gameOver) return;
            state.running = false;
            state.gameOver = true;

            stopDrone();

            visuals.shake = 8;
            spawnDeathParticles();

            try {
                if (state.score > state.bestScore) {
                    state.bestScore = Math.floor(state.score);
                    localStorage.setItem('pulsar-best', state.bestScore);
                    bestScoreEl.textContent = `BEST: ${state.bestScore}`;
                }
            } catch (e) { console.warn("Storage blocked", e); }

            // Reset control states
            state.isReverseActive = false;
            state.isDiveActive = false;
            leftGlow.classList.remove('active-glow');
            rightGlow.classList.remove('active-glow');

            // Hit stop
            gameOverTimeout = setTimeout(() => {
                overlay.classList.remove('hidden');
                gameOverInfo.classList.remove('hidden');
                titleEl.textContent = 'GAME OVER';
                controlsHint.classList.add('hidden');
                finalScoreVal.textContent = Math.floor(state.score);
            }, 80);
        }

        function spawnDeathParticles() {
            const pCount = 30;
            const px = width/2 + Math.cos(player.angle) * player.radius * minDim;
            const py = height/2 + Math.sin(player.angle) * player.radius * minDim;

            for (let i = 0; i < pCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = (Math.random() * 5 + 2) * (minDim / 400);
                visuals.particles.push({
                    x: px,
                    y: py,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1.0,
                    decay: 0.02 + Math.random() * 0.02,
                    color: i % 2 === 0 ? COLORS.player : COLORS.bullet
                });
            }
        }

        const beatEvents = [];
        function onBeat(beat, measure) {
            if (!state.running) return;

            beatEvents.push({
                time: rhythm.nextBeatTime,
                beat,
                measure,
                isDiving: player.isDiving
            });

            // Spawn telegraphs and bullets based on patterns
            // Every measure (4 beats), we might start a new pattern or difficulty step
            if (beat === 0) {
                schedulePattern(measure);
            }

            // Execute scheduled telegraphs and spawns
            const currentTime = audioCtx ? audioCtx.currentTime : performance.now() / 1000;
            executeScheduledEvents(currentTime);

            // Measure confetti
            if (measure > 0 && beat === 0) {
                spawnConfetti();
            }
        }

        const scheduledEvents = [];
        function schedulePattern(measure) {
            const patternType = Math.floor(Math.random() * 3);
            const startTime = rhythm.nextBeatTime; // Starts on next beat (beat 1 of measure or soon)
            const beatDur = rhythm.beatDuration;

            if (patternType === 0) { // Radial Burst
                const count = Math.min(24, 8 + Math.floor(measure / 2) * 2);
                const gap1 = Math.floor(Math.random() * count);
                const gap2 = (gap1 + Math.floor(count/3) + Math.floor(Math.random() * count/3)) % count;

                // Telegraph one beat ahead
                scheduledEvents.push({
                    time: startTime,
                    type: 'telegraph',
                    data: { type: 'radial', count, gap1, gap2 }
                });
                // Spawn on the beat after telegraph
                scheduledEvents.push({
                    time: startTime + beatDur,
                    type: 'spawn',
                    data: { type: 'radial', count, gap1, gap2 }
                });
            } else if (patternType === 1) { // Rotating Arms
                const arms = measure >= 8 ? 3 : 2;
                const offset = Math.random() * Math.PI * 2;
                scheduledEvents.push({
                    time: startTime,
                    type: 'telegraph',
                    data: { type: 'arms', arms, offset }
                });
                scheduledEvents.push({
                    time: startTime + beatDur,
                    type: 'spawn',
                    data: { type: 'arms', arms, offset, duration: beatDur * 4 }
                });
            } else if (patternType === 2) { // Shockwave
                const gapAngle = Math.random() * Math.PI * 2;
                scheduledEvents.push({
                    time: startTime,
                    type: 'telegraph',
                    data: { type: 'shockwave', gapAngle }
                });
                scheduledEvents.push({
                    time: startTime + beatDur,
                    type: 'spawn',
                    data: { type: 'shockwave', gapAngle }
                });
            }

            // Flare from measure 4
            if (measure >= 4 && Math.random() > 0.5) {
                const flareAngle = Math.random() * Math.PI * 2;
                scheduledEvents.push({
                    time: startTime + beatDur * 2,
                    type: 'telegraph',
                    data: { type: 'flare', angle: flareAngle }
                });
                scheduledEvents.push({
                    time: startTime + beatDur * 3,
                    type: 'spawn',
                    data: { type: 'flare', angle: flareAngle }
                });
            }
        }

        function executeScheduledEvents(currentTime) {
            for (let i = scheduledEvents.length - 1; i >= 0; i--) {
                const ev = scheduledEvents[i];
                if (ev.time <= currentTime + 0.02) {
                    if (ev.type === 'telegraph') {
                        visuals.telegraphs.push({ ...ev.data, startTime: ev.time, duration: rhythm.beatDuration });
                    } else if (ev.type === 'spawn') {
                        if (ev.data.type === 'arms') {
                            state.activePatterns.push({
                                ...ev.data,
                                startTime: ev.time,
                                duration: rhythm.beatDuration * 4,
                                lastSpawn: 0
                            });
                        } else {
                            spawnBullets(ev.data);
                        }
                        if (audioCtx) playLaser(ev.time);
                    }
                    scheduledEvents.splice(i, 1);
                }
            }
        }

        function spawnBullets(data) {
            const tempoScale = 1.0 + (rhythm.bpm - 100) / (180 - 100) * 0.3;
            const speed = 0.28 * tempoScale;

            if (data.type === 'radial') {
                for (let i = 0; i < data.count; i++) {
                    if (i === data.gap1 || i === data.gap2 || i === (data.gap1+1)%data.count) continue;
                    const angle = (i / data.count) * Math.PI * 2;
                    visuals.bullets.push({
                        nx: 0, ny: 0,
                        nvx: Math.cos(angle) * speed,
                        nvy: Math.sin(angle) * speed,
                        nr: 0.01,
                        type: 'normal',
                        missed: false
                    });
                }
            } else if (data.type === 'shockwave') {
                visuals.bullets.push({
                    nRadius: 0,
                    lastNRadius: 0,
                    nSpeed: speed,
                    gapAngle: data.gapAngle,
                    gapSize: Math.PI / 3, // 60 degrees
                    type: 'shockwave',
                    nr: 0.005, // thickness
                    missed: false
                });
            } else if (data.type === 'flare') {
                visuals.bullets.push({
                    x: width/2, y: height/2,
                    angle: data.angle,
                    life: 1.0,
                    type: 'flare',
                    missed: false
                });
            }
        }

        function spawnConfetti() {
            const count = 40;
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                const speed = (Math.random() * 3 + 2) * (minDim / 400);
                visuals.particles.push({
                    x: width/2 + Math.cos(angle) * outerRadius,
                    y: height/2 + Math.sin(angle) * outerRadius,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1.0,
                    decay: 0.02,
                    color: i % 2 === 0 ? COLORS.player : COLORS.accent
                });
            }
        }

        const visuals = {
            pulse: 0,
            shake: 0,
            particles: [],
            bullets: [],
            telegraphs: []
        };

        const player = {
            angle: 0,
            dir: 1,
            radius: 0.34, // normalized to minDim
            targetRadius: 0.34,
            isDiving: false,
            collisionRadius: 0.013,
            trail: []
        };

        function resetPlayer() {
            player.angle = 0;
            player.dir = 1;
            player.radius = 0.34;
            player.targetRadius = 0.34;
            player.isDiving = false;
            player.trail = [];
        }

        // Interaction
        const activePointers = new Map();
        const keys = {};
        state.isReverseActive = false;
        state.isDiveActive = false;

        function updateControls() {
            let reversePressed = keys['Space'];
            let divePressed = keys['ArrowDown'] || keys['s'];

            for (const p of activePointers.values()) {
                if (p.x < window.innerWidth / 2) reversePressed = true;
                else divePressed = true;
            }

            if (!state.running) {
                if (reversePressed || divePressed) startGame();
                return;
            }

            // Reverse logic (tap-like trigger)
            if (reversePressed && !state.isReverseActive) {
                player.dir *= -1;
                spawnReversalParticles();
            }
            state.isReverseActive = reversePressed;

            // Dive logic (hold)
            state.isDiveActive = divePressed;
            player.isDiving = state.isDiveActive;
            player.targetRadius = player.isDiving ? 0.20 : 0.34;

            // Visual feedback
            let leftActive = keys['Space'];
            let rightActive = keys['ArrowDown'] || keys['s'];
            for (const p of activePointers.values()) {
                if (p.x < window.innerWidth / 2) leftActive = true;
                else rightActive = true;
            }

            leftGlow.classList.toggle('active-glow', leftActive);
            rightGlow.classList.toggle('active-glow', rightActive);
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowDown' || e.key === 's') {
                keys[e.code || e.key] = true;
                updateControls();
                if (e.code !== 'F12') e.preventDefault();
            }
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowDown' || e.key === 's') {
                keys[e.code || e.key] = false;
                updateControls();
            }
        });

        window.addEventListener('pointerdown', (e) => {
            if (e.target === muteToggle) return;
            activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
            updateControls();
        });
        window.addEventListener('pointermove', (e) => {
            if (activePointers.has(e.pointerId)) {
                activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
                updateControls();
            }
        });
        window.addEventListener('pointerup', (e) => {
            activePointers.delete(e.pointerId);
            updateControls();
        });
        window.addEventListener('pointercancel', (e) => {
            activePointers.delete(e.pointerId);
            updateControls();
        });

        function spawnReversalParticles() {
            const pCount = 8;
            const r = player.radius * minDim;
            const px = width/2 + Math.cos(player.angle) * r;
            const py = height/2 + Math.sin(player.angle) * r;

            for (let i = 0; i < pCount; i++) {
                const angle = player.angle + (Math.random() - 0.5) * 0.5;
                const speed = (Math.random() * 2 + 1) * (minDim / 400);
                visuals.particles.push({
                    x: px,
                    y: py,
                    vx: Math.cos(angle) * speed * -player.dir,
                    vy: Math.sin(angle) * speed * -player.dir,
                    life: 1.0,
                    decay: 0.05 + Math.random() * 0.05,
                    color: COLORS.player
                });
            }
        }

        muteToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            state.muted = !state.muted;
            if (audioCtx) updateMute();
        });

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                state.visibilityPaused = true;
                if (audioCtx) audioCtx.suspend();
            } else {
                state.visibilityPaused = false;
                if (audioCtx) audioCtx.resume();
            }
        });

        // Main Loop
        function loop(t) {
            state.dt = Math.min(t - state.lastTime, 50);
            state.lastTime = t;

            update();
            draw();

            requestAnimationFrame(loop);
        }

        function update() {
            updateRhythm();
            if (!state.running || state.visibilityPaused) {
                return;
            }

            const currentTime = audioCtx ? audioCtx.currentTime : performance.now() / 1000;

            // Process beat events (scoring and visual pulses) synchronized with audio
            for (let i = beatEvents.length - 1; i >= 0; i--) {
                if (currentTime >= beatEvents[i].time) {
                    const ev = beatEvents[i];
                    state.score += (ev.isDiving ? 2 : 1);
                    scoreEl.textContent = Math.floor(state.score);
                    visuals.pulse = 1.0;
                    beatEvents.splice(i, 1);
                }
            }

            // Continuous patterns (Arms)
            for (let i = state.activePatterns.length - 1; i >= 0; i--) {
                const p = state.activePatterns[i];
                if (currentTime > p.startTime + p.duration) {
                    state.activePatterns.splice(i, 1);
                    continue;
                }

                if (currentTime > p.lastSpawn + 0.1) {
                    const elapsed = currentTime - p.startTime;
                    const sweepAngle = elapsed * 0.5;
                    const tempoScale = 1.0 + (rhythm.bpm - 100) / (180 - 100) * 0.3;
                    const speed = 0.28 * tempoScale;

                    for (let j = 0; j < p.arms; j++) {
                        const angle = p.offset + (j / p.arms) * Math.PI * 2 + sweepAngle;
                        visuals.bullets.push({
                            nx: 0, ny: 0,
                            nvx: Math.cos(angle) * speed,
                            nvy: Math.sin(angle) * speed,
                            nr: 0.01,
                            type: 'normal'
                        });
                    }
                    p.lastSpawn = currentTime;
                }
            }

            const tempoScale = 1.0 + (rhythm.bpm - 100) / (180 - 100) * 0.7;
            const baseSpeed = player.isDiving ? 2.3 : 1.6;
            const angularSpeed = baseSpeed * tempoScale * player.dir;

            player.angle += angularSpeed * (state.dt / 1000);

            // Smooth radius transition
            const radiusEase = 1.0 - Math.pow(0.001, state.dt / 250);
            player.radius += (player.targetRadius - player.radius) * radiusEase;

            // Player trail
            player.trail.push({
                x: width/2 + Math.cos(player.angle) * player.radius * minDim,
                y: height/2 + Math.sin(player.angle) * player.radius * minDim,
                time: currentTime
            });
            while (player.trail.length > 0 && currentTime - player.trail[0].time > 0.3) {
                player.trail.shift();
            }

            // Particles
            for (let i = visuals.particles.length - 1; i >= 0; i--) {
                const p = visuals.particles[i];
                p.x += p.vx * (state.dt / 16.6);
                p.y += p.vy * (state.dt / 16.6);
                p.life -= p.decay * (state.dt / 16.6);
                if (p.life <= 0) visuals.particles.splice(i, 1);
            }

            // Bullets
            const px = width/2 + Math.cos(player.angle) * player.radius * minDim;
            const py = height/2 + Math.sin(player.angle) * player.radius * minDim;
            const pr = player.collisionRadius * minDim;

            for (let i = visuals.bullets.length - 1; i >= 0; i--) {
                const b = visuals.bullets[i];
                if (b.type === 'normal') {
                    b.nx += b.nvx * (state.dt / 1000);
                    b.ny += b.nvy * (state.dt / 1000);

                    // Collision
                    const bx = width/2 + b.nx * minDim;
                    const by = height/2 + b.ny * minDim;
                    const br = b.nr * minDim;
                    const dx = bx - px;
                    const dy = by - py;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < br + pr) endGame();
                    if (!b.missed && dist < (br + pr) * 2.5) {
                        triggerNearMiss();
                        b.missed = true;
                    }

                    if (Math.abs(b.nx) > 1.5 || Math.abs(b.ny) > 1.5) {
                        visuals.bullets.splice(i, 1);
                    }
                } else if (b.type === 'shockwave') {
                    b.lastNRadius = b.nRadius;
                    b.nRadius += b.nSpeed * (state.dt / 1000);

                    // Collision (sweep check to prevent tunneling)
                    const pradius = player.radius;
                    const hit = (b.lastNRadius <= pradius && b.nRadius >= pradius) ||
                            (Math.abs(b.nRadius - pradius) < 0.013);

                    if (hit) {
                        const angle = Math.atan2(py - height/2, px - width/2);
                        let diff = Math.abs(angle - b.gapAngle);
                        while (diff > Math.PI) diff = Math.abs(diff - Math.PI * 2);
                        if (diff > b.gapSize / 2) endGame();
                    }

                    if (b.nRadius > 1.5) visuals.bullets.splice(i, 1);
                } else if (b.type === 'flare') {
                    b.life -= 0.02 * (state.dt / 16.6);
                    if (b.life <= 0) {
                        visuals.bullets.splice(i, 1);
                    } else if (player.isDiving) {
                        // Collision with flare (only inner ring)
                        const angle = Math.atan2(py - height/2, px - width/2);
                        let diff = Math.abs(angle - b.angle);
                        while (diff > Math.PI) diff = Math.abs(diff - Math.PI * 2);
                        if (diff < 0.2) endGame();
                    }
                }
            }

            // Telegraphs
            const currAudioTime = audioCtx ? audioCtx.currentTime : performance.now() / 1000;
            for (let i = visuals.telegraphs.length - 1; i >= 0; i--) {
                const t = visuals.telegraphs[i];
                if (t.startTime + t.duration <= currAudioTime) {
                    visuals.telegraphs.splice(i, 1);
                }
            }

            // Screen shake
            visuals.shake *= Math.pow(0.9, state.dt / 16.6);
            visuals.pulse *= Math.pow(0.9, state.dt / 16.6);
        }

        function triggerNearMiss() {
            const now = performance.now();
            if (now - state.lastNearMissTime < 100) return;
            state.lastNearMissTime = now;

            if (visuals.shake < 2) {
                visuals.shake = 4;
                playThump();
            }
        }

        function draw() {
            const currentTime = audioCtx ? audioCtx.currentTime : performance.now() / 1000;
            // Motion trails effect: semi-transparent clear
            const alphaClear = 1.0 - Math.pow(1.0 - 0.25, state.dt / 16.6);
            ctx.fillStyle = `rgba(7, 8, 15, ${alphaClear})`;
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            if (visuals.shake > 0.5) {
                ctx.translate((Math.random() - 0.5) * visuals.shake, (Math.random() - 0.5) * visuals.shake);
            }

            // Core / Star
            const pulseScale = 1.0 + visuals.pulse * 0.12;
            const currentCoreR = coreRadius * pulseScale;

            // Bloom
            const grad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, currentCoreR * 3);
            grad.addColorStop(0, 'rgba(124, 108, 255, 0.3)');
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(width/2, height/2, currentCoreR * 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = COLORS.accent;
            ctx.beginPath();
            ctx.arc(width/2, height/2, currentCoreR, 0, Math.PI * 2);
            ctx.fill();

            // Rings (guidelines)
            ctx.strokeStyle = 'rgba(124, 108, 255, 0.1)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(width/2, height/2, 0.34 * minDim, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(width/2, height/2, 0.20 * minDim, 0, Math.PI * 2);
            ctx.stroke();

            // Player Trail
            ctx.lineWidth = player.collisionRadius * 2 * minDim;
            ctx.lineCap = 'round';
            for (let i = 1; i < player.trail.length; i++) {
                const p1 = player.trail[i-1];
                const p2 = player.trail[i];
                const age = currentTime - p2.time;
                const alpha = Math.max(0, (1.0 - age / 0.3) * 0.5);
                ctx.strokeStyle = `rgba(70, 200, 255, ${alpha})`;
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
            }

            // Player
            const px = width/2 + Math.cos(player.angle) * player.radius * minDim;
            const py = height/2 + Math.sin(player.angle) * player.radius * minDim;
            ctx.fillStyle = COLORS.player;
            ctx.shadowBlur = 10;
            ctx.shadowColor = COLORS.player;
            ctx.beginPath();
            ctx.arc(px, py, player.collisionRadius * minDim, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Bullets
            const beatPhase = (rhythm.nextBeatTime - (audioCtx ? audioCtx.currentTime : 0)) / rhythm.beatDuration;
            const bulletColor = beatPhase > 0.5 ? COLORS.bullet : COLORS.player;

            for (const b of visuals.bullets) {
                if (b.type === 'normal') {
                    ctx.fillStyle = bulletColor;
                    ctx.beginPath();
                    ctx.arc(width/2 + b.nx * minDim, height/2 + b.ny * minDim, b.nr * minDim, 0, Math.PI * 2);
                    ctx.fill();
                } else if (b.type === 'shockwave') {
                    ctx.strokeStyle = bulletColor;
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.arc(width/2, height/2, b.nRadius * minDim, b.gapAngle + b.gapSize/2, b.gapAngle + Math.PI * 2 - b.gapSize/2);
                    ctx.stroke();
                } else if (b.type === 'flare') {
                    ctx.fillStyle = 'rgba(255, 110, 199, ' + b.life + ')';
                    ctx.beginPath();
                    ctx.moveTo(width/2, height/2);
                    ctx.arc(width/2, height/2, flareRadius, b.angle - 0.2, b.angle + 0.2);
                    ctx.fill();
                }
            }

            // Telegraphs
            ctx.lineWidth = 2;
            for (const t of visuals.telegraphs) {
                ctx.strokeStyle = 'rgba(70, 200, 255, 0.8)';
                if (t.type === 'radial') {
                    for (let i = 0; i < t.count; i++) {
                        if (i === t.gap1 || i === t.gap2 || i === (t.gap1+1)%t.count) continue;
                        const angle = (i / t.count) * Math.PI * 2;
                        ctx.beginPath();
                        ctx.moveTo(width/2, height/2);
                        ctx.lineTo(width/2 + Math.cos(angle) * minDim, height/2 + Math.sin(angle) * minDim);
                        ctx.stroke();
                    }
                } else if (t.type === 'arms') {
                    for (let i = 0; i < t.arms; i++) {
                        const angle = t.offset + (i / t.arms) * Math.PI * 2;
                        ctx.beginPath();
                        ctx.moveTo(width/2, height/2);
                        ctx.lineTo(width/2 + Math.cos(angle) * minDim, height/2 + Math.sin(angle) * minDim);
                        ctx.stroke();
                    }
                } else if (t.type === 'shockwave') {
                    ctx.beginPath();
                    ctx.arc(width/2, height/2, 0.4 * minDim, t.gapAngle + t.gapSize/2, t.gapAngle + Math.PI * 2 - t.gapSize/2);
                    ctx.stroke();
                } else if (t.type === 'flare') {
                    ctx.fillStyle = 'rgba(70, 200, 255, 0.3)';
                    ctx.beginPath();
                    ctx.moveTo(width/2, height/2);
                    ctx.arc(width/2, height/2, flareRadius, t.angle - 0.2, t.angle + 0.2);
                    ctx.fill();
                }
            }

            // Particles
            for (const p of visuals.particles) {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;

            ctx.restore();
        }

        // Start loop
        requestAnimationFrame(t => {
            state.lastTime = t;
            requestAnimationFrame(loop);
        });

    </script>
</body>
</html>
