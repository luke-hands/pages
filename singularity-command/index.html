<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Singularity Command</title>
    <style>
        :root {
            --bg: #07080f;
            --well-ui: #7c6cff;
            --city-trail: #46c8ff;
            --missile-danger: #ff6ec7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-touch-callout: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            padding: 2vmin;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            font-size: 3vmin;
            font-weight: bold;
            text-shadow: 0 0 10px var(--city-trail);
        }

        #energy-container {
            position: absolute;
            bottom: 8vw; /* Just above cities */
            left: 5%;
            width: 90%;
            height: 1vmin;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
        }

        #energy-bar {
            width: 100%;
            height: 100%;
            background: var(--well-ui);
            box-shadow: 0 0 10px var(--well-ui);
            transition: width 0.1s linear;
        }

        #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: auto;
            display: block;
        }

        #overlay h1 {
            font-size: 10vmin;
            color: var(--missile-danger);
            text-shadow: 0 0 20px var(--missile-danger);
            margin-bottom: 2rem;
        }

        #overlay p {
            font-size: 4vmin;
            line-height: 1.6;
            color: #fff;
            cursor: pointer;
        }

        #pause-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10vmin;
            color: #fff;
            text-shadow: 0 0 20px var(--well-ui);
            display: none;
            pointer-events: none;
            font-weight: bold;
            letter-spacing: 1vmin;
        }

        @media (pointer: coarse) {
            .top-bar {
                font-size: 5vmin;
                padding: 1vmin;
            }

            #energy-container {
                height: 2vmin;
                bottom: 12vw;
            }

            #overlay h1 {
                font-size: 8vmin;
            }

            #overlay p {
                font-size: 5vmin;
            }
        }
    </style>
<style>
  /* --- Back to Gallery Floating Button --- */
  .back-to-gallery {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 99999;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: rgba(7, 8, 15, 0.6);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(232, 234, 242, 0.15);
    border-radius: 999px;
    color: #e8eaf2;
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    pointer-events: auto;
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
  }
  .back-to-gallery:hover {
    background: rgba(124, 108, 255, 0.2);
    border-color: rgba(124, 108, 255, 0.6);
    color: #ffffff;
    box-shadow: 0 0 15px rgba(124, 108, 255, 0.5);
    transform: translateX(-50%) translateY(-1px);
  }
  .back-to-gallery:active {
    transform: translateX(-50%) translateY(1px);
  }
  @media (max-width: 768px) {
    .back-to-gallery {
      top: 15px;
      padding: 6px 12px;
      font-size: 12px;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .back-to-gallery {
      transition: none;
    }
  }
</style>
</head>
<body>
    <a href="../index.html" class="back-to-gallery" aria-label="Back to Gallery">&larr; Back to Gallery</a>

    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div class="top-bar">
            <div id="score">SCORE: 0</div>
            <div id="best">BEST: 0</div>
        </div>
        <div id="energy-container">
            <div id="energy-bar"></div>
        </div>
        <div id="overlay">
            <h1>SINGULARITY COMMAND</h1>
            <p>
                DEFEND THE CITIES<br>
                HOLD TO ATTRACT MISSILES<br>
                ENERGY DRAINS WHILE ACTIVE<br><br>
                TAP TO START
            </p>
        </div>
        <div id="pause-indicator">PAUSED</div>
    </div>

    <script>
        // Constants & Configuration
        const COLORS = {
            bg: '#07080f',
            well: '#7c6cff',
            city: '#46c8ff',
            trail: '#46c8ff',
            missile: '#ff6ec7'
        };

        // DOM Elements
        const el = {
            energyBar: document.getElementById('energy-bar'),
            score: document.getElementById('score'),
            best: document.getElementById('best'),
            overlay: document.getElementById('overlay'),
            pause: document.getElementById('pause-indicator')
        };

        // Game State
        const state = {
            score: 0,
            best: 0,
            wave: 1,
            cities: [],
            missiles: [],
            stars: [],
            particles: [],
            well: null,
            energy: 1.0,
            isGameOver: false,
            isPaused: false,
            isStarted: false,
            lastTime: 0,
            shake: 0,
            timeScale: 1.0,
            vw: 0,
            vh: 0,
            waveMissilesRemaining: 0,
            spawnTimer: 0,
            chainMultiplier: 1,
            lastSwallowTime: 0,
            timeScaleTimeout: null
        };

        // Initialization
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let dpr = 1;

        function resize() {
            dpr = Math.min(window.devicePixelRatio || 1, 2);
            state.vw = window.innerWidth;
            state.vh = window.innerHeight;
            canvas.width = state.vw * dpr;
            canvas.height = state.vh * dpr;
            ctx.scale(dpr, dpr);

            initStars();

            if (state.cities.length === 0) {
                initCities();
            } else {
                const spacing = state.vw / 7;
                for (let i = 0; i < state.cities.length; i++) {
                    state.cities[i].x = spacing * (i + 1);
                    state.cities[i].y = state.vh;
                    state.cities[i].radius = state.vw * 0.03;
                }
            }
        }

        function initStars() {
            const count = Math.floor((state.vw * state.vh) / 8000);
            state.stars = [];
            for (let i = 0; i < count; i++) {
                state.stars.push({
                    x: Math.random() * state.vw,
                    y: Math.random() * state.vh,
                    ox: 0, // offset x from lensing
                    oy: 0, // offset y from lensing
                    size: Math.random() * 1.5 + 0.5,
                    brightness: Math.random() * 0.5 + 0.3
                });
            }
        }

        function initCities() {
            state.cities = [];
            const spacing = state.vw / 7;
            for (let i = 1; i <= 6; i++) {
                state.cities.push({
                    x: spacing * i,
                    y: state.vh,
                    radius: state.vw * 0.03, // ~6vw wide total
                    alive: true,
                    shatter: []
                });
            }
        }

        window.addEventListener('resize', resize);
        resize();

        // Audio Placeholder
        let audioCtx = null;
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        // Main Loop
        function loop(t) {
            const dt = Math.min((t - state.lastTime) / 1000, 0.1) * (state.isPaused ? 0 : state.timeScale);
            state.lastTime = t;

            if (!state.isPaused) {
                update(dt);
                el.pause.style.display = 'none';
            } else {
                el.pause.style.display = 'block';
            }
            draw();

            requestAnimationFrame(loop);
        }

        const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        function update(dt) {
            if (state.isGameOver) return;

            // Decay shake
            if (state.shake > 0) {
                state.shake *= 0.9;
                if (state.shake < 0.1) state.shake = 0;
            }

            // Update energy
            if (state.well && state.energy > 0) {
                state.energy -= dt / 2.5; // Drains in 2.5s
                if (state.energy <= 0) {
                    state.energy = 0;
                    state.well = null;
                }
            } else if (!state.well && state.energy < 1) {
                state.energy += dt / 4.0; // Refills in 4s
                if (state.energy > 1) state.energy = 1;
            }
            el.energyBar.style.width = (state.energy * 100) + '%';

            updateWell(dt);
            updateMissiles(dt);
            updateStars(dt);
            updateParticles(dt);
            checkWaveProgress(dt);
        }

        function draw() {
            ctx.save();
            if (!reduceMotion && state.shake > 0) {
                const sx = (Math.random() - 0.5) * state.shake * state.vw * 0.015;
                const sy = (Math.random() - 0.5) * state.shake * state.vw * 0.015;
                ctx.translate(sx, sy);
            }

            // Background
            ctx.fillStyle = COLORS.bg;
            ctx.fillRect(0, 0, state.vw, state.vh);

            drawStars();
            drawCities();
            drawMissiles();
            drawParticles();
            drawWell();

            ctx.restore();
        }

        function updateStars(dt) {
            if (!state.well) {
                for (const s of state.stars) {
                    s.ox *= 0.9;
                    s.oy *= 0.9;
                }
                return;
            }

            const wx = state.well.x;
            const wy = state.well.y;
            const influence = state.well.influenceRadius;

            for (const s of state.stars) {
                const dx = wx - s.x;
                const dy = wy - s.y;
                const distSq = dx * dx + dy * dy;
                const dist = Math.sqrt(distSq);

                if (dist < influence) {
                    const force = (1 - dist / influence);
                    const tx = dx * 0.2 * force;
                    const ty = dy * 0.2 * force;
                    s.ox += (tx - s.ox) * 0.1;
                    s.oy += (ty - s.oy) * 0.1;
                } else {
                    s.ox *= 0.9;
                    s.oy *= 0.9;
                }
            }
        }

        // Dummy functions to satisfy the loop until implemented
        function updateWell(dt) {
            if (state.well) {
                state.well.rotation += dt * 2;
                if (state.well.growthTimer > 0) {
                    state.well.growthTimer -= dt;
                } else {
                    // Decay growth back to base
                    const baseCore = state.vw * 0.025;
                    const baseInfluence = state.vw * 0.22;
                    state.well.coreRadius += (baseCore - state.well.coreRadius) * dt * 2;
                    state.well.influenceRadius += (baseInfluence - state.well.influenceRadius) * dt * 2;
                }
            }
        }
        function updateMissiles(dt) {
            for (let i = state.missiles.length - 1; i >= 0; i--) {
                const m = state.missiles[i];

                // Movement
                m.x += m.vx * dt;
                m.y += m.vy * dt;

                // Sine wobble
                m.wobblePhase += dt * 5;
                const wobble = Math.sin(m.wobblePhase) * (state.vw * 0.03) * dt * 10;
                const speed = Math.hypot(m.vx, m.vy) || 1;
                m.x += wobble * (m.vy / speed);
                m.y -= wobble * (m.vx / speed);

                // Trails
                m.trail.push({x: m.x, y: m.y});
                if (m.trail.length > 40) m.trail.shift();

                // Gravity (well influence)
                if (state.well) {
                    const dx = state.well.x - m.x;
                    const dy = state.well.y - m.y;
                    const distSq = dx * dx + dy * dy;
                    const dist = Math.sqrt(distSq);
                    const influence = state.well.influenceRadius;

                    if (dist < influence) {
                        const G = state.vw * 400;
                        const accel = G / Math.max(distSq, (state.vw * 0.06) ** 2);
                        const cap = 2000;
                        const a = Math.min(accel, cap);
                        m.vx += (dx / dist) * a * dt;
                        m.vy += (dy / dist) * a * dt;

                        // Swallow check
                        const missileSpeed = Math.hypot(m.vx, m.vy);
                        if (dist < state.well.coreRadius + (missileSpeed * dt * 0.5)) {
                            swallowMissile(i);
                            continue;
                        }
                    }
                }

                // Off-screen removal
                if (m.x < -100 || m.x > state.vw + 100 || m.y < -100) {
                    state.missiles.splice(i, 1);
                    continue;
                }

                // Ground/City hit
                if (m.y >= state.vh) {
                    explodeMissile(m, i);
                    continue;
                }

                // Splitters logic
                if (m.isSplitter && !m.hasSplit && m.y > state.vh * m.splitAt) {
                    spawnSplitChildren(m);
                    state.missiles.splice(i, 1);
                }
            }
        }

        function spawnMissile(side) {
            const aliveCities = state.cities.filter(c => c.alive);
            if (aliveCities.length === 0) return;
            const targetCity = aliveCities[Math.floor(Math.random() * aliveCities.length)];

            let startX;
            if (side === 'left') startX = 0;
            else if (side === 'right') startX = state.vw;
            else startX = Math.random() * state.vw;

            const startY = -20;

            const dx = targetCity.x - startX;
            const dy = targetCity.y - startY;
            const dist = Math.hypot(dx, dy);

            const baseSpeed = (0.12 + (state.wave - 1) * 0.08) * state.vh;
            const speed = Math.min(baseSpeed, 0.32 * state.vh);

            const isSplitter = state.wave >= 4 && Math.random() < 0.25;

            state.missiles.push({
                x: startX,
                y: startY,
                vx: (dx / dist) * speed,
                vy: (dy / dist) * speed,
                trail: [],
                wobblePhase: Math.random() * Math.PI * 2,
                isSplitter: isSplitter,
                hasSplit: false,
                splitAt: 0.4 + Math.random() * 0.2
            });
            state.waveMissilesRemaining--;
        }

        function spawnSplitChildren(m) {
            const count = 2 + Math.floor(Math.random() * 2);
            for (let i = 0; i < count; i++) {
                const angle = (Math.random() - 0.5) * 0.5;
                const cos = Math.cos(angle);
                const sin = Math.sin(angle);
                state.missiles.push({
                    x: m.x,
                    y: m.y,
                    vx: m.vx * cos - m.vy * sin,
                    vy: m.vx * sin + m.vy * cos,
                    trail: [{x: m.x, y: m.y}],
                    wobblePhase: Math.random() * Math.PI * 2,
                    isSplitter: false,
                    hasSplit: true
                });
            }
        }

        function swallowMissile(index) {
            const m = state.missiles[index];
            state.missiles.splice(index, 1);

            const now = Date.now();
            if (now - state.lastSwallowTime < 1000) {
                state.chainMultiplier++;
            } else {
                state.chainMultiplier = 1;
            }
            state.lastSwallowTime = now;

            state.score += 100 * state.chainMultiplier;
            updateScoreUI();

            if (state.well) {
                state.well.coreRadius = Math.min(state.well.coreRadius * 1.15, state.vw * 0.05);
                state.well.influenceRadius = Math.min(state.well.influenceRadius * 1.15, state.vw * 0.44);
                state.well.growthTimer = 1.5;
            }

            createShockwave(m.x, m.y);
            playThoom();
            state.shake = Math.min(state.shake + 0.5 * state.chainMultiplier, 1.5);
            hitStop();
        }

        function explodeMissile(m, index) {
            state.missiles.splice(index, 1);

            let hitCity = false;
            for (const c of state.cities) {
                if (c.alive && Math.hypot(m.x - c.x, m.y - state.vh) < c.radius) {
                    c.alive = false;
                    hitCity = true;
                    shatterCity(c);
                    break;
                }
            }

            createExplosion(m.x, m.y, hitCity ? COLORS.city : COLORS.missile);

            if (hitCity) {
                state.shake = 2.0;
                if (!reduceMotion) slowMo(300);
                checkGameOver();
            }
        }

        function checkWaveProgress(dt) {
            if (!state.isStarted) return;
            if (state.waveMissilesRemaining > 0) {
                state.spawnTimer -= dt;
                if (state.spawnTimer <= 0) {
                    if (state.wave >= 6 && Math.random() < 0.4) {
                        // Multi-vector volleys
                        if (state.waveMissilesRemaining > 0) spawnMissile('left');
                        if (state.waveMissilesRemaining > 0) spawnMissile('right');
                        state.spawnTimer = 0.8 + Math.random() * 1.2;
                    } else {
                        spawnMissile();
                        state.spawnTimer = 0.4 + Math.random() * 1.1;
                    }
                }
            } else if (state.missiles.length === 0 && !state.isGameOver) {
                const aliveCities = state.cities.filter(c => c.alive).length;
                state.score += 250 + 100 * aliveCities;
                updateScoreUI();
                state.wave++;
                startWave();
            }
        }

        function startWave() {
            state.waveMissilesRemaining = 6 + 2 * state.wave;
            state.spawnTimer = 1.0;
        }

        function updateScoreUI() {
            el.score.textContent = `SCORE: ${state.score}`;
            if (state.score > state.best) {
                state.best = state.score;
                el.best.textContent = `BEST: ${state.best}`;
                try { localStorage.setItem('singularity_best', state.best); } catch(e){}
            }
        }

        function checkGameOver() {
            if (state.cities.every(c => !c.alive)) {
                state.isGameOver = true;
                const overlayH1 = el.overlay.querySelector('h1');
                const overlayP = el.overlay.querySelector('p');
                overlayH1.textContent = 'GAME OVER';
                overlayP.innerHTML = 'TAP TO RESTART';
                el.overlay.style.display = 'block';
            }
        }

        function updateParticles(dt) {
            for (let i = state.particles.length - 1; i >= 0; i--) {
                const p = state.particles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= dt / p.maxLife;
                if (p.life <= 0) state.particles.splice(i, 1);
            }
        }

        function createShockwave(x, y) {
            state.particles.push({
                type: 'shockwave',
                x: x,
                y: y,
                radius: state.vw * 0.1,
                life: 1.0,
                maxLife: 0.5,
                color: '#fff',
                vx: 0, vy: 0
            });
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 20; i++) {
                state.particles.push({
                    type: 'spark',
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 400,
                    vy: (Math.random() - 0.5) * 400,
                    size: Math.random() * 3 + 1,
                    life: 1.0,
                    maxLife: 0.5 + Math.random() * 0.5,
                    color: color
                });
            }
        }

        function shatterCity(city) {
            for (let i = 0; i < 30; i++) {
                const angle = Math.random() * Math.PI;
                const dist = Math.random() * city.radius;
                state.particles.push({
                    type: 'fragment',
                    x: city.x + Math.cos(angle) * dist,
                    y: city.y - Math.sin(angle) * dist,
                    vx: (Math.random() - 0.5) * 200,
                    vy: -Math.random() * 300,
                    size: Math.random() * 4 + 2,
                    life: 1.0,
                    maxLife: 1.0 + Math.random(),
                    color: COLORS.city
                });
            }
        }

        function hitStop() {
            if (state.timeScaleTimeout) clearTimeout(state.timeScaleTimeout);
            state.timeScale = 0;
            state.timeScaleTimeout = setTimeout(() => {
                if (!state.isGameOver) state.timeScale = 1.0;
                state.timeScaleTimeout = null;
            }, 50);
        }

        function slowMo(duration) {
            if (state.timeScaleTimeout) clearTimeout(state.timeScaleTimeout);
            state.timeScale = 0.3;
            state.timeScaleTimeout = setTimeout(() => {
                if (!state.isGameOver) state.timeScale = 1.0;
                state.timeScaleTimeout = null;
            }, duration);
        }

        function playThoom() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.5);

            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(200, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.5);

            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function drawStars() {
            ctx.fillStyle = '#fff';
            for (const s of state.stars) {
                ctx.globalAlpha = s.brightness;
                ctx.beginPath();
                ctx.arc(s.x + s.ox, s.y + s.oy, s.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;
        }

        function drawCities() {
            for (const c of state.cities) {
                if (!c.alive) continue;
                ctx.strokeStyle = COLORS.city;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 10;
                ctx.shadowColor = COLORS.city;
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.radius, Math.PI, 0);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }

        function drawMissiles() {
            ctx.shadowBlur = 5;
            for (const m of state.missiles) {
                if (m.trail.length > 1) {
                    ctx.beginPath();
                    ctx.strokeStyle = COLORS.trail;
                    ctx.lineWidth = 2;
                    ctx.shadowColor = COLORS.trail;
                    ctx.moveTo(m.trail[0].x, m.trail[0].y);
                    for (let i = 1; i < m.trail.length; i++) {
                        ctx.lineTo(m.trail[i].x, m.trail[i].y);
                    }
                    ctx.stroke();
                }
                ctx.fillStyle = COLORS.missile;
                ctx.shadowColor = COLORS.missile;
                ctx.beginPath();
                ctx.arc(m.x, m.y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
        }

        function drawParticles() {
            for (const p of state.particles) {
                ctx.globalAlpha = p.life;
                if (p.type === 'shockwave') {
                    ctx.strokeStyle = p.color;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * (1 - p.life), 0, Math.PI * 2);
                    ctx.stroke();
                } else {
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                }
            }
            ctx.globalAlpha = 1.0;
        }
        function drawWell() {
            if (!state.well) return;

            const { x, y, coreRadius, influenceRadius } = state.well;

            // Accretion Disk / Influence
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(state.well.rotation);

            // Influence ring
            ctx.strokeStyle = COLORS.well;
            ctx.globalAlpha = 0.1;
            ctx.setLineDash([5, 10]);
            ctx.beginPath();
            ctx.arc(0, 0, influenceRadius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);

            // Pulsing ring if growing
            if (state.well.growthTimer > 0) {
                ctx.globalAlpha = state.well.growthTimer / 1.5 * 0.5;
                ctx.beginPath();
                ctx.arc(0, 0, coreRadius * 2, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Core
            ctx.globalAlpha = 1.0;
            ctx.shadowBlur = 15;
            ctx.shadowColor = COLORS.well;

            // Outer glow
            const grad = ctx.createRadialGradient(0, 0, coreRadius * 0.8, 0, 0, coreRadius * 1.5);
            grad.addColorStop(0, '#000');
            grad.addColorStop(1, COLORS.well);
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(0, 0, coreRadius * 1.5, 0, Math.PI * 2);
            ctx.fill();

            // Black core
            ctx.fillStyle = '#000';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(0, 0, coreRadius, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // Controls
        function handleStart(x, y, pointerType) {
            initAudio();

            let targetY = y;
            if (pointerType === 'touch') {
                targetY -= Math.min(state.vw, state.vh) * 0.12;
            }

            if (!state.isStarted) {
                state.isStarted = true;
                el.overlay.style.display = 'none';
            }
            if (state.isGameOver) {
                restart();
                return;
            }
            if (state.energy > 0.1) {
                state.well = {
                    x: x,
                    y: targetY,
                    coreRadius: state.vw * 0.025,
                    influenceRadius: state.vw * 0.22,
                    rotation: 0,
                    growthTimer: 0
                };
            }
        }

        function handleMove(x, y, pointerType) {
            if (state.well) {
                let targetY = y;
                if (pointerType === 'touch') {
                    targetY -= Math.min(state.vw, state.vh) * 0.12;
                }
                state.well.x = x;
                state.well.y = targetY;
            }
        }

        function handleEnd() {
            state.well = null;
        }

        window.addEventListener('pointerdown', e => handleStart(e.clientX, e.clientY, e.pointerType));
        window.addEventListener('pointermove', e => handleMove(e.clientX, e.clientY, e.pointerType));
        window.addEventListener('pointerup', handleEnd);
        window.addEventListener('pointercancel', handleEnd);
        window.addEventListener('blur', () => {
            handleEnd();
            state.isPaused = true;
        });

        window.addEventListener('keydown', e => {
            if (e.code === 'Space' && state.isGameOver) restart();
            if (e.key.toLowerCase() === 'p') state.isPaused = !state.isPaused;
        });

        document.addEventListener('visibilitychange', () => {
            state.isPaused = document.hidden;
            if (!document.hidden) {
                state.lastTime = performance.now();
            }
        });

        function restart() {
            state.isGameOver = false;
            state.isStarted = true;
            state.score = 0;
            state.wave = 1;
            state.energy = 1.0;
            state.missiles = [];
            state.particles = [];
            state.well = null;
            state.timeScale = 1.0;
            state.shake = 0;
            state.chainMultiplier = 1;
            state.lastSwallowTime = 0;
            if (state.timeScaleTimeout) {
                clearTimeout(state.timeScaleTimeout);
                state.timeScaleTimeout = null;
            }
            initCities();
            startWave();
            updateScoreUI();
            el.overlay.style.display = 'none';
        }

        // Load Best Score
        try {
            state.best = parseInt(localStorage.getItem('singularity_best')) || 0;
            el.best.textContent = `BEST: ${state.best}`;
        } catch (e) {}

        startWave();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
