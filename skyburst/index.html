<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Skyburst</title>
    <style>
        :root {
            --bg: #07080f;
            --fg: #e8eaf2;
            --accent-violet: #7c6cff;
            --accent-cyan: #46c8ff;
            --accent-pink: #ff6ec7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            overflow: hidden;
            touch-action: none;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        #score-container {
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        #score {
            font-size: 32px;
            font-weight: 800;
            color: var(--fg);
        }

        #best-score {
            font-size: 18px;
            color: var(--accent-cyan);
            opacity: 0.8;
        }

        #overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(7, 8, 15, 0.4);
            backdrop-filter: blur(4px);
            z-index: 20;
            transition: opacity 0.3s ease;
        }

        #overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #msg {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            line-height: 1.5;
        }

        .highlight { color: var(--accent-violet); }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score-container">
            <div id="score">0m</div>
            <div id="best-score">BEST 0m</div>
        </div>
    </div>

    <div id="overlay">
        <div id="msg">
            SKYBURST<br>
            <span style="font-size: 16px; font-weight: normal; color: #8a90a6;">tap or press any key to start</span>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('best-score');
        const overlayEl = document.getElementById('overlay');
        const msgEl = document.getElementById('msg');

        let width, height, dpr;
        let lastTime = performance.now();
        let gameActive = false;
        let altitude = 0;
        let bestAltitude = 0;
        let stealMultiplier = 1;
        let shake = 0;
        let hitStop = 0;
        let flash = 0;
        let history = []; // for chasing bursts

        const COLORS = ['#7c6cff', '#46c8ff', '#ff6ec7'];

        // Audio
        let audioCtx = null;
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playPop() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(100 + Math.random() * 50, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function playSteal() {
            if (!audioCtx) return;
            [440, 554.37, 659.25].forEach((f, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.05);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime + i * 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.05 + 0.2);
                osc.start(audioCtx.currentTime + i * 0.05);
                osc.stop(audioCtx.currentTime + i * 0.05 + 0.2);
            });
        }

        class Comet {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = width / 2;
                this.y = height * 0.7;
                this.targetX = this.x;
                this.targetY = this.y;
                this.vx = 0;
                this.vy = 0;
                this.radius = 6;
                this.hitRadius = this.radius * 0.6;
                this.trail = [];
                this.maxTrail = 20;
            }
            update(dt) {
                // Responsive mouse easing
                const omega = 15; // responsive speed
                const n1 = this.vx - (this.x - this.targetX) * omega * omega * dt;
                const n2 = 1 + omega * dt;
                this.vx = n1 / (n2 * n2);
                this.x += this.vx * dt;

                const m1 = this.vy - (this.y - this.targetY) * omega * omega * dt;
                const m2 = 1 + omega * dt;
                this.vy = m1 / (m2 * m2);
                this.y += this.vy * dt;

                // Bounds
                this.x = Math.max(this.radius, Math.min(width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(height - this.radius, this.y));

                this.trail.push({x: this.x, y: this.y});
                if (this.trail.length > this.maxTrail) this.trail.shift();
            }
            draw() {
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';

                // Trail
                ctx.beginPath();
                this.trail.forEach((p, i) => {
                    const ratio = i / this.trail.length;
                    const size = ratio * this.radius;
                    ctx.lineTo(p.x, p.y);
                    ctx.lineWidth = size * 2;
                    ctx.strokeStyle = `rgba(255, 255, 255, ${ratio * 0.4})`;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                });

                // Comet head
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#fff';
                ctx.fill();
                ctx.restore();
            }
        }

        class Shell {
            constructor(altitude) {
                this.id = Math.random();
                this.x = Math.random() * width;
                this.y = height + 50;
                this.speed = height * 1.2;
                this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                this.life = 1.5 + Math.random() * 1.5;
                this.maxLife = this.life;
                this.radius = 8;
                this.dead = false;
                this.isChaser = false;
            }
            update(dt) {
                this.y -= this.speed * dt;
                this.life -= dt;
                if (this.life <= 0) {
                    this.dead = true;
                    this.detonate();
                }
            }
            detonate() {
                const type = altitude < 1000 ? 'ring' : (altitude < 2000 ? (Math.random() < 0.6 ? 'ring' : 'spiral') : (Math.random() < 0.4 ? 'ring' : (Math.random() < 0.7 ? 'spiral' : 'willow')));
                spawnBurst(this.x, this.y, this.color, type);
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                // Shell
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();

                // Fuse ring
                ctx.beginPath();
                ctx.arc(0, 0, this.radius + 6, -Math.PI/2, -Math.PI/2 + (this.life / this.maxLife) * Math.PI * 2);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.restore();
            }
        }

        class Fragment {
            constructor(x, y, vx, vy, color, type) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.type = type; // ring, spiral, willow, sparkle
                this.life = 2.5 + Math.random() * 1.5;
                this.maxLife = this.life;
                this.radius = height * 0.012;
                this.history = [];
                this.dead = false;
            }
            update(dt) {
                this.history.push({x: this.x, y: this.y});
                if (this.history.length > 10) this.history.shift();

                if (this.type === 'willow' || this.type === 'sparkle') {
                    this.vy += 200 * dt; // gravity
                }

                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.life -= dt;
                if (this.life <= 0) this.dead = true;
            }
            draw() {
                const alpha = Math.min(1, this.life * 2);
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';

                // Trail
                if (this.history.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.history[0].x, this.history[0].y);
                    for (let i = 1; i < this.history.length; i++) {
                        ctx.lineTo(this.history[i].x, this.history[i].y);
                    }
                    ctx.strokeStyle = this.color;
                    ctx.globalAlpha = alpha * 0.3;
                    ctx.lineWidth = this.type === 'sparkle' ? 1 : 2;
                    ctx.stroke();
                }

                // Fragment
                if (this.type !== 'sparkle') {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff';
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = this.color;
                    ctx.globalAlpha = alpha;
                    ctx.fill();
                } else {
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = alpha;
                    ctx.fillRect(this.x - 1, this.y - 1, 2, 2);
                }

                ctx.restore();
            }
        }

        let comet = new Comet();
        let shells = [];
        let fragments = [];
        let sparkles = [];
        let stars = [];
        let spawnTimer = 0;
        let score = 0;

        function initStars() {
            stars = Array.from({length: 100}, () => ({
                x: Math.random() * width,
                y: Math.random() * height,
                z: Math.random() * 0.5 + 0.1,
                size: Math.random() * 2
            }));
        }

        function spawnBurst(x, y, color, type) {
            playPop();
            shake = Math.max(shake, 5);
            const count = 16 + Math.floor(Math.random() * 16) * (1 + Math.min(altitude / 3000, 1) * 0.25);
            const speed = height * 0.35 * (1 + Math.min(altitude / 3000, 1) * 0.08);

            if (type === 'ring') {
                for (let i = 0; i < count; i++) {
                    const angle = (i / count) * Math.PI * 2;
                    fragments.push(new Fragment(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed, color, 'ring'));
                }
            } else if (type === 'spiral') {
                const arms = 2 + Math.floor(Math.random() * 3);
                for (let a = 0; a < arms; a++) {
                    const offset = (a / arms) * Math.PI * 2;
                    for (let i = 0; i < count / arms; i++) {
                        const angle = offset + (i / (count / arms)) * Math.PI * 0.5;
                        const s = speed * (0.5 + 0.5 * (i / (count / arms)));
                        fragments.push(new Fragment(x, y, Math.cos(angle) * s, Math.sin(angle) * s, color, 'spiral'));
                    }
                }
            } else if (type === 'willow') {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const s = speed * (0.4 + Math.random() * 0.6);
                    fragments.push(new Fragment(x, y, Math.cos(angle) * s, Math.sin(angle) * s, color, 'willow'));
                }
            }

            // Decorative sparkles
            for (let i = 0; i < 50; i++) {
                const angle = Math.random() * Math.PI * 2;
                const s = speed * Math.random() * 1.5;
                sparkles.push(new Fragment(x, y, Math.cos(angle) * s, Math.sin(angle) * s, color, 'sparkle'));
            }
        }

        try {
            bestAltitude = parseInt(localStorage.getItem('skyburst-best')) || 0;
            bestScoreEl.textContent = `BEST ${bestAltitude}m`;
        } catch (e) {}

        function resize() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
        }

        window.addEventListener('resize', () => {
            resize();
            initStars();
        });
        resize();
        initStars();

        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        let touchStartX = 0;
        let touchStartY = 0;
        let cometStartX = 0;
        let cometStartY = 0;

        window.addEventListener('pointermove', e => {
            if (e.pointerType === 'mouse') {
                comet.targetX = e.clientX;
                comet.targetY = e.clientY;
            } else {
                // Touch relative movement
                const dx = (e.clientX - touchStartX) * 1.2;
                const dy = (e.clientY - touchStartY) * 1.2;
                comet.targetX = cometStartX + dx;
                comet.targetY = cometStartY + dy;
            }
        });

        window.addEventListener('pointerdown', e => {
            if (e.pointerType !== 'mouse') {
                touchStartX = e.clientX;
                touchStartY = e.clientY;
                cometStartX = comet.targetX;
                cometStartY = comet.targetY;
            }
            start();
        });

        // Prevent scrolling on touch
        window.addEventListener('touchmove', e => e.preventDefault(), {passive: false});

        function update(dt) {
            if (!gameActive) return;

            if (hitStop > 0) {
                hitStop -= dt;
                return;
            }

            if (flash > 0) flash -= dt;
            if (shake > 0) shake -= dt * 10;

            const climbRate = 90; // m/s
            const scrollSpeed = height * 0.25; // pixels/s

            // Keyboard steering
            const kSpeed = height * 1.0;
            if (keys['ArrowLeft'] || keys['KeyA']) comet.targetX -= kSpeed * dt;
            if (keys['ArrowRight'] || keys['KeyD']) comet.targetX += kSpeed * dt;
            if (keys['ArrowUp'] || keys['KeyW']) comet.targetY -= kSpeed * dt;
            if (keys['ArrowDown'] || keys['KeyS']) comet.targetY += kSpeed * dt;

            comet.update(dt);

            // Save history for chasing bursts (store world position)
            history.push({
                x: comet.x,
                y: comet.y - altitude * (scrollSpeed / climbRate),
                t: performance.now()
            });
            if (history.length > 500) history.shift();

            // Scoring & Scrolling
            altitude += climbRate * dt;
            score = Math.floor(altitude);
            scoreEl.textContent = `${score}m`;

            // Starfield
            stars.forEach(s => {
                s.y += scrollSpeed * 0.4 * s.z * dt * 10;
                if (s.y > height) {
                    s.y = 0;
                    s.x = Math.random() * width;
                }
            });

            // Collisions
            shells.forEach(s => {
                if (s.dead) return;
                const dist = Math.hypot(comet.x - s.x, comet.y - s.y);
                if (dist < comet.hitRadius + s.radius) {
                    // Steal!
                    s.dead = true;
                    altitude += 250 * stealMultiplier;
                    stealMultiplier++;
                    flash = 0.08;
                    hitStop = 0.09;
                    shake = 10;
                    playSteal();

                    // Delayed chasing burst
                    const theftTime = performance.now();
                    const targetT = theftTime - 400; // where you were 0.4s ago
                    let bestP = history[0];
                    for (let p of history) {
                        if (Math.abs(p.t - targetT) < Math.abs(bestP.t - targetT)) bestP = p;
                    }

                    const worldY = bestP.y;
                    const worldX = bestP.x;

                    setTimeout(() => {
                        if (!gameActive) return;
                        // Calculate current screen Y from world Y
                        const currentScreenY = worldY + altitude * (scrollSpeed / climbRate);
                        spawnBurst(worldX, currentScreenY, s.color, 'ring');
                    }, 2500);
                }
            });

            // Spawning
            spawnTimer -= dt;
            if (spawnTimer <= 0) {
                const maxShells = Math.min(5, 1 + Math.floor(altitude / 500));
                const interval = Math.max(0.4, (0.8 + Math.random() * 1.2) * Math.pow(0.9, altitude / 500));

                if (shells.filter(s => !s.isChaser).length < maxShells) {
                    const s = new Shell(altitude);
                    s.y = height + 100; // start below screen
                    shells.push(s);
                }
                spawnTimer = interval;
            }

            // Updates
            const dy = scrollSpeed * dt;
            shells.forEach(s => {
                s.y += dy; // world scroll
                s.update(dt);
            });
            fragments.forEach(f => {
                f.y += dy; // world scroll
                f.update(dt);
            });
            sparkles.forEach(s => {
                s.y += dy; // world scroll
                s.update(dt);
            });

            // Cleanup
            shells = shells.filter(s => !s.dead && s.y > -200 && s.y < height + 500);
            fragments = fragments.filter(f => !f.dead && f.y > -200 && f.y < height + 500);
            sparkles = sparkles.filter(s => !s.dead && s.y > -200 && s.y < height + 500);

            // Death collision
            for (let f of fragments) {
                const d = Math.hypot(comet.x - f.x, comet.y - f.y);
                if (d < comet.hitRadius + f.radius) {
                    gameOver();
                    break;
                }
            }
        }

        function gameOver() {
            if (!gameActive) return;
            gameActive = false;

            // Shatter effect
            for (let i = 0; i < 50; i++) {
                const angle = Math.random() * Math.PI * 2;
                const s = 200 * Math.random();
                sparkles.push(new Fragment(comet.x, comet.y, Math.cos(angle) * s, Math.sin(angle) * s, '#fff', 'sparkle'));
            }
            shake = 20;

            if (altitude > bestAltitude) {
                bestAltitude = Math.floor(altitude);
                bestScoreEl.textContent = `BEST ${bestAltitude}m`;
                try {
                    localStorage.setItem('skyburst-best', bestAltitude);
                } catch (e) {}
            }

            msgEl.innerHTML = `ALTITUDE <span class="highlight">${Math.floor(altitude)}m</span><br>BEST ${bestAltitude}m<br><span style="font-size: 16px; font-weight: normal; color: #8a90a6;">tap or press any key to try again</span>`;

            // Short delay before allowing restart to prevent accidental double-tap
            setTimeout(() => {
                overlayEl.classList.remove('hidden');
            }, 500);
        }

        function draw() {
            ctx.fillStyle = '#07080f';
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            if (shake > 0) {
                ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
            }

            // Stars
            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                ctx.globalAlpha = s.z;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            });
            ctx.globalAlpha = 1;

            sparkles.forEach(s => s.draw());
            shells.forEach(s => s.draw());
            fragments.forEach(f => f.draw());
            comet.draw();

            ctx.restore();

            if (flash > 0) {
                ctx.fillStyle = `rgba(255, 255, 255, ${flash * 10})`;
                ctx.fillRect(0, 0, width, height);
            }
        }

        function loop(timestamp) {
            const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
            lastTime = timestamp;

            update(dt);
            draw();

            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);

        function start() {
            if (gameActive) return;
            initAudio();
            gameActive = true;
            overlayEl.classList.add('hidden');
            altitude = 0;
            stealMultiplier = 1;
            shells = [];
            fragments = [];
            sparkles = [];
            history = [];
            comet.reset();
        }

        window.addEventListener('keydown', start);
        window.addEventListener('pointerdown', start);

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                lastTime = performance.now();
            }
        });
    </script>
</body>
</html>
