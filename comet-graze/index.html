<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Comet Graze</title>
<style>
  :root {
    --bg: #07080f;
    --violet: #7c6cff;
    --cyan: #46c8ff;
    --pink: #ff6ec7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body, html {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: var(--bg);
    touch-action: none;
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  #ui {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    color: white;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    z-index: 10;
  }
  .score-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 1.2rem;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(70, 200, 255, 0.5);
  }
  .difficulty-badge {
    font-size: 0.8rem;
    font-weight: 900;
    letter-spacing: 0.1em;
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    border: 1px solid currentColor;
    text-shadow: none;
    box-shadow: 0 0 10px currentColor;
    text-transform: uppercase;
  }
  .difficulty-badge.easy {
    color: var(--cyan);
  }
  .difficulty-badge.medium {
    color: var(--violet);
  }
  .difficulty-badge.hard {
    color: var(--pink);
  }
  #restart-prompt {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.5s, visibility 0.5s;
    background: rgba(7, 8, 15, 0.4);
    pointer-events: auto;
    z-index: 15;
  }
  #restart-prompt.visible {
    opacity: 1;
    visibility: visible;
  }
  .multiplier-display {
    position: absolute;
    left: 28%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
  }
  #multiplier-text {
    font-size: 2rem;
    font-weight: 900;
    font-style: italic;
  }
  #meter-container {
    width: 60px;
    height: 6px;
    background: rgba(255, 255, 255, 0.2);
    margin-top: 4px;
    border-radius: 3px;
    overflow: hidden;
  }
  #meter-fill {
    width: 0%;
    height: 100%;
    background: var(--cyan);
    box-shadow: 0 0 10px var(--cyan);
  }

  /* Start Screen Styles */
  #start-screen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
    background: rgba(7, 8, 15, 0.6);
    backdrop-filter: blur(4px);
    z-index: 20;
    transition: opacity 0.5s, visibility 0.5s;
  }
  #start-screen.hidden {
    opacity: 0;
    visibility: hidden;
  }
  .title {
    font-size: clamp(2.5rem, 10vw, 4rem);
    font-weight: 900;
    color: var(--cyan);
    text-shadow: 0 0 20px var(--cyan);
    margin-bottom: 2rem;
    letter-spacing: 0.1em;
  }
  .instructions {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .instruction-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: 1.2rem;
    font-weight: bold;
  }
  .action {
    background: var(--pink);
    color: white;
    padding: 0.4rem 0.8rem;
    border-radius: 4px;
    min-width: 100px;
    text-align: center;
    box-shadow: 0 0 15px var(--pink);
  }
  .desc {
    color: var(--violet);
  }
  .goal {
    font-size: 0.9rem;
    color: white;
    opacity: 0.8;
    margin-bottom: 1.5rem;
    letter-spacing: 0.05em;
  }
  .difficulty-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }
  .difficulty-label {
    font-size: 0.8rem;
    color: var(--violet);
    font-weight: bold;
    letter-spacing: 0.15em;
  }
  .difficulty-buttons {
    display: flex;
    gap: 0.8rem;
  }
  .diff-btn {
    background: transparent;
    border: 2px solid rgba(124, 108, 255, 0.3);
    color: rgba(255, 255, 255, 0.6);
    padding: 0.5rem 1.2rem;
    font-size: 0.9rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s ease-in-out;
  }
  .diff-btn:hover {
    color: white;
    border-color: rgba(124, 108, 255, 0.8);
    background: rgba(124, 108, 255, 0.1);
  }
  .diff-btn.active[data-diff="easy"] {
    color: white;
    border-color: var(--cyan);
    background: rgba(70, 200, 255, 0.2);
    box-shadow: 0 0 15px rgba(70, 200, 255, 0.4);
  }
  .diff-btn.active[data-diff="medium"] {
    color: white;
    border-color: var(--violet);
    background: rgba(124, 108, 255, 0.2);
    box-shadow: 0 0 15px rgba(124, 108, 255, 0.4);
  }
  .diff-btn.active[data-diff="hard"] {
    color: white;
    border-color: var(--pink);
    background: rgba(255, 110, 199, 0.2);
    box-shadow: 0 0 15px rgba(255, 110, 199, 0.4);
  }
  #start-prompt {
    font-size: 1.5rem;
    color: var(--cyan);
    font-weight: bold;
  }
  .pulse {
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.95); }
    100% { opacity: 1; transform: scale(1); }
  }
</style>
<style>
  /* --- Back to Gallery Floating Button --- */
  .back-to-gallery {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 99999;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: rgba(7, 8, 15, 0.6);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(232, 234, 242, 0.15);
    border-radius: 999px;
    color: #e8eaf2;
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    pointer-events: auto;
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
  }
  .back-to-gallery:hover {
    background: rgba(124, 108, 255, 0.2);
    border-color: rgba(124, 108, 255, 0.6);
    color: #ffffff;
    box-shadow: 0 0 15px rgba(124, 108, 255, 0.5);
    transform: translateX(-50%) translateY(-1px);
  }
  .back-to-gallery:active {
    transform: translateX(-50%) translateY(1px);
  }
  @media (max-width: 768px) {
    .back-to-gallery {
      top: 15px;
      padding: 6px 12px;
      font-size: 12px;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .back-to-gallery {
      transition: none;
    }
  }
</style>
</head>
<body>
    <a href="../index.html" class="back-to-gallery" aria-label="Back to Gallery">&larr; Back to Gallery</a>

<div id="ui">
  <div class="score-container">
    <div id="current-score">Score: 0</div>
    <div id="difficulty-badge" class="difficulty-badge hard">HARD</div>
    <div id="best-score">Best: 0</div>
  </div>
  <div class="multiplier-display" id="multiplier-ui">
    <div id="multiplier-text">1x</div>
    <div id="meter-container">
      <div id="meter-fill"></div>
    </div>
  </div>
  <div id="restart-prompt">
    <div style="font-size: 3rem; font-weight: 900; color: var(--pink); text-shadow: 0 0 20px var(--pink); margin-bottom: 1rem;">SHATTERED</div>
    <div id="restart-text" style="color: var(--cyan); font-weight: bold; font-size: 1.2rem;" class="pulse">Tap or Space to Restart</div>
  </div>
  <div id="start-screen">
    <h1 class="title">COMET GRAZE</h1>
    <div class="instructions">
      <div class="instruction-row">
        <span class="action" id="action-text">HOLD</span>
        <span class="desc">TO DIVE</span>
      </div>
      <div class="instruction-row">
        <span class="action">RELEASE</span>
        <span class="desc">TO CLIMB</span>
      </div>
    </div>
    <div class="goal">GRAZE EDGES TO MULTIPLY</div>
    <div class="difficulty-container">
      <div class="difficulty-label">DIFFICULTY</div>
      <div class="difficulty-buttons">
        <button class="diff-btn" data-diff="easy">EASY</button>
        <button class="diff-btn" data-diff="medium">MEDIUM</button>
        <button class="diff-btn active" data-diff="hard">HARD</button>
      </div>
    </div>
    <div id="start-prompt" class="pulse">Tap or Space to Start</div>
  </div>
</div>
<canvas id="gameCanvas"></canvas>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  const PLAYER_X_PCT = 0.28;
  const DIVE_ACCEL = 1.7;
  const CLIMB_ACCEL = -1.3;
  const MAX_SPEED = 0.55;
  const GRAZE_BAND = 0.035;
  const MULTIPLIERS = [1, 2, 4, 8, 16];
  const MAX_PARTICLES = 100;
  const MAX_TRAIL = 200;

  let width, height, dpr;
  let score = 0, bestScore = 0;
  let currentDifficulty = 'hard';
  let bestScores = {
    easy: 0,
    medium: 0,
    hard: 0
  };
  let prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  let gameActive = false, gameOver = false, paused = false;
  let lastTime = 0, gameElapsed = 0, vTime = 0, hitStop = 0;
  let isPressing = false;
  let dieTimeout = null;

  const player = {
    y: 0.5, vy: 0, radius: 0.012,
    multiplier: 1, multiplierIdx: 0,
    grazeMeter: 0, safetyTimer: 0,
  };

  const trailX = new Float32Array(MAX_TRAIL);
  const trailY = new Float32Array(MAX_TRAIL);
  let trailIdx = 0, trailCount = 0;

  const particles = {
    x: new Float32Array(MAX_PARTICLES), y: new Float32Array(MAX_PARTICLES),
    vx: new Float32Array(MAX_PARTICLES), vy: new Float32Array(MAX_PARTICLES),
    life: new Float32Array(MAX_PARTICLES), active: new Uint8Array(MAX_PARTICLES),
  };

  const shatters = {
    x: new Float32Array(MAX_PARTICLES), y: new Float32Array(MAX_PARTICLES),
    vx: new Float32Array(MAX_PARTICLES), vy: new Float32Array(MAX_PARTICLES),
    r: new Float32Array(MAX_PARTICLES), life: new Float32Array(MAX_PARTICLES), active: new Uint8Array(MAX_PARTICLES),
  };

  let scrollX = 0, scrollSpeed = 0.45, gapHeight = 0.48, caveParams = [];

  const DIFFICULTY_SETTINGS = {
    easy: {
      initSpeed: 0.30,
      maxSpeed: 0.50,
      speedGrowth: 1.008,
      initGap: 0.60,
      minGap: 0.32,
      shrinkDuration: 150,
      ampScale: 0.50
    },
    medium: {
      initSpeed: 0.38,
      maxSpeed: 0.68,
      speedGrowth: 1.011,
      initGap: 0.54,
      minGap: 0.24,
      shrinkDuration: 120,
      ampScale: 0.75
    },
    hard: {
      initSpeed: 0.45,
      maxSpeed: 0.85,
      speedGrowth: 1.015,
      initGap: 0.34,
      minGap: 0.17,
      shrinkDuration: 90,
      ampScale: 1.00
    }
  };

  const COLORS = ['#7c6cff', '#46c8ff', '#46c8ff', '#ff6ec7', '#ffffff'];
  const UI = {
    score: document.getElementById('current-score'),
    best: document.getElementById('best-score'),
    multText: document.getElementById('multiplier-text'),
    meter: document.getElementById('meter-fill'),
    restart: document.getElementById('restart-prompt'),
    start: document.getElementById('start-screen'),
    badge: document.getElementById('difficulty-badge')
  };

  let audioCtx;
  function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  function playBleep(tier) {
    if (!audioCtx || audioCtx.state === 'suspended') return;
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(440 + tier * 110, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
  }

  function initCave() {
    const settings = DIFFICULTY_SETTINGS[currentDifficulty] || DIFFICULTY_SETTINGS.hard;
    const scale = settings.ampScale;
    caveParams = [
      { amp: (0.08 + Math.random() * 0.04) * scale, freq: 0.4 + Math.random() * 0.2, phase: Math.random() * Math.PI * 2 },
      { amp: (0.04 + Math.random() * 0.02) * scale, freq: 1.0 + Math.random() * 0.5, phase: Math.random() * Math.PI * 2 },
      { amp: (0.01 + Math.random() * 0.01) * scale, freq: 2.5 + Math.random() * 1.0, phase: Math.random() * Math.PI * 2 }
    ];
    scrollX = 0;
    scrollSpeed = settings.initSpeed;
    gapHeight = settings.initGap;
  }

  function getCenterline(x) {
    let y = 0.5;
    for (let i = 0; i < caveParams.length; i++) {
        const p = caveParams[i];
        y += Math.sin(x * p.freq + p.phase) * p.amp;
    }
    return y;
  }

  try {
    const savedEasy = localStorage.getItem('comet-graze-best-easy');
    if (savedEasy) bestScores.easy = parseInt(savedEasy, 10) || 0;

    const savedMedium = localStorage.getItem('comet-graze-best-medium');
    if (savedMedium) bestScores.medium = parseInt(savedMedium, 10) || 0;

    const savedHard = localStorage.getItem('comet-graze-best-hard');
    const legacySaved = localStorage.getItem('comet-graze-best');
    if (savedHard) {
      bestScores.hard = parseInt(savedHard, 10) || 0;
    } else if (legacySaved) {
      bestScores.hard = parseInt(legacySaved, 10) || 0;
      localStorage.setItem('comet-graze-best-hard', legacySaved);
    }

    const savedDiff = localStorage.getItem('comet-graze-difficulty');
    if (savedDiff && ['easy', 'medium', 'hard'].includes(savedDiff)) {
      currentDifficulty = savedDiff;
    }
    bestScore = bestScores[currentDifficulty];
    UI.best.textContent = `Best: ${bestScore}`;
  } catch (e) {}

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    width = window.innerWidth; height = window.innerHeight;
    canvas.width = width * dpr; canvas.height = height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  if (isTouch) {
    document.getElementById('action-text').textContent = 'HOLD';
    document.getElementById('start-prompt').textContent = 'Tap to Start';
    document.getElementById('restart-text').textContent = 'Tap to Restart';
  }

  function handleDown(e) {
    if (e && e.target && e.target.closest('.diff-btn')) return;
    if (e) e.preventDefault();
    initAudio(); if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (!gameActive && !paused && !gameOver) {
        startGame();
    } else if (gameOver && !dieTimeout) {
        startGame();
    }
    isPressing = true;
  }
  function handleUp(e) { if (e) e.preventDefault(); isPressing = false; }

  // Set up difficulty buttons event handling
  const diffButtons = document.querySelectorAll('.diff-btn');
  diffButtons.forEach(btn => {
    // We want to handle both click and touchend on buttons
    const selectDifficulty = (e) => {
      e.preventDefault();
      e.stopPropagation(); // Stop propagation so we don't trigger game start

      const newDiff = btn.getAttribute('data-diff');
      if (['easy', 'medium', 'hard'].includes(newDiff)) {
        currentDifficulty = newDiff;
        bestScore = bestScores[currentDifficulty];

        // Update active class
        diffButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Update header UI
        UI.best.textContent = `Best: ${bestScore}`;
        UI.badge.textContent = currentDifficulty;
        UI.badge.className = `difficulty-badge ${currentDifficulty}`;

        // Save choice
        try {
          localStorage.setItem('comet-graze-difficulty', currentDifficulty);
        } catch (err) {}
      }
    };
    btn.addEventListener('click', selectDifficulty);
    btn.addEventListener('touchstart', selectDifficulty, {passive: false});
  });

  // To keep UI in sync with loaded saved difficulty
  function syncDifficultyUI() {
    diffButtons.forEach(btn => {
      if (btn.getAttribute('data-diff') === currentDifficulty) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
    UI.best.textContent = `Best: ${bestScore}`;
    UI.badge.textContent = currentDifficulty;
    UI.badge.className = `difficulty-badge ${currentDifficulty}`;
  }
  syncDifficultyUI();

  window.addEventListener('keydown', (e) => { if (e.code === 'Space' && !e.repeat) handleDown(e); });
  window.addEventListener('keyup', (e) => { if (e.code === 'Space') handleUp(e); });
  window.addEventListener('mousedown', (e) => { if (e.button === 0) handleDown(e); });
  window.addEventListener('mouseup', (e) => { if (e.button === 0) handleUp(e); });
  canvas.addEventListener('touchstart', handleDown, {passive: false});
  canvas.addEventListener('touchend', (e) => { if (e.touches.length === 0) handleUp(e); }, {passive: false});
  canvas.addEventListener('touchcancel', (e) => { if (e.touches.length === 0) handleUp(e); }, {passive: false});

  function startGame() {
    if (dieTimeout) { clearTimeout(dieTimeout); dieTimeout = null; }
    gameActive = true; gameOver = false; paused = false; score = 0;
    player.y = 0.5; player.vy = 0; player.multiplier = 1; player.multiplierIdx = 0;
    player.grazeMeter = 0; player.safetyTimer = 0;
    trailCount = 0; trailIdx = 0;
    particles.active.fill(0); shatters.active.fill(0);
    initCave();
    lastTime = performance.now(); gameElapsed = 0;

    UI.restart.classList.remove('visible');
    UI.start.classList.add('hidden');

    updateUI();
  }

  function loop(t) {
    let dt = Math.min((t - lastTime) / 1000, 0.1);
    lastTime = t;
    if (paused) { requestAnimationFrame(loop); return; }
    vTime += dt;
    if (hitStop > 0) { hitStop -= dt; requestAnimationFrame(loop); return; }
    if (gameOver) {
        dt *= 0.25;
        for (let i = 0; i < MAX_PARTICLES; i++) {
            if (shatters.active[i]) {
                shatters.x[i] += shatters.vx[i] * dt; shatters.y[i] += shatters.vy[i] * dt;
                shatters.life[i] -= dt * 1.5; if (shatters.life[i] <= 0) shatters.active[i] = 0;
            }
        }
    }
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function update(dt) {
    if (!gameActive) {
      scrollX += scrollSpeed * dt;
      return;
    }
    gameElapsed += dt;
    const settings = DIFFICULTY_SETTINGS[currentDifficulty] || DIFFICULTY_SETTINGS.hard;
    scrollSpeed = settings.initSpeed * Math.pow(settings.speedGrowth, Math.floor(gameElapsed / 5));
    scrollSpeed = Math.min(scrollSpeed, settings.maxSpeed);
    gapHeight = settings.initGap - (settings.initGap - settings.minGap) * Math.min(gameElapsed / settings.shrinkDuration, 1);
    scrollX += scrollSpeed * dt;
    player.vy += (isPressing ? DIVE_ACCEL : CLIMB_ACCEL) * dt;
    player.vy = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, player.vy));
    player.y += player.vy * dt;
    const cy = getCenterline(scrollX + PLAYER_X_PCT), tw = cy - gapHeight / 2, bw = cy + gapHeight / 2;
    const isGrazing = Math.abs((player.y - player.radius) - tw) < GRAZE_BAND || Math.abs((player.y + player.radius) - bw) < GRAZE_BAND;
    if (player.y - player.radius < tw || player.y + player.radius > bw) { die(); return; }
    if (isGrazing) {
        player.safetyTimer = 0; player.grazeMeter += dt;
        if (player.grazeMeter >= 1.2) {
            if (player.multiplierIdx < MULTIPLIERS.length - 1) {
                player.multiplierIdx++; player.multiplier = MULTIPLIERS[player.multiplierIdx];
                player.grazeMeter = 0; hitStop = 0.033; playBleep(player.multiplierIdx);
            } else player.grazeMeter = 1.2;
        }
        if (Math.random() > 0.3) spawnParticle(PLAYER_X_PCT, (Math.abs((player.y - player.radius) - tw) < GRAZE_BAND ? tw : bw));
    } else {
        if (player.grazeMeter > 0) { player.grazeMeter = Math.max(0, player.grazeMeter - dt * 2); }
        else if (player.multiplierIdx > 0) {
            player.safetyTimer += dt;
            if (player.safetyTimer >= 1.5) { player.multiplierIdx--; player.multiplier = MULTIPLIERS[player.multiplierIdx]; player.safetyTimer = 0; }
        }
    }
    score += dt * 10 * player.multiplier;
    trailX[trailIdx] = PLAYER_X_PCT; trailY[trailIdx] = player.y;
    trailIdx = (trailIdx + 1) % MAX_TRAIL; trailCount = Math.min(trailCount + 1, 10 + player.multiplierIdx * 15);
    for (let i = 0; i < MAX_PARTICLES; i++) {
        if (particles.active[i]) {
            particles.x[i] += particles.vx[i] * dt; particles.y[i] += particles.vy[i] * dt;
            particles.life[i] -= dt * 2; if (particles.life[i] <= 0) particles.active[i] = 0;
        }
    }
    updateUI();
  }

  function spawnParticle(x, y) {
    for (let i = 0; i < MAX_PARTICLES; i++) {
        if (!particles.active[i]) {
            particles.x[i] = x; particles.y[i] = y;
            particles.vx[i] = -scrollSpeed * 0.5 - Math.random() * 0.2;
            particles.vy[i] = (Math.random() - 0.5) * 0.1;
            particles.life[i] = 1.0; particles.active[i] = 1; return;
        }
    }
  }

  function updateUI() {
    UI.score.textContent = `Score: ${Math.floor(score)}`;
    UI.multText.textContent = `${player.multiplier}x`;
    UI.meter.style.width = `${(player.grazeMeter / 1.2) * 100}%`;
    UI.multText.style.color = COLORS[player.multiplierIdx];
    UI.meter.style.backgroundColor = COLORS[player.multiplierIdx];
  }

  function die() {
    if (!gameActive) return;
    gameActive = false; gameOver = true;
    for (let i = 0; i < 40; i++) {
        shatters.x[i] = PLAYER_X_PCT; shatters.y[i] = player.y;
        shatters.vx[i] = (Math.random() - 0.5) * 0.6; shatters.vy[i] = (Math.random() - 0.5) * 0.6;
        shatters.r[i] = Math.random() * 0.01 + 0.005; shatters.life[i] = 1.0; shatters.active[i] = 1;
    }
    dieTimeout = setTimeout(() => {
        UI.restart.classList.add('visible');
        dieTimeout = null;
    }, 600);
    if (score > bestScore) {
        bestScore = Math.floor(score);
        bestScores[currentDifficulty] = bestScore;
        UI.best.textContent = `Best: ${bestScore}`;
        try {
            localStorage.setItem(`comet-graze-best-${currentDifficulty}`, bestScore);
            if (currentDifficulty === 'hard') {
                localStorage.setItem('comet-graze-best', bestScore); // keep in sync with legacy key
            }
        } catch (e) {}
    }
  }

  function draw() {
    ctx.fillStyle = '#07080f'; ctx.fillRect(0, 0, width, height);
    const pulse = prefersReducedMotion ? 1 : 1 + 0.03 * Math.sin(vTime * Math.PI * 4);
    ctx.save(); if (gameOver && !prefersReducedMotion) ctx.translate(Math.random() * 10 - 5, Math.random() * 10 - 5);
    if (caveParams.length > 0) drawCave(pulse);
    if (gameActive) {
        ctx.strokeStyle = COLORS[player.multiplierIdx]; ctx.lineWidth = height * player.radius * 1.5; ctx.lineCap = 'round';
        ctx.beginPath();
        for (let i = 0; i < trailCount; i++) {
            const idx = (trailIdx - trailCount + i + MAX_TRAIL) % MAX_TRAIL;
            const tx = (trailX[idx] - (trailCount - i) * 0.004) * width;
            if (i === 0) ctx.moveTo(tx, trailY[idx] * height); else ctx.lineTo(tx, trailY[idx] * height);
        }
        ctx.stroke();
    }
    ctx.fillStyle = '#46c8ff';
    for (let i = 0; i < MAX_PARTICLES; i++) {
        if (particles.active[i]) { ctx.globalAlpha = particles.life[i]; ctx.fillRect(particles.x[i] * width, particles.y[i] * height, 2, 2); }
    }
    ctx.globalAlpha = 1.0;
    if (gameActive || (!gameOver && !gameActive)) {
        ctx.fillStyle = '#ff6ec7'; ctx.shadowBlur = 15; ctx.shadowColor = '#ff6ec7';
        ctx.beginPath(); ctx.arc(width * PLAYER_X_PCT, height * player.y, height * player.radius, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
    } else if (gameOver) {
        ctx.fillStyle = '#ff6ec7';
        for (let i = 0; i < MAX_PARTICLES; i++) {
            if (shatters.active[i]) { ctx.globalAlpha = shatters.life[i]; ctx.beginPath(); ctx.arc(shatters.x[i] * width, shatters.y[i] * height, shatters.r[i] * height, 0, Math.PI * 2); ctx.fill(); }
        }
        ctx.globalAlpha = 1.0;
    }
    ctx.restore();
  }

  function drawCave(pulse) {
    const steps = 60, stepSize = 1.2 / steps;
    ctx.strokeStyle = '#7c6cff'; ctx.lineWidth = 3 * pulse; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.shadowBlur = 10 * pulse; ctx.shadowColor = '#7c6cff';
    ctx.beginPath();
    for (let i = 0; i <= steps; i++) {
      const x = i * stepSize, wy = (getCenterline(scrollX + x) - gapHeight / 2) * height;
      if (i === 0) ctx.moveTo(x * width, wy); else ctx.lineTo(x * width, wy);
    }
    ctx.stroke();
    ctx.beginPath();
    for (let i = 0; i <= steps; i++) {
      const x = i * stepSize, wy = (getCenterline(scrollX + x) + gapHeight / 2) * height;
      if (i === 0) ctx.moveTo(x * width, wy); else ctx.lineTo(x * width, wy);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(124, 108, 255, 0.05)'; ctx.beginPath();
    for (let i = 0; i <= steps; i++) {
        const x = i * stepSize; ctx.lineTo(x * width, (getCenterline(scrollX + x) - gapHeight / 2) * height);
    }
    for (let i = steps; i >= 0; i--) {
        const x = i * stepSize; ctx.lineTo(x * width, (getCenterline(scrollX + x) + gapHeight / 2) * height);
    }
    ctx.closePath(); ctx.fill();
  }

  document.addEventListener('visibilitychange', () => {
      if (document.hidden) { paused = true; }
      else { paused = false; lastTime = performance.now(); }
  });

  initCave();
  lastTime = performance.now();
  requestAnimationFrame(loop);
</script>
</body>
</html>
