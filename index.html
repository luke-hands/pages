<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Luke Hands — personal site. A gallery of browser toys and games.">
<title>Luke Hands — Gallery</title>
<style>
  :root {
    --bg: #07080f;
    --fg: #e8eaf2;
    --muted: #8a90a6;
    --accent-1: #7c6cff;
    --accent-2: #46c8ff;
    --accent-3: #ff6ec7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  canvas#sky {
    position: fixed;
    inset: 0;
    display: block;
    z-index: 0;
  }

  .glow {
    position: fixed;
    left: 50%;
    top: 50%;
    width: 70vmax;
    height: 70vmax;
    transform: translate(-50%, -50%);
    background:
      radial-gradient(closest-side, rgba(124, 108, 255, 0.14), transparent 70%),
      radial-gradient(closest-side at 35% 60%, rgba(70, 200, 255, 0.10), transparent 70%),
      radial-gradient(closest-side at 65% 40%, rgba(255, 110, 199, 0.07), transparent 70%);
    filter: blur(10px);
    pointer-events: none;
    animation: breathe 9s ease-in-out infinite;
    z-index: 0;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
    50%      { opacity: 1;   transform: translate(-50%, -50%) scale(1.06); }
  }

  header {
    position: relative;
    z-index: 1;
    padding: 4rem 2rem 2rem;
    text-align: center;
  }

  h1 {
    font-size: clamp(2.5rem, 8vw, 4rem);
    font-weight: 800;
    margin-bottom: 0.5rem;
    background: linear-gradient(100deg, var(--fg) 20%, var(--accent-2) 45%, var(--accent-1) 60%, var(--fg) 85%);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    animation: shimmer 7s linear infinite;
  }

  @keyframes shimmer {
    0%   { background-position: 0% 0; }
    100% { background-position: -200% 0; }
  }

  .subtitle {
    color: var(--muted);
    font-size: 1.1rem;
    max-width: 600px;
    margin: 0 auto;
  }

  main {
    position: relative;
    z-index: 1;
    max-width: 1000px;
    margin: 0 auto;
    padding: 2rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.5rem;
  }

  .card {
    background: rgba(232, 234, 242, 0.04);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(232, 234, 242, 0.12);
    border-radius: 16px;
    padding: 1.5rem;
    text-decoration: none;
    color: inherit;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: var(--accent-1);
    background: rgba(124, 108, 255, 0.08);
    box-shadow: 0 10px 30px -10px rgba(124, 108, 255, 0.3);
  }

  .card h2 {
    font-size: 1.5rem;
    color: var(--fg);
  }

  .card p {
    color: var(--muted);
    line-height: 1.5;
  }

  footer {
    position: relative;
    z-index: 1;
    padding: 4rem 2rem 2rem;
    text-align: center;
    font-size: 0.8rem;
    color: var(--muted);
  }

  @media (prefers-reduced-motion: reduce) {
    .glow, h1 { animation: none; }
    .card:hover { transform: none; }
  }
</style>
</head>
<body>
<canvas id="sky" aria-hidden="true"></canvas>
<div class="glow" aria-hidden="true"></div>

<header>
  <h1>Luke Hands</h1>
  <p class="subtitle">A collection of small browser toys and games.</p>
</header>

<main>
  <a href="./asteroids/" class="card">
    <h2>Asteroids</h2>
    <p>Retro space shooter with wraparound physics and jagged rocks.</p>
  </a>
  <a href="./last-light/" class="card">
    <h2>Last Light</h2>
    <p>Sweep a lone lighthouse beam through the dark to burn away the creeping shadow-swarm.</p>
  </a>
</main>

<footer>
  <p>© <span id="year"></span> Luke Hands • <a href="https://github.com/luke-hands" style="color: inherit;">GitHub</a></p>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  // --- constellation background -------------------------------------------
  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');
  const mouse = { x: null, y: null };
  const LINK_DIST = 130;
  let stars = [], width, height, dpr;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const count = Math.min(160, Math.floor((width * height) / 11000));
    stars = Array.from({ length: count }, () => ({
      x: Math.random() * width,
      y: Math.random() * height,
      vx: (Math.random() - 0.5) * 0.18,
      vy: (Math.random() - 0.5) * 0.18,
      r: 0.6 + Math.random() * 1.4,
      tw: Math.random() * Math.PI * 2,
    }));
  }

  window.addEventListener('resize', resize);
  window.addEventListener('pointermove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  window.addEventListener('pointerleave', () => { mouse.x = mouse.y = null; });
  resize();

  function frame(t) {
    ctx.clearRect(0, 0, width, height);

    for (const s of stars) {
      s.x += s.vx;
      s.y += s.vy;
      if (s.x < -10) s.x = width + 10; else if (s.x > width + 10) s.x = -10;
      if (s.y < -10) s.y = height + 10; else if (s.y > height + 10) s.y = -10;

      const twinkle = 0.55 + 0.45 * Math.sin(s.tw + t / 900);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200, 210, 255, ${0.5 * twinkle})`;
      ctx.fill();
    }

    for (let i = 0; i < stars.length; i++) {
      for (let j = i + 1; j < stars.length; j++) {
        const a = stars[i], b = stars[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const dist = Math.hypot(dx, dy);
        if (dist > LINK_DIST) continue;

        let alpha = (1 - dist / LINK_DIST) * 0.14;
        if (mouse.x !== null) {
          const mx = (a.x + b.x) / 2 - mouse.x;
          const my = (a.y + b.y) / 2 - mouse.y;
          if (Math.hypot(mx, my) < 160) alpha *= 3;
        }
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = `rgba(124, 140, 255, ${alpha})`;
        ctx.stroke();
      }
    }

    requestAnimationFrame(frame);
  }

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (!reduceMotion) {
    requestAnimationFrame(frame);
  } else {
    frame(0);
  }
</script>
</body>
</html>
