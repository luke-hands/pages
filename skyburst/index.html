<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyburst</title>
    <!-- Include PixiJS and Howler.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
    
    <style>
        :root {
            --bg: #07080f;
            --fg: #e8eaf2;
            --accent-violet: #7c6cff;
            --accent-cyan: #46c8ff;
            --accent-pink: #ff6ec7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            overflow: hidden;
            touch-action: none;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            touch-action: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        #score-container {
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        #score {
            font-size: 32px;
            font-weight: 800;
            color: var(--fg);
        }

        #best-score {
            font-size: 18px;
            color: var(--accent-cyan);
            opacity: 0.8;
        }

        #overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(7, 8, 15, 0.4);
            backdrop-filter: blur(4px);
            z-index: 20;
            transition: opacity 0.3s ease;
        }

        #overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #msg {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            line-height: 1.5;
        }

        .highlight { color: var(--accent-violet); }
        
        #flash {
            position: absolute;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 15;
            transition: opacity 0.1s;
        }
    </style>
<style>
  /* --- Back to Gallery Floating Button --- */
  .back-to-gallery {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 99999;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: rgba(7, 8, 15, 0.6);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(232, 234, 242, 0.15);
    border-radius: 999px;
    color: #e8eaf2;
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    pointer-events: auto;
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
  }
  .back-to-gallery:hover {
    background: rgba(124, 108, 255, 0.2);
    border-color: rgba(124, 108, 255, 0.6);
    color: #ffffff;
    box-shadow: 0 0 15px rgba(124, 108, 255, 0.5);
    transform: translateX(-50%) translateY(-1px);
  }
  .back-to-gallery:active {
    transform: translateX(-50%) translateY(1px);
  }
  @media (max-width: 768px) {
    .back-to-gallery {
      top: 15px;
      padding: 6px 12px;
      font-size: 12px;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .back-to-gallery {
      transition: none;
    }
  }
</style>
</head>
<body>
    <a href="../index.html" class="back-to-gallery" aria-label="Back to Gallery">&larr; Back to Gallery</a>

    <div id="ui">
        <div id="score-container">
            <div id="score">0m</div>
            <div id="best-score">BEST 0m</div>
        </div>
    </div>
    <div id="flash"></div>

    <div id="overlay">
        <div id="msg">
            SKYBURST<br>
            <span style="font-size: 14px; font-weight: normal; color: var(--accent-cyan); display: block; margin: 10px 0;">STEAL SHELLS TO CLIMB. AVOID THE BURSTS.</span>
            <span style="font-size: 16px; font-weight: normal; color: #8a90a6;">tap or press any key to start</span>
        </div>
    </div>

    <!-- PixiJS injects its own canvas -->
    <script>
        // ==========================================
        // WAV AUDIO SYNTHESIS FOR HOWLER.JS
        // ==========================================
        function createWavDataUri(samples, sampleRate = 44100) {
            const buffer = new ArrayBuffer(44 + samples.length * 2);
            const view = new DataView(buffer);
            
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };
            
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + samples.length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, samples.length * 2, true);
            
            let offset = 44;
            for (let i = 0; i < samples.length; i++, offset += 2) {
                let s = Math.max(-1, Math.min(1, samples[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
            
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i += 1024) {
                binary += String.fromCharCode.apply(null, bytes.subarray(i, Math.min(i + 1024, bytes.byteLength)));
            }
            return 'data:audio/wav;base64,' + btoa(binary);
        }

        // Generate synthetic sounds
        const sr = 44100;
        
        // Pop sound
        let popLen = Math.floor(sr * 0.3);
        let popSamples = new Float32Array(popLen);
        for(let i = 0; i < popLen; i++) {
            let t = i / sr;
            let freq = 100 + (100 * Math.exp(-t * 30));
            let env = Math.exp(-t * 20);
            popSamples[i] = Math.sin(2 * Math.PI * freq * t) * env;
            // Add some noise for a crackle
            if (t < 0.1) popSamples[i] += (Math.random() * 2 - 1) * 0.5 * Math.exp(-t * 50);
        }
        
        // Steal sound
        let stealLen = Math.floor(sr * 0.3);
        let stealSamples = new Float32Array(stealLen);
        for(let i = 0; i < stealLen; i++) {
            let t = i / sr;
            let env = Math.exp(-t * 15);
            // Major chord sweep
            let p1 = Math.sin(2 * Math.PI * 440 * t);
            let p2 = Math.sin(2 * Math.PI * 554.37 * t);
            let p3 = Math.sin(2 * Math.PI * 659.25 * t);
            stealSamples[i] = ((p1 + p2 + p3) / 3) * env;
        }

        const sounds = {
            pop: new Howl({ src: [createWavDataUri(popSamples)], volume: 0.4 }),
            steal: new Howl({ src: [createWavDataUri(stealSamples)], volume: 0.6 })
        };

        // ==========================================
        // PIXIJS INITIALIZATION
        // ==========================================
        const app = new PIXI.Application({
            resizeTo: window,
            backgroundColor: 0x07080f,
            resolution: window.devicePixelRatio || 1,
            autoDensity: true
        });
        document.body.appendChild(app.view);
        app.view.setAttribute('aria-label', 'Skyburst: Endless comet climber game');
        app.view.setAttribute('role', 'img');

        // Containers
        const worldContainer = new PIXI.Container();
        app.stage.addChild(worldContainer);

        const starsContainer = new PIXI.Container();
        worldContainer.addChild(starsContainer);

        const fragmentsContainer = new PIXI.ParticleContainer(30000, {
            scale: true, position: true, rotation: false, uvs: false, tint: true, alpha: true
        });
        fragmentsContainer.blendMode = PIXI.BLEND_MODES.ADD;
        worldContainer.addChild(fragmentsContainer);

        const entitiesContainer = new PIXI.Container();
        worldContainer.addChild(entitiesContainer);

        // Pre-render textures
        function createGlowTexture(color, radius, coreRadius) {
            const gfx = new PIXI.Graphics();
            const canvas = document.createElement('canvas');
            canvas.width = radius * 2;
            canvas.height = radius * 2;
            const context = canvas.getContext('2d');
            
            const grad = context.createRadialGradient(radius, radius, 0, radius, radius, radius);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(coreRadius/radius, '#ffffff');
            grad.addColorStop(coreRadius/radius + 0.1, color);
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            
            context.fillStyle = grad;
            context.fillRect(0, 0, radius * 2, radius * 2);
            
            return PIXI.Texture.from(canvas);
        }

        const particleTexture = createGlowTexture('#ffffff', 16, 4);
        const starTexture = createGlowTexture('#ffffff', 4, 1);
        const cometTexture = createGlowTexture('#46c8ff', 24, 6);
        const shellTexture = createGlowTexture('#ffffff', 12, 6);

        // ==========================================
        // GAME VARIABLES
        // ==========================================
        const scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('best-score');
        const overlayEl = document.getElementById('overlay');
        const msgEl = document.getElementById('msg');
        const flashEl = document.getElementById('flash');

        let width = window.innerWidth;
        let height = window.innerHeight;
        let gameActive = false;
        let altitude = 0;
        let bestAltitude = 0;
        let stealMultiplier = 1;
        let lastStealTime = 0;
        let shake = 0;
        let hitStop = 0;
        let history = []; 
        let gameOverTimeout = null;
        let burstTimeouts = [];
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        const COLORS = [0x7c6cff, 0x46c8ff, 0xff6ec7, 0xffd700, 0x00ffaa];

        // ==========================================
        // ENTITIES
        // ==========================================
        
        let shells = [];
        let fragments = [];
        let stars = [];
        let spawnTimer = 0;
        let score = 0;

        function initStars() {
            starsContainer.removeChildren();
            stars = [];
            for(let i=0; i<100; i++) {
                const sprite = new PIXI.Sprite(starTexture);
                sprite.anchor.set(0.5);
                sprite.x = Math.random() * width;
                sprite.y = Math.random() * height;
                sprite.z = Math.random() * 0.5 + 0.1;
                sprite.scale.set(sprite.z * 0.5);
                sprite.alpha = sprite.z;
                starsContainer.addChild(sprite);
                stars.push(sprite);
            }
        }

        // The Player
        const comet = {
            sprite: new PIXI.Sprite(cometTexture),
            x: width / 2, y: height * 0.7,
            targetX: width / 2, targetY: height * 0.7,
            vx: 0, vy: 0,
            radius: 6,
            hitRadius: 4,
            reset() {
                this.x = width / 2;
                this.y = height * 0.7;
                this.targetX = this.x;
                this.targetY = this.y;
                this.vx = 0;
                this.vy = 0;
                this.sprite.x = this.x;
                this.sprite.y = this.y;
                this.sprite.anchor.set(0.5);
                this.sprite.tint = 0x46c8ff;
            },
            update(dt) {
                const omega = 15;
                const n1 = this.vx - (this.x - this.targetX) * omega * omega * dt;
                const n2 = 1 + omega * dt;
                this.vx = n1 / (n2 * n2);
                this.x += this.vx * dt;

                const m1 = this.vy - (this.y - this.targetY) * omega * omega * dt;
                const m2 = 1 + omega * dt;
                this.vy = m1 / (m2 * m2);
                this.y += this.vy * dt;

                this.x = Math.max(this.radius, Math.min(width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(height - this.radius, this.y));
                
                this.sprite.x = this.x;
                this.sprite.y = this.y;

                // Trail emission
                if (gameActive && Math.random() < 0.5) {
                    spawnFragment(this.x, this.y, -this.vx*0.1 + (Math.random()-0.5)*50, -this.vy*0.1 + (Math.random()-0.5)*50, 0x46c8ff, 0.5, 0.4);
                }
            }
        };
        entitiesContainer.addChild(comet.sprite);

        class Shell {
            constructor(alt) {
                this.sprite = new PIXI.Sprite(shellTexture);
                this.sprite.anchor.set(0.5);
                this.x = Math.random() * width;
                this.y = height + 50;
                this.speed = height * (1.2 + Math.min(alt / 10000, 0.5));
                this.colorHex = COLORS[Math.floor(Math.random() * COLORS.length)];
                this.sprite.tint = this.colorHex;
                this.life = 1.5 + Math.random() * 1.5;
                this.maxLife = this.life;
                this.radius = 8;
                this.dead = false;
                
                // Outer ring to show fuse
                this.ring = new PIXI.Graphics();
                this.sprite.addChild(this.ring);
                entitiesContainer.addChild(this.sprite);
            }
            update(dt) {
                this.y -= this.speed * dt;
                this.life -= dt;
                
                this.sprite.x = this.x;
                this.sprite.y = this.y;
                
                // Draw fuse
                this.ring.clear();
                this.ring.lineStyle(2, 0xFFFFFF, 1);
                this.ring.arc(0, 0, this.radius + 6, -Math.PI/2, -Math.PI/2 + (this.life / this.maxLife) * Math.PI * 2);
                
                // Trail
                if (Math.random() < 0.3) {
                    spawnFragment(this.x, this.y + 10, (Math.random()-0.5)*20, 100, this.colorHex, 0.3, 0.2);
                }

                if (this.life <= 0) {
                    this.dead = true;
                    this.detonate();
                }
            }
            detonate() {
                const type = altitude < 1000 ? 'ring' : (altitude < 2000 ? (Math.random() < 0.6 ? 'ring' : 'spiral') : (Math.random() < 0.4 ? 'ring' : (Math.random() < 0.7 ? 'spiral' : 'willow')));
                spawnBurst(this.x, this.y, this.colorHex, type);
            }
            destroy() {
                this.sprite.destroy({children: true});
            }
        }

        function spawnFragment(x, y, vx, vy, color, life, scale=0.5, gravity=0, drag=0.98) {
            const f = {
                sprite: new PIXI.Sprite(particleTexture),
                x, y, vx, vy, life, maxLife: life, gravity, drag
            };
            f.sprite.anchor.set(0.5);
            f.sprite.tint = color;
            f.sprite.scale.set(scale);
            f.sprite.x = x;
            f.sprite.y = y;
            fragmentsContainer.addChild(f.sprite);
            fragments.push(f);
        }

        function spawnBurst(x, y, color, type) {
            // Pan based on X position
            let pan = (x / width) * 2 - 1;
            sounds.pop.pos(pan, 0, 0); // basic 3D panning via Howler
            sounds.pop.play();

            if (!prefersReducedMotion) shake = Math.max(shake, 10);
            
            // Massively increased particle count due to PixiJS WebGL
            const count = Math.floor((150 + Math.floor(Math.random() * 200)) * (1 + Math.min(altitude / 3000, 1) * 0.25));
            const speed = height * 0.35 * (1 + Math.min(altitude / 3000, 1) * 0.08);

            if (type === 'ring') {
                for (let i = 0; i < count; i++) {
                    const angle = (i / count) * Math.PI * 2;
                    const rSpeed = speed * (0.8 + Math.random()*0.2);
                    spawnFragment(x, y, Math.cos(angle) * rSpeed, Math.sin(angle) * rSpeed, color, 1.5 + Math.random(), 0.6, 50, 0.95);
                }
            } else if (type === 'spiral') {
                const arms = 3 + Math.floor(Math.random() * 3);
                for (let a = 0; a < arms; a++) {
                    const offset = (a / arms) * Math.PI * 2;
                    for (let i = 0; i < count / arms; i++) {
                        const angle = offset + (i / (count / arms)) * Math.PI * 1.5;
                        const s = speed * (0.2 + 0.8 * (i / (count / arms)));
                        spawnFragment(x, y, Math.cos(angle) * s, Math.sin(angle) * s, color, 1.5 + Math.random(), 0.5, 0, 0.96);
                    }
                }
            } else if (type === 'willow') {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const s = speed * (0.3 + Math.random() * 0.7);
                    spawnFragment(x, y, Math.cos(angle) * s, Math.sin(angle) * s, color, 2.0 + Math.random(), 0.4, 300, 0.92); // high gravity
                }
            }

            // Central flash
            spawnFragment(x, y, 0, 0, 0xFFFFFF, 0.2, 3.0, 0, 1);
        }

        try {
            bestAltitude = parseInt(localStorage.getItem('skyburst-best')) || 0;
            bestScoreEl.textContent = `BEST ${bestAltitude}m`;
        } catch (e) {}

        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            initStars();
        });
        initStars();
        comet.reset();

        // Input Handling
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (!gameActive) start();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        const TOUCH_OFFSET = 60;
        let touchStartX = 0;
        let touchStartY = 0;
        let cometStartX = 0;
        let cometStartY = 0;
        let isTouchOffsetApplied = false;

        window.addEventListener('pointermove', e => {
            if (e.pointerType === 'mouse') {
                comet.targetX = e.clientX;
                comet.targetY = e.clientY;
                isTouchOffsetApplied = false;
            } else {
                const dx = (e.clientX - touchStartX) * 1.5;
                const dy = (e.clientY - touchStartY) * 1.5;
                comet.targetX = cometStartX + dx;
                comet.targetY = cometStartY + dy - TOUCH_OFFSET;
                isTouchOffsetApplied = true;
            }
        });

        window.addEventListener('pointerdown', e => {
            if (!gameActive) {
                start();
                isTouchOffsetApplied = false;
            }
            if (e.pointerType !== 'mouse') {
                touchStartX = e.clientX;
                touchStartY = e.clientY;
                cometStartX = comet.targetX;
                cometStartY = comet.targetY + (isTouchOffsetApplied ? TOUCH_OFFSET : 0);
                comet.targetY = cometStartY - TOUCH_OFFSET;
                isTouchOffsetApplied = true;
            }
        });

        window.addEventListener('touchmove', e => e.preventDefault(), {passive: false});

        // Game Loop
        app.ticker.add((deltaFrames) => {
            const dt = Math.min(app.ticker.deltaMS / 1000, 0.1);
            
            if (!gameActive) {
                comet.update(dt);
                return;
            }

            if (hitStop > 0) {
                hitStop -= dt;
                return;
            }

            if (shake > 0) {
                shake -= dt * 30;
                if (!prefersReducedMotion) {
                    worldContainer.x = (Math.random() - 0.5) * shake;
                    worldContainer.y = (Math.random() - 0.5) * shake;
                }
            } else {
                worldContainer.x = 0;
                worldContainer.y = 0;
            }

            const climbRate = 90; 
            const scrollSpeed = height * 0.25;

            // Keyboard steering
            const kSpeed = height * 1.0;
            if (keys['ArrowLeft'] || keys['KeyA']) comet.targetX -= kSpeed * dt;
            if (keys['ArrowRight'] || keys['KeyD']) comet.targetX += kSpeed * dt;
            if (keys['ArrowUp'] || keys['KeyW']) comet.targetY -= kSpeed * dt;
            if (keys['ArrowDown'] || keys['KeyS']) comet.targetY += kSpeed * dt;

            comet.update(dt);

            if (performance.now() - lastStealTime > 5000) {
                stealMultiplier = 1;
            }

            history.push({
                x: comet.x,
                y: comet.y - altitude * (scrollSpeed / climbRate),
                t: performance.now()
            });
            if (history.length > 500) history.shift();

            altitude += climbRate * dt;
            score = Math.floor(altitude);
            scoreEl.textContent = `${score}m`;

            // Stars
            stars.forEach(s => {
                s.y += scrollSpeed * 0.4 * s.z * dt * 10;
                if (s.y > height) {
                    s.y = 0;
                    s.x = Math.random() * width;
                }
            });

            // Collisions
            shells.forEach(s => {
                if (s.dead) return;
                const dist = Math.hypot(comet.x - s.x, comet.y - s.y);
                if (dist < comet.hitRadius + s.radius + 10) { // generous hitbox
                    s.dead = true;
                    altitude += 250 * stealMultiplier;
                    stealMultiplier++;
                    lastStealTime = performance.now();
                    hitStop = 0.05;
                    shake = 15;
                    
                    let pan = (comet.x / width) * 2 - 1;
                    sounds.steal.pos(pan, 0, 0);
                    sounds.steal.play();

                    flashEl.style.opacity = '0.3';
                    setTimeout(() => { flashEl.style.opacity = '0'; }, 50);

                    // Delayed chasing burst
                    const theftTime = performance.now();
                    const targetT = theftTime - 400;
                    let bestP = history[0];
                    for (let p of history) {
                        if (Math.abs(p.t - targetT) < Math.abs(bestP.t - targetT)) bestP = p;
                    }

                    const worldY = bestP.y;
                    const worldX = bestP.x;

                    const bt = setTimeout(() => {
                        burstTimeouts = burstTimeouts.filter(id => id !== bt);
                        if (!gameActive) return;
                        const currentScreenY = worldY + altitude * (scrollSpeed / climbRate);
                        spawnBurst(worldX, currentScreenY, s.colorHex, 'ring');
                    }, 2000);
                    burstTimeouts.push(bt);
                }
            });

            // Spawning
            spawnTimer -= dt;
            if (spawnTimer <= 0) {
                const maxShells = Math.min(8, 2 + Math.floor(altitude / 500));
                const interval = Math.max(0.3, (0.7 + Math.random() * 1.0) * Math.pow(0.9, altitude / 500));

                if (shells.length < maxShells) {
                    shells.push(new Shell(altitude));
                }
                spawnTimer = interval;
            }

            const dy = scrollSpeed * dt;
            
            for (let i = shells.length - 1; i >= 0; i--) {
                let s = shells[i];
                s.y += dy;
                s.update(dt);
                if (s.dead || s.y < -200 || s.y > height + 500) {
                    s.destroy();
                    shells.splice(i, 1);
                }
            }

            for (let i = fragments.length - 1; i >= 0; i--) {
                let f = fragments[i];
                f.vy += f.gravity * dt;
                f.vx *= Math.pow(f.drag, dt * 60);
                f.vy *= Math.pow(f.drag, dt * 60);
                f.x += f.vx * dt;
                f.y += f.vy * dt + dy; // scroll
                f.life -= dt;
                
                f.sprite.x = f.x;
                f.sprite.y = f.y;
                f.sprite.alpha = Math.min(1, f.life * 2);

                if (f.life <= 0 || f.y > height + 200) {
                    fragmentsContainer.removeChild(f.sprite);
                    fragments.splice(i, 1);
                    continue;
                }

                // Death collision (fragments are deadly)
                const d = Math.hypot(comet.x - f.x, comet.y - f.y);
                // Hitbox based on scale
                if (d < comet.hitRadius + 6 * f.sprite.scale.x) {
                    gameOver();
                }
            }
        });

        function gameOver() {
            if (!gameActive) return;
            gameActive = false;
            
            sounds.pop.pos(0,0,0);
            sounds.pop.play();

            // Shatter effect
            for (let i = 0; i < 200; i++) {
                const angle = Math.random() * Math.PI * 2;
                const s = 400 * Math.random();
                spawnFragment(comet.x, comet.y, Math.cos(angle) * s, Math.sin(angle) * s, 0xFFFFFF, 2.0, 0.8, 100, 0.9);
            }
            shake = 30;
            comet.sprite.alpha = 0; // hide comet

            if (altitude > bestAltitude) {
                bestAltitude = Math.floor(altitude);
                bestScoreEl.textContent = `BEST ${bestAltitude}m`;
                try {
                    localStorage.setItem('skyburst-best', bestAltitude);
                } catch (e) {}
            }

            msgEl.innerHTML = `ALTITUDE <span class="highlight">${Math.floor(altitude)}m</span><br>BEST ${bestAltitude}m<br>
            <span style="font-size: 14px; font-weight: normal; color: var(--accent-cyan); display: block; margin: 10px 0;">STEAL SHELLS TO CLIMB. AVOID THE BURSTS.</span>
            <span style="font-size: 16px; font-weight: normal; color: #8a90a6;">tap or press any key to try again</span>`;

            gameOverTimeout = setTimeout(() => {
                overlayEl.classList.remove('hidden');
            }, 500);
        }

        function start() {
            if (gameActive) return;
            // Howler.js automatically handles Web Audio API unlocks on first interaction!
            
            gameActive = true;
            overlayEl.classList.add('hidden');
            comet.sprite.alpha = 1;

            clearTimeout(gameOverTimeout);
            burstTimeouts.forEach(t => clearTimeout(t));
            burstTimeouts = [];

            altitude = 0;
            stealMultiplier = 1;
            lastStealTime = performance.now();
            
            shells.forEach(s => s.destroy());
            shells = [];
            
            fragments.forEach(f => fragmentsContainer.removeChild(f.sprite));
            fragments = [];
            
            history = [];
            comet.reset();
        }
    </script>
</body>
</html>
