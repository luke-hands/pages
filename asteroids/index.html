<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Asteroids — Luke Hands</title>
    <style>
        :root {
            --bg: #07080f;
            --fg: #e8eaf2;
            --accent: #7c6cff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--fg);
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            user-select: none;
        }

        #score, #lives, #high-score {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(124, 108, 255, 0.5);
        }

        #lives, #high-score {
            font-size: 18px;
            margin-top: 5px;
            color: #46c8ff;
        }

        #high-score {
            color: #ff6ec7;
            margin-top: 2px;
        }

        #game-over, #start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(7, 8, 15, 0.85);
            padding: 2.5rem;
            border: 2px solid var(--accent);
            border-radius: 16px;
            display: none;
            backdrop-filter: blur(12px);
            z-index: 100;
            min-width: 300px;
        }

        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #game-over h1, #start-screen h1 {
            font-size: 3rem;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(to bottom, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
        }

        #game-over p, #start-screen .instructions {
            margin-bottom: 2rem;
            color: #8a90a6;
            line-height: 1.6;
        }

        .instruction-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .key {
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            font-family: monospace;
            color: var(--accent);
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 999px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover {
            background: #6a5ae6;
            transform: scale(1.05);
        }

        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #8a90a6;
            font-size: 0.9rem;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            #controls-hint { display: none; }
        }

        #mobile-controls {
            position: absolute;
            bottom: 40px;
            right: 40px;
            display: none;
            flex-direction: column;
            align-items: flex-end;
            gap: 20px;
            pointer-events: none;
            user-select: none;
            z-index: 10;
        }

        @media (pointer: coarse) {
            #mobile-controls {
                display: flex;
            }
        }

        .mobile-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(7, 8, 15, 0.8) !important;
            border: 3px solid var(--fg) !important;
            color: var(--fg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            padding: 0 !important;
            transition: opacity 0.1s, transform 0.1s;
            pointer-events: auto;
        }

        #fire-btn {
            border-color: #ff6ec7 !important;
            box-shadow: 0 0 20px rgba(255, 110, 199, 0.2);
            color: #ff6ec7;
        }

        #thrust-btn {
            border-color: #46c8ff !important;
            box-shadow: 0 0 20px rgba(70, 200, 255, 0.2);
            color: #46c8ff;
            margin-right: 60px;
        }

        .mobile-btn:active {
            opacity: 0.8;
            transform: scale(0.95);
        }

        #joystick-base {
            position: absolute;
            width: 130px;
            height: 130px;
            background: rgba(124, 108, 255, 0.2);
            border: 2px solid var(--accent);
            border-radius: 50%;
            backdrop-filter: blur(4px);
            left: 120px;
            top: calc(100% - 120px);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            z-index: 20;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(124, 108, 255, 0.2);
            transition: opacity 0.2s;
        }

        @media (pointer: coarse) {
            #joystick-base {
                opacity: 0.4;
                visibility: visible;
            }
        }

        #joystick-knob {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(124, 108, 255, 0.5);
            border: 2px solid var(--accent);
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(124, 108, 255, 0.3);
            transition: left 0.15s ease-out, top 0.15s ease-out;
        }

        #joystick-knob.active {
            transition: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">0</div>
        <div id="lives">Lives: 3</div>
        <div id="high-score">Best: 0</div>
    </div>

    <div id="start-screen">
        <h1>ASTEROIDS</h1>
        <div class="instructions" id="desktop-instructions">
            <div class="instruction-item"><span class="key">Arrows</span> to move & thrust</div>
            <div class="instruction-item"><span class="key">Space</span> to fire</div>
        </div>
        <div class="instructions" id="mobile-instructions" style="display: none;">
            <div class="instruction-item">Joystick to steer</div>
            <div class="instruction-item">Buttons to thrust & fire</div>
        </div>
        <button id="start-btn">START GAME</button>
    </div>

    <div id="game-over">
        <h1>GAME OVER</h1>
        <p>Final Score: <span id="final-score">0</span></p>
        <button id="restart-btn">RESTART</button>
    </div>

    <div id="mobile-controls">
        <button id="fire-btn" class="mobile-btn">FIRE</button>
        <button id="thrust-btn" class="mobile-btn">THRUST</button>
    </div>

    <div id="joystick-base">
        <div id="joystick-knob"></div>
    </div>

    <div id="game-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.2.4/pixi.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-filters@latest/dist/pixi-filters.js"></script>

    <script>
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const highScoreEl = document.getElementById('high-score');
        const gameOverEl = document.getElementById('game-over');
        const startScreenEl = document.getElementById('start-screen');
        const finalScoreEl = document.getElementById('final-score');
        const restartBtn = document.getElementById('restart-btn');
        const startBtn = document.getElementById('start-btn');

        // PixiJS Setup
        const app = new PIXI.Application({
            background: '#07080f',
            resizeTo: window,
            antialias: true,
            resolution: window.devicePixelRatio || 1,
            autoDensity: true,
        });
        document.getElementById('game-container').appendChild(app.view);

        // Matter.js Setup
        const Engine = Matter.Engine,
              World = Matter.World,
              Bodies = Matter.Bodies,
              Body = Matter.Body,
              Composite = Matter.Composite,
              Events = Matter.Events,
              Vector = Matter.Vector;

        const engine = Engine.create();
        engine.gravity.y = 0; // Space has no gravity

        let width = window.innerWidth;
        let height = window.innerHeight;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            app.renderer.resize(width, height);
        }

        window.addEventListener('resize', resize);

        // Constants
        const SHIP_SIZE = 20;
        const SHIP_THRUST = 0.1;
        const SHIP_TURN_SPEED = 360; // degrees per second
        const FRICTION = 0.99;
        const LASER_MAX = 10;
        const LASER_SPD = 500;
        const LASER_DIST = 0.6; // distance as a fraction of screen width
        const ASTEROID_NUM = 3;
        const ASTEROID_SIZE = 100;
        const ASTEROID_SPD = 50;
        const ASTEROID_VERT = 10; // average number of vertices on each asteroid
        const ASTEROID_JAG = 0.4; // jaggedness of the asteroids (0 = none, 1 = lots)

        // Containers for Bloom
        const worldContainer = new PIXI.Container();
        const uiContainer = new PIXI.Container();
        app.stage.addChild(worldContainer);
        app.stage.addChild(uiContainer);

        const bloomFilter = new PIXI.filters.AdvancedBloomFilter({
            threshold: 0.3,
            bloomScale: 1.5,
            brightness: 1,
            blur: 4
        });
        worldContainer.filters = [bloomFilter];

        // State
        let ship = {
            body: null,
            graphics: null,
            thrusting: false,
            canShoot: true,
            targetA: null,
            radius: SHIP_SIZE
        };

        let lasers = [];
        let asteroids = [];
        let score = 0;
        let lives = 3;
        let level = 0;
        let highScore = 0;
        let invulnerableTime = 0;
        let gameActive = false;
        let shakeTime = 0;
        let hitStopTimer = 0;
        let particles = [];

        function createExplosion(x, y, r) {
            const count = 20 + Math.floor(r / 2);
            for (let i = 0; i < count; i++) {
                const p = new PIXI.Graphics();
                p.beginFill(0x7c6cff);
                p.drawCircle(0, 0, Math.random() * 3 + 1);
                p.endFill();
                p.x = x;
                p.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                particles.push({
                    graphics: p,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1.0,
                    decay: Math.random() * 0.02 + 0.02
                });
                worldContainer.addChild(p);
            }
        }

        function drawShipGraphics() {
            if (!ship.graphics) return;
            ship.graphics.clear();

            if (invulnerableTime > 0 && Math.floor(Date.now() / 100) % 2 === 0) {
                return;
            }

            ship.graphics.lineStyle(2, 0x46c8ff);
            ship.graphics.moveTo(SHIP_SIZE * 1.2, 0);
            ship.graphics.lineTo(-SHIP_SIZE * 0.8, -SHIP_SIZE * 0.8);
            ship.graphics.lineTo(-SHIP_SIZE * 0.8, SHIP_SIZE * 0.8);
            ship.graphics.closePath();

            if (ship.thrusting) {
                ship.graphics.beginFill(0x7c6cff);
                ship.graphics.lineStyle(0);
                ship.graphics.moveTo(-SHIP_SIZE * 0.8, -SHIP_SIZE * 0.4);
                ship.graphics.lineTo(-SHIP_SIZE * 1.5, 0);
                ship.graphics.lineTo(-SHIP_SIZE * 0.8, SHIP_SIZE * 0.4);
                ship.graphics.endFill();
            }
        }

        function initShip() {
            if (ship.body) World.remove(engine.world, ship.body);
            if (ship.graphics) worldContainer.removeChild(ship.graphics);

            ship.body = Bodies.polygon(width / 2, height / 2, 3, SHIP_SIZE, {
                frictionAir: 0.05,
                restitution: 0.5,
                label: 'ship',
                inertia: 1000
            });

            World.add(engine.world, ship.body);

            ship.graphics = new PIXI.Graphics();
            drawShipGraphics();
            worldContainer.addChild(ship.graphics);

            ship.canShoot = true;
            ship.targetA = null;
        }

        function createAsteroid(x, y, r, vertices = null) {
            let lvlMult = 1 + level * 0.1;
            let verts = vertices;

            if (!verts) {
                verts = [];
                const numVerts = Math.floor(Math.random() * (ASTEROID_VERT + 1) + ASTEROID_VERT / 2);
                for (let i = 0; i < numVerts; i++) {
                    const angle = (i / numVerts) * Math.PI * 2;
                    const dist = r * (Math.random() * ASTEROID_JAG * 2 + 1 - ASTEROID_JAG);
                    verts.push({ x: Math.cos(angle) * dist, y: Math.sin(angle) * dist });
                }
            }

            const body = Bodies.polygon(x, y, verts.length, r, {
                frictionAir: 0,
                restitution: 0.8,
                label: 'asteroid',
                velocity: {
                    x: (Math.random() - 0.5) * ASTEROID_SPD * lvlMult / 30,
                    y: (Math.random() - 0.5) * ASTEROID_SPD * lvlMult / 30
                }
            });

            const graphics = new PIXI.Graphics();
            drawAsteroidGraphics(graphics, verts);
            worldContainer.addChild(graphics);

            return {
                body: body,
                graphics: graphics,
                radius: r,
                vertices: verts
            };
        }

        function drawAsteroidGraphics(g, verts) {
            g.clear();
            g.lineStyle(2, 0x7c6cff);
            g.moveTo(verts[0].x, verts[0].y);
            for (let i = 1; i < verts.length; i++) {
                g.lineTo(verts[i].x, verts[i].y);
            }
            g.closePath();
        }

        function createAsteroids() {
            // Clean up existing
            asteroids.forEach(a => {
                World.remove(engine.world, a.body);
                worldContainer.removeChild(a.graphics);
            });
            asteroids = [];

            let x, y;
            const num = ASTEROID_NUM + level;
            const exclusionRadius = Math.min(width, height) * 0.25;
            for (let i = 0; i < num; i++) {
                let attempts = 0;
                let shipX = ship.body ? ship.body.position.x : width / 2;
                let shipY = ship.body ? ship.body.position.y : height / 2;
                do {
                    x = Math.floor(Math.random() * width);
                    y = Math.floor(Math.random() * height);
                    attempts++;
                } while (attempts < 100 && Math.hypot(shipX - x, shipY - y) < exclusionRadius);

                const roid = createAsteroid(x, y, Math.ceil(ASTEROID_SIZE / 2));
                asteroids.push(roid);
                World.add(engine.world, roid.body);
            }
        }

        function shootLaser() {
            if (ship.canShoot && lasers.length < LASER_MAX && ship.body) {
                const angle = ship.body.angle;
                const pos = ship.body.position;
                const tipX = pos.x + SHIP_SIZE * 1.2 * Math.cos(angle);
                const tipY = pos.y + SHIP_SIZE * 1.2 * Math.sin(angle);

                const laserBody = Bodies.circle(tipX, tipY, 2, {
                    isSensor: true,
                    label: 'laser',
                    frictionAir: 0,
                    velocity: {
                        x: Math.cos(angle) * LASER_SPD / 60,
                        y: Math.sin(angle) * LASER_SPD / 60
                    }
                });

                const laserGraphics = new PIXI.Graphics();
                laserGraphics.beginFill(0xff6ec7);
                laserGraphics.drawCircle(0, 0, 3);
                laserGraphics.endFill();
                worldContainer.addChild(laserGraphics);

                lasers.push({
                    body: laserBody,
                    graphics: laserGraphics,
                    dist: 0,
                    maxDist: LASER_DIST * width
                });

                World.add(engine.world, laserBody);
                Body.setVelocity(laserBody, {
                    x: Math.cos(angle) * (LASER_SPD / 60),
                    y: Math.sin(angle) * (LASER_SPD / 60)
                });

                playSound(440, 'square', 0.1, 0.05);
            }
            ship.canShoot = false;
        }

        // Input handling
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Touch handling
        function bindControl(btnId, keyCode) {
            const btn = document.getElementById(btnId);
            if (!btn) return;
            const handleStart = (e) => {
                e.preventDefault();
                keys[keyCode] = true;
            };
            const handleEnd = (e) => {
                e.preventDefault();
                keys[keyCode] = false;
            };
            btn.addEventListener('touchstart', handleStart, { passive: false });
            btn.addEventListener('touchend', handleEnd, { passive: false });
            btn.addEventListener('touchcancel', handleEnd, { passive: false });

            // Mouse support for testing on desktop
            btn.addEventListener('mousedown', () => keys[keyCode] = true);
            btn.addEventListener('mouseup', () => keys[keyCode] = false);
            btn.addEventListener('mouseleave', () => keys[keyCode] = false);
        }

        bindControl('fire-btn', 'Space');
        bindControl('thrust-btn', 'ArrowUp');

        // Virtual Joystick
        const joystickBase = document.getElementById('joystick-base');
        const joystickKnob = document.getElementById('joystick-knob');
        let joystickActive = false;
        let joystickOrigin = { x: 0, y: 0 };
        let joystickTouchId = null;
        const JOYSTICK_RADIUS = 65;
        const DEADZONE = 15;

        window.addEventListener('touchstart', (e) => {
            if (joystickActive || !gameActive || e.target.closest('button')) return;

            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.clientX < window.innerWidth / 2) {
                    joystickActive = true;
                    joystickTouchId = touch.identifier;
                    joystickOrigin = { x: touch.clientX, y: touch.clientY };

                    joystickBase.style.left = `${touch.clientX}px`;
                    joystickBase.style.top = `${touch.clientY}px`;
                    joystickBase.style.opacity = '1';
                    joystickBase.style.visibility = 'visible';
                    joystickKnob.classList.add('active');
                    joystickKnob.style.left = '50%';
                    joystickKnob.style.top = '50%';
                    break;
                }
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (!joystickActive) return;

            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.identifier === joystickTouchId) {
                    e.preventDefault();

                    const dx = touch.clientX - joystickOrigin.x;
                    const dy = touch.clientY - joystickOrigin.y;
                    const dist = Math.hypot(dx, dy);
                    const angle = Math.atan2(dy, dx);

                    const moveDist = Math.min(dist, JOYSTICK_RADIUS);
                    const knobX = moveDist * Math.cos(angle);
                    const knobY = moveDist * Math.sin(angle);

                    joystickKnob.style.left = `calc(50% + ${knobX}px)`;
                    joystickKnob.style.top = `calc(50% + ${knobY}px)`;

                    if (dist > DEADZONE) {
                        ship.targetA = angle;
                    } else {
                        ship.targetA = null;
                    }

                    break;
                }
            }
        }, { passive: false });

        const endJoystick = (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.identifier === joystickTouchId) {
                    joystickActive = false;
                    joystickTouchId = null;

                    joystickBase.style.opacity = '';
                    joystickBase.style.visibility = '';
                    joystickBase.style.left = '120px';
                    joystickBase.style.top = 'calc(100% - 120px)';
                    joystickKnob.classList.remove('active');
                    joystickKnob.style.left = '50%';
                    joystickKnob.style.top = '50%';

                    keys['ArrowLeft'] = false;
                    keys['ArrowRight'] = false;
                    keys['ArrowUp'] = false;
                    break;
                }
            }
        };

        window.addEventListener('touchend', endJoystick);
        window.addEventListener('touchcancel', endJoystick);

        // Mouse support for virtual joystick
        window.addEventListener('mousedown', (e) => {
            if (joystickActive || !gameActive || e.target.closest('button')) return;
            if (e.clientX < window.innerWidth / 2) {
                joystickActive = true;
                joystickTouchId = 'mouse';
                joystickOrigin = { x: e.clientX, y: e.clientY };

                joystickBase.style.left = `${e.clientX}px`;
                joystickBase.style.top = `${e.clientY}px`;
                joystickBase.style.opacity = '1';
                joystickBase.style.visibility = 'visible';
                joystickKnob.classList.add('active');
                joystickKnob.style.left = '50%';
                joystickKnob.style.top = '50%';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!joystickActive || joystickTouchId !== 'mouse') return;
            e.preventDefault();

            const dx = e.clientX - joystickOrigin.x;
            const dy = e.clientY - joystickOrigin.y;
            const dist = Math.hypot(dx, dy);
            const angle = Math.atan2(dy, dx);

            const moveDist = Math.min(dist, JOYSTICK_RADIUS);
            const knobX = moveDist * Math.cos(angle);
            const knobY = moveDist * Math.sin(angle);

            joystickKnob.style.left = `calc(50% + ${knobX}px)`;
            joystickKnob.style.top = `calc(50% + ${knobY}px)`;

            if (dist > DEADZONE) {
                ship.targetA = angle;
            } else {
                ship.targetA = null;
            }
        });

        const endMouseJoystick = () => {
            if (joystickTouchId === 'mouse') {
                joystickActive = false;
                joystickTouchId = null;

                joystickBase.style.opacity = '';
                joystickBase.style.visibility = '';
                joystickBase.style.left = '120px';
                joystickBase.style.top = 'calc(100% - 120px)';

                joystickKnob.classList.remove('active');
                joystickKnob.style.left = '50%';
                joystickKnob.style.top = '50%';

                ship.targetA = null;
            }
        };

        window.addEventListener('mouseup', endMouseJoystick);
        window.addEventListener('mouseleave', endMouseJoystick);

        function destroyAsteroid(index) {
            playSound(100 + Math.random() * 100, 'sawtooth', 0.2, 0.1);
            let a = asteroids[index];
            let x = a.body.position.x;
            let y = a.body.position.y;
            let r = a.radius;

            // Split asteroid if it's big enough
            if (r > Math.ceil(ASTEROID_SIZE / 8)) {
                const childR = Math.ceil(r / 2);
                for (let i = 0; i < 2; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const roid = createAsteroid(
                        x + Math.cos(angle) * childR,
                        y + Math.sin(angle) * childR,
                        childR
                    );
                    asteroids.push(roid);
                    World.add(engine.world, roid.body);
                }
            }

            // Explosion Particles
            createExplosion(x, y, r);

            World.remove(engine.world, a.body);
            worldContainer.removeChild(a.graphics);
            asteroids.splice(index, 1);
            score += 10;
            scoreEl.innerText = score;

            if (score > highScore) {
                highScore = score;
                highScoreEl.innerText = `Best: ${highScore}`;
                localStorage.setItem('asteroids-best', highScore);
            }

            hitStopTimer = 0.05; // 50ms hit stop

            if (asteroids.length === 0) {
                level++;
                createAsteroids();
            }
        }

        function gameOver() {
            gameActive = false;
            finalScoreEl.innerText = score;
            setTimeout(() => {
                gameOverEl.style.display = 'block';
            }, 500);
        }

        function startGame() {
            score = 0;
            lives = 3;
            level = 0;
            invulnerableTime = 2;
            scoreEl.innerText = score;
            livesEl.innerText = `Lives: ${lives}`;

            gameActive = true;
            startScreenEl.style.display = 'none';
            gameOverEl.style.display = 'none';
            initShip();
            createAsteroids();
            lasers = [];
        }

        startBtn.addEventListener('click', () => {
            console.log("Start button clicked");
            initAudio();
            startGame();
        });
        restartBtn.addEventListener('click', () => {
            console.log("Restart button clicked");
            initAudio();
            startGame();
        });

        // Detect mobile for instructions
        if (window.matchMedia('(pointer: coarse)').matches) {
            document.getElementById('desktop-instructions').style.display = 'none';
            document.getElementById('mobile-instructions').style.display = 'block';
        }

        function update(dt) {
            if (hitStopTimer > 0) {
                hitStopTimer -= dt;
                return;
            }
            if (!gameActive) return;

            if (invulnerableTime > 0) {
                invulnerableTime -= dt;
            }

            Engine.update(engine, dt * 1000);

            // Rotation and Thrust logic for Matter.js ship
            if (ship.body) {
                if (ship.targetA !== null) {
                    let diff = ship.targetA - ship.body.angle;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;

                    Body.setAngularVelocity(ship.body, diff * 0.1);
                } else {
                    let rot = 0;
                    if (keys['ArrowLeft']) rot = -0.05;
                    if (keys['ArrowRight']) rot = 0.05;
                    if (rot !== 0) {
                        Body.setAngularVelocity(ship.body, rot);
                    }
                }

                ship.thrusting = keys['ArrowUp'];
                if (ship.thrusting) {
                    const force = Vector.rotate({ x: 0.002, y: 0 }, ship.body.angle);
                    Body.applyForce(ship.body, ship.body.position, force);
                    if (Math.random() < 0.1) playSound(50 + Math.random() * 20, 'sawtooth', 0.1, 0.02);
                }

                // Sync graphics
                ship.graphics.x = ship.body.position.x;
                ship.graphics.y = ship.body.position.y;
                ship.graphics.rotation = ship.body.angle;
                drawShipGraphics();

                // Wraparound
                if (ship.body.position.x < -SHIP_SIZE) Body.setPosition(ship.body, { x: width + SHIP_SIZE, y: ship.body.position.y });
                if (ship.body.position.x > width + SHIP_SIZE) Body.setPosition(ship.body, { x: -SHIP_SIZE, y: ship.body.position.y });
                if (ship.body.position.y < -SHIP_SIZE) Body.setPosition(ship.body, { x: ship.body.position.x, y: height + SHIP_SIZE });
                if (ship.body.position.y > height + SHIP_SIZE) Body.setPosition(ship.body, { x: ship.body.position.x, y: -SHIP_SIZE });
            }

            // Shooting
            if (keys['Space']) {
                shootLaser();
            } else {
                ship.canShoot = true;
            }

            // Move lasers
            for (let i = lasers.length - 1; i >= 0; i--) {
                const l = lasers[i];
                // Check distance travelled
                l.dist += Vector.magnitude(l.body.velocity);
                if (l.dist > l.maxDist) {
                    World.remove(engine.world, l.body);
                    worldContainer.removeChild(l.graphics);
                    lasers.splice(i, 1);
                    continue;
                }

                // Sync graphics
                l.graphics.x = l.body.position.x;
                l.graphics.y = l.body.position.y;

                // Laser Wraparound
                if (l.body.position.x < 0) Body.setPosition(l.body, { x: width, y: l.body.position.y });
                else if (l.body.position.x > width) Body.setPosition(l.body, { x: 0, y: l.body.position.y });
                if (l.body.position.y < 0) Body.setPosition(l.body, { x: l.body.position.x, y: height });
                else if (l.body.position.y > height) Body.setPosition(l.body, { x: l.body.position.x, y: 0 });
            }

            // Move asteroids
            for (let i = 0; i < asteroids.length; i++) {
                const a = asteroids[i];
                a.graphics.x = a.body.position.x;
                a.graphics.y = a.body.position.y;
                a.graphics.rotation = a.body.angle;

                // Asteroid Wraparound
                if (a.body.position.x < -a.radius) Body.setPosition(a.body, { x: width + a.radius, y: a.body.position.y });
                else if (a.body.position.x > width + a.radius) Body.setPosition(a.body, { x: -a.radius, y: a.body.position.y });
                if (a.body.position.y < -a.radius) Body.setPosition(a.body, { x: a.body.position.x, y: height + a.radius });
                else if (a.body.position.y > height + a.radius) Body.setPosition(a.body, { x: a.body.position.x, y: -a.radius });
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.graphics.x += p.vx;
                p.graphics.y += p.vy;
                p.life -= p.decay;
                p.graphics.alpha = p.life;
                if (p.life <= 0) {
                    worldContainer.removeChild(p.graphics);
                    particles.splice(i, 1);
                }
            }

            // Detect Laser collisions (Matter.js handle this via events)
            // But for now, simple distance check or keep lasers as sensors
            for (let i = lasers.length - 1; i >= 0; i--) {
                for (let j = asteroids.length - 1; j >= 0; j--) {
                    const dist = Vector.magnitude(Vector.sub(lasers[i].body.position, asteroids[j].body.position));
                    if (dist < asteroids[j].radius) {
                        destroyAsteroid(j);
                        World.remove(engine.world, lasers[i].body);
                        worldContainer.removeChild(lasers[i].graphics);
                        lasers.splice(i, 1);
                        break;
                    }
                }
            }

            // Detect Ship collisions
            if (invulnerableTime <= 0 && ship.body) {
                for (let i = 0; i < asteroids.length; i++) {
                    const dist = Vector.magnitude(Vector.sub(ship.body.position, asteroids[i].body.position));
                    if (dist < SHIP_SIZE + asteroids[i].radius) {
                        handleShipHit();
                        break;
                    }
                }
            }
        }

        function handleShipHit() {
            playSound(60, 'sawtooth', 0.5, 0.2);
            lives--;
            livesEl.innerText = `Lives: ${lives}`;
            shakeTime = 0.5;
            hitStopTimer = 0.2;

            if (lives <= 0) {
                gameOver();
            } else {
                initShip();
                invulnerableTime = 2; // 2 seconds of invulnerability
            }
        }

        function drawLasers() {
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#ff6ec7";
            for (let i = 0; i < lasers.length; i++) {
                ctx.fillStyle = "#ff6ec7";
                ctx.beginPath();
                ctx.arc(lasers[i].x, lasers[i].y, SHIP_SIZE / 10, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
        }

        function drawAsteroids() {
            ctx.lineWidth = 2;
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#7c6cff";
            for (let i = 0; i < asteroids.length; i++) {
                ctx.strokeStyle = "#7c6cff";
                let a = asteroids[i];
                ctx.beginPath();
                ctx.moveTo(
                    a.x + a.r * a.offs[0] * Math.cos(a.a),
                    a.y + a.r * a.offs[0] * Math.sin(a.a)
                );
                for (let j = 1; j < a.vert; j++) {
                    ctx.lineTo(
                        a.x + a.r * a.offs[j] * Math.cos(a.a + j * Math.PI * 2 / a.vert),
                        a.y + a.r * a.offs[j] * Math.sin(a.a + j * Math.PI * 2 / a.vert)
                    );
                }
                ctx.closePath();
                ctx.stroke();
            }
            ctx.shadowBlur = 0;
        }

        function drawShip() {
            if (invulnerableTime > 0 && Math.floor(Date.now() / 100) % 2 === 0) {
                return;
            }

            ctx.strokeStyle = "#46c8ff";
            ctx.lineWidth = 2;
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#46c8ff";
            ctx.beginPath();
            ctx.moveTo(
                ship.x + 4 / 3 * ship.r * Math.cos(ship.a),
                ship.y + 4 / 3 * ship.r * Math.sin(ship.a)
            );
            ctx.lineTo(
                ship.x - ship.r * (2 / 3 * Math.cos(ship.a) + Math.sin(ship.a)),
                ship.y - ship.r * (2 / 3 * Math.sin(ship.a) - Math.cos(ship.a))
            );
            ctx.lineTo(
                ship.x - ship.r * (2 / 3 * Math.cos(ship.a) - Math.sin(ship.a)),
                ship.y - ship.r * (2 / 3 * Math.sin(ship.a) + Math.cos(ship.a))
            );
            ctx.closePath();
            ctx.stroke();
            ctx.shadowBlur = 0;

            if (ship.thrusting) {
                ctx.fillStyle = "#7c6cff";
                ctx.beginPath();
                ctx.moveTo(
                    ship.x - ship.r * (2 / 3 * Math.cos(ship.a) + 0.5 * Math.sin(ship.a)),
                    ship.y - ship.r * (2 / 3 * Math.sin(ship.a) - 0.5 * Math.cos(ship.a))
                );
                ctx.lineTo(
                    ship.x - ship.r * 5 / 3 * Math.cos(ship.a),
                    ship.y - ship.r * 5 / 3 * Math.sin(ship.a)
                );
                ctx.lineTo(
                    ship.x - ship.r * (2 / 3 * Math.cos(ship.a) - 0.5 * Math.sin(ship.a)),
                    ship.y - ship.r * (2 / 3 * Math.sin(ship.a) + 0.5 * Math.cos(ship.a))
                );
                ctx.closePath();
                ctx.fill();
            }
        }

        // Audio
        let audioCtx = null;
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(freq, type, duration, volume = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        let lastTime = 0;
        function loop(timestamp) {
            const dt = lastTime ? Math.min((timestamp - lastTime) / 1000, 0.1) : 0;
            lastTime = timestamp;

            update(dt);

            if (shakeTime > 0) {
                const shakeX = (Math.random() - 0.5) * 15;
                const shakeY = (Math.random() - 0.5) * 15;
                worldContainer.position.set(shakeX, shakeY);
                shakeTime -= dt;
            } else {
                worldContainer.position.set(0, 0);
            }

            requestAnimationFrame(loop);
        }

        highScore = parseInt(localStorage.getItem('asteroids-best')) || 0;
        highScoreEl.innerText = `Best: ${highScore}`;

        initShip();
        createAsteroids();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
