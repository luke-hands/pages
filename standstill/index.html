<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Standstill — Luke Hands</title>
    <style>
        :root {
            --bg: #07080f;
            --avatar: #46c8ff;
            --bullet: #ff6ec7;
            --star: #7c6cff;
            --laser: #7c6cff;
            --fg: #e8eaf2;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--fg);
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }

        #score-box {
            font-size: 24px;
            font-weight: 800;
            text-shadow: 0 0 10px var(--avatar);
        }

        #best-box {
            font-size: 14px;
            color: #8a90a6;
        }

        #combo-box {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            font-size: 24px;
            font-weight: 800;
            color: var(--star);
            opacity: 0;
            transition: opacity 0.2s;
        }

        #game-over, #start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(7, 8, 15, 0.85);
            padding: 2.5rem;
            border: 1px solid var(--star);
            border-radius: 16px;
            display: none;
            backdrop-filter: blur(12px);
            z-index: 10;
            min-width: 280px;
            pointer-events: none;
        }

        #start-screen {
            display: block;
        }

        #game-over h1, #start-screen h1 {
            font-size: 3.5rem;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(to bottom, #fff, var(--avatar));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--avatar));
        }

        #game-over p, #start-screen p {
            margin-bottom: 2rem;
            color: #8a90a6;
            line-height: 1.5;
        }

        #mobile-hint {
            display: none;
            color: var(--star);
            font-size: 0.9rem;
            margin-top: -1rem;
            margin-bottom: 2rem;
        }

        @media (pointer: coarse) {
            #mobile-hint {
                display: block;
            }
        }

        #restart-prompt, #start-prompt {
            font-size: 0.9rem;
            color: var(--avatar);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score-box">0</div>
        <div id="best-box">BEST: 0</div>
    </div>
    <div id="combo-box">x1</div>

    <div id="start-screen">
        <h1>STANDSTILL</h1>
        <p>Move to flow. Stand still to slow.<br>Dodge hazards. Collect stars.</p>
        <div id="mobile-hint">Drag anywhere to move</div>
        <div id="start-prompt">Tap or Space to Start</div>
    </div>

    <div id="game-over">
        <h1>STOPPED</h1>
        <p>Score: <span id="final-score">0</span></p>
        <div id="restart-prompt">Tap or Space to Restart</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-box');
        const bestEl = document.getElementById('best-box');
        const comboEl = document.getElementById('combo-box');
        const gameOverEl = document.getElementById('game-over');
        const finalScoreEl = document.getElementById('final-score');

        let width, height, dpr, U;

        function resize() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            U = Math.min(width, height) / 100;
            if (state) state.vignette = null;
        }

        window.addEventListener('resize', resize);
        resize();

        const REF_SPEED = 45; // 45U/sec
        const TOUCH_SENSITIVITY = 1.3;
        const TOUCH_EASE = 25;

        let state = {
            waitingToStart: true,
            player: { x: width / 2, y: height / 2, lastX: width / 2, lastY: height / 2, targetX: width / 2, targetY: height / 2, speed: 0, trail: new Float32Array(20).fill(NaN) }, // [x,y,x,y...]
            mouse: { x: width / 2, y: height / 2, active: false },
            keys: {},
            touch: { x: 0, y: 0, lastX: 0, lastY: 0, active: false },
            timeScale: 0.08,
            gameTime: 0,
            score: 0,
            best: (() => { try { return parseInt(localStorage.getItem('standstill_best')) || 0; } catch(e) { return 0; } })(),
            combo: 0,
            lastStarTime: 0,
            active: true,
            paused: false,
            dying: false,
            bullets: [],
            emitters: [],
            needles: [],
            lasers: [],
            stars: [],
            particles: [],
            difficulty: 0,
            hitStop: 0,
            fatalObject: null,
            audio: { ctx: null, oscillator: null, filter: null, gain: null },
            vignette: null,
            lastDesat: -1,
            reducedMotion: window.matchMedia('(prefers-reduced-motion: reduce)').matches,
            deathTimer: 0
        };

        bestEl.textContent = `BEST: ${state.best}`;

        function initAudio() {
            if (state.audio.ctx) return;
            state.audio.ctx = new (window.AudioContext || window.webkitAudioContext)();
            state.audio.oscillator = state.audio.ctx.createOscillator();
            state.audio.filter = state.audio.ctx.createBiquadFilter();
            state.audio.gain = state.audio.ctx.createGain();

            state.audio.oscillator.type = 'sawtooth';
            state.audio.oscillator.frequency.value = 40;
            state.audio.filter.type = 'lowpass';
            state.audio.filter.frequency.value = 200;
            state.audio.gain.gain.value = 0.05;

            state.audio.oscillator.connect(state.audio.filter);
            state.audio.filter.connect(state.audio.gain);
            state.audio.gain.connect(state.audio.ctx.destination);
            state.audio.oscillator.start();
        }

        function playChime(pitch) {
            if (!state.audio.ctx) return;
            const osc = state.audio.ctx.createOscillator();
            const g = state.audio.ctx.createGain();
            osc.frequency.setValueAtTime(pitch, state.audio.ctx.currentTime);
            g.gain.setValueAtTime(0.2, state.audio.ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, state.audio.ctx.currentTime + 0.5);
            osc.connect(g);
            g.connect(state.audio.ctx.destination);
            osc.start();
            osc.stop(state.audio.ctx.currentTime + 0.5);
        }

        function playDeathThud() {
            if (!state.audio.ctx) return;
            const osc = state.audio.ctx.createOscillator();
            const g = state.audio.ctx.createGain();
            osc.frequency.setValueAtTime(100, state.audio.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, state.audio.ctx.currentTime + 0.5);
            g.gain.setValueAtTime(0.5, state.audio.ctx.currentTime);
            g.gain.linearRampToValueAtTime(0, state.audio.ctx.currentTime + 0.5);
            osc.connect(g);
            g.connect(state.audio.ctx.destination);
            osc.start();
            osc.stop(state.audio.ctx.currentTime + 0.5);
        }

        function spawnParticles(x, y, color, count, speedMult = 1) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = (2 + Math.random() * 5) * U * speedMult;
                state.particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    r: Math.random() * 0.5 * U,
                    life: 1,
                    color
                });
            }
        }

        function spawnRipple(x, y) {
            state.particles.push({
                x, y, r: 0, life: 1, type: 'ripple', color: '#fff'
            });
        }

        window.addEventListener('keydown', e => {
            state.keys[e.code] = true;
            if (e.code === 'Space') {
                initAudio();
                if (state.waitingToStart) {
                    state.waitingToStart = false;
                    document.getElementById('start-screen').style.display = 'none';
                    state.player.targetX = state.player.x;
                    state.player.targetY = state.player.y;
                }
                if (!state.active) restart();
            }
        });
        window.addEventListener('keyup', e => state.keys[e.code] = false);
        window.addEventListener('pointermove', e => {
            if (e.pointerType === 'mouse') {
                state.mouse.x = e.clientX;
                state.mouse.y = e.clientY;
                state.mouse.active = true;
            } else {
                state.touch.x = e.clientX;
                state.touch.y = e.clientY;
            }
        });
        canvas.addEventListener('pointerdown', e => {
            initAudio();
            if (state.waitingToStart) {
                state.waitingToStart = false;
                document.getElementById('start-screen').style.display = 'none';
                state.player.targetX = state.player.x;
                state.player.targetY = state.player.y;
            }
            if (!state.active) restart();
            if (e.pointerType !== 'mouse') {
                state.touch.active = true;
                state.touch.x = e.clientX;
                state.touch.y = e.clientY;
                state.touch.lastX = e.clientX;
                state.touch.lastY = e.clientY;
            }
        });
        window.addEventListener('pointerup', e => {
            if (e.pointerType !== 'mouse') state.touch.active = false;
        });

        function spawnBullet(x, y, vx, vy) {
            state.bullets.push({ x, y, vx, vy, r: 0.8 * U, trail: new Float32Array(10).fill(NaN), missed: false });
        }

        function createEmitter(x, y, angle, rotSpeed) {
            state.emitters.push({ x, y, angle, rotSpeed, timer: 0 });
        }

        function spawnStar() {
            let x, y, dist, attempts = 0;
            do {
                x = (0.1 + Math.random() * 0.8) * width;
                y = (0.1 + Math.random() * 0.8) * height;
                dist = Math.hypot(x - state.player.x, y - state.player.y);
                attempts++;
            } while (dist < 25 * U && attempts < 100);
            state.stars.push({ x, y, r: 1.8 * U, timer: 6 });
        }

        function restart() {
            state.active = true;
            state.dying = false;
            state.score = 0;
            state.difficulty = 0;
            state.combo = 0;
            state.bullets = [];
            state.needles = [];
            state.lasers = [];
            state.stars = [];
            state.particles = [];
            state.player.x = width / 2;
            state.player.y = height / 2;
            state.player.trail.fill(NaN);
            state.timeScale = 0.08;
            gameOverEl.style.display = 'none';
            scoreEl.textContent = '0';
            comboEl.style.opacity = 0;
        }

        function die(obj) {
            if (state.dying) return;
            state.dying = true;
            state.active = true;
            state.hitStop = 0.9;
            state.fatalObject = obj;
            finalScoreEl.textContent = state.score;
            if (state.score > state.best) {
                state.best = state.score;
                try { localStorage.setItem('standstill_best', state.best); } catch(e) {}
                bestEl.textContent = `BEST: ${state.best}`;
            }
            playDeathThud();
            state.deathTimer = 0.9;
        }

        function update(dt) {
            if (state.waitingToStart || !state.active || state.paused) return;

            if (state.audio.ctx) {
                state.audio.oscillator.frequency.setTargetAtTime(30 + 30 * state.timeScale, state.audio.ctx.currentTime, 0.1);
                state.audio.filter.frequency.setTargetAtTime(100 + 400 * state.timeScale, state.audio.ctx.currentTime, 0.1);
                state.audio.gain.gain.setTargetAtTime(state.dying ? 0 : 0.05 + 0.05 * state.timeScale, state.audio.ctx.currentTime, 0.1);
            }

            // Particles
            for (let i = state.particles.length - 1; i >= 0; i--) {
                const p = state.particles[i];
                if (p.type === 'ripple') {
                    p.r += 20 * U * dt; // Ripples use real time
                    p.life -= 2 * dt;
                } else {
                    p.x += p.vx * dt * state.timeScale;
                    p.y += p.vy * dt * state.timeScale;
                    p.life -= dt * state.timeScale * 2;
                }
                if (p.life <= 0) state.particles.splice(i, 1);
            }

            if (state.dying) {
                state.hitStop -= dt;
                state.deathTimer -= dt;
                if (state.hitStop > 0) {
                    spawnParticles(state.player.x, state.player.y, '#46c8ff', 2);
                } else {
                     // shattering particles
                     if (state.hitStop > -0.05) spawnParticles(state.player.x, state.player.y, '#46c8ff', 20, 2);
                }

                if (state.deathTimer <= 0) {
                    state.active = false;
                    gameOverEl.style.display = 'block';
                }
                return;
            }

            // Keyboard movement
            let kx = 0, ky = 0;
            if (state.keys['ArrowLeft'] || state.keys['KeyA']) kx -= 1;
            if (state.keys['ArrowRight'] || state.keys['KeyD']) kx += 1;
            if (state.keys['ArrowUp'] || state.keys['KeyW']) ky -= 1;
            if (state.keys['ArrowDown'] || state.keys['KeyS']) ky += 1;

            if (kx !== 0 || ky !== 0) {
                const mag = Math.hypot(kx, ky);
                const speed = 45 * U;
                state.player.x += (kx / mag) * speed * dt;
                state.player.y += (ky / mag) * speed * dt;
            }

            // Mouse movement (easing)
            if (state.mouse.active && !state.touch.active) {
                const dx = state.mouse.x - state.player.x;
                const dy = state.mouse.y - state.player.y;
                const dist = Math.hypot(dx, dy);
                if (dist > 0.1) {
                    const ease = 1 - Math.exp(-10 * dt);
                    let moveX = dx * ease;
                    let moveY = dy * ease;
                    const moveDist = Math.hypot(moveX, moveY);
                    const maxMove = 60 * U * dt;
                    if (moveDist > maxMove) {
                        moveX *= maxMove / moveDist;
                        moveY *= maxMove / moveDist;
                    }
                    state.player.x += moveX;
                    state.player.y += moveY;
                }
            }

            // Mobile touch (relative + smooth)
            if (state.touch.active) {
                const tdx = (state.touch.x - state.touch.lastX) * TOUCH_SENSITIVITY;
                const tdy = (state.touch.y - state.touch.lastY) * TOUCH_SENSITIVITY;

                state.player.targetX += tdx;
                state.player.targetY += tdy;

                // Clamp target to bounds
                state.player.targetX = Math.max(0, Math.min(width, state.player.targetX));
                state.player.targetY = Math.max(0, Math.min(height, state.player.targetY));

                state.touch.lastX = state.touch.x;
                state.touch.lastY = state.touch.y;

                const dx = state.player.targetX - state.player.x;
                const dy = state.player.targetY - state.player.y;
                const ease = 1 - Math.exp(-TOUCH_EASE * dt);
                state.player.x += dx * ease;
                state.player.y += dy * ease;
            } else {
                // Sync target when not touching to prevent jumps
                state.player.targetX = state.player.x;
                state.player.targetY = state.player.y;
            }

            // Constraints
            state.player.x = Math.max(0, Math.min(width, state.player.x));
            state.player.y = Math.max(0, Math.min(height, state.player.y));

            // Speed & TimeScale
            const distMoved = Math.hypot(state.player.x - state.player.lastX, state.player.y - state.player.lastY);
            const currentSpeed = distMoved / dt / U;
            state.player.speed = currentSpeed;
            state.player.lastX = state.player.x;
            state.player.lastY = state.player.y;

            const targetTS = Math.max(0.08, Math.min(1, currentSpeed / REF_SPEED));
            state.timeScale += (targetTS - state.timeScale) * (1 - Math.exp(-8 * dt));

            const gdt = dt * state.timeScale;
            state.gameTime += gdt;

            // Stars
            if (state.stars.length === 0) spawnStar();
            for (let i = state.stars.length - 1; i >= 0; i--) {
                const s = state.stars[i];
                s.timer -= gdt;
                if (s.timer <= 0) {
                    state.stars.splice(i, 1);
                    state.combo = 0;
                    comboEl.style.opacity = 0;
                    continue;
                }

                const dist = Math.hypot(s.x - state.player.x, s.y - state.player.y);
                if (dist < s.r + 1.2 * U) {
                    state.stars.splice(i, 1);
                    const now = performance.now();
                    if (now - state.lastStarTime < 4000) {
                        state.combo++;
                    } else {
                        state.combo = 1;
                    }
                    state.lastStarTime = now;
                    state.score += 10 * state.combo;
                    state.difficulty++;
                    scoreEl.textContent = state.score;
                    comboEl.textContent = `x${state.combo}`;
                    comboEl.style.opacity = 1;
                    spawnParticles(s.x, s.y, '#7c6cff', 12);
                    playChime(200 + state.combo * 50);
                }
            }

            // Emitters
            if (state.emitters.length === 0) {
                createEmitter(0, 0, 0, 0.5);
                createEmitter(width, 0, Math.PI, -0.5);
                createEmitter(0, height, -Math.PI/2, 0.5);
                createEmitter(width, height, Math.PI/2, -0.5);
            }

            const fireRate = 0.4 / (1 + state.difficulty * 0.08);
            state.emitters.forEach(e => {
                e.timer += gdt;
                e.angle += e.rotSpeed * gdt;
                if (e.timer > fireRate) {
                    e.timer = 0;
                    const speed = (20 + Math.random() * 10) * U;
                    spawnBullet(e.x, e.y, Math.cos(e.angle) * speed, Math.sin(e.angle) * speed);
                }
            });

            // Bullets
            for (let i = state.bullets.length - 1; i >= 0; i--) {
                const b = state.bullets[i];
                b.x += b.vx * gdt;
                b.y += b.vy * gdt;

                // Optimized trail (shift and set)
                for (let j = b.trail.length - 2; j >= 0; j--) b.trail[j+2] = b.trail[j];
                b.trail[0] = b.x; b.trail[1] = b.y;

                const dist = Math.hypot(b.x - state.player.x, b.y - state.player.y);
                if (dist < b.r + 1.2 * U) {
                    die(b);
                    spawnParticles(b.x, b.y, '#ff6ec7', 20);
                } else if (!b.missed && dist < b.r + 3.2 * U) {
                    b.missed = true;
                    state.score += 1;
                    scoreEl.textContent = state.score;
                    spawnParticles(b.x, b.y, '#fff', 1);
                    spawnRipple(b.x, b.y);
                }

                if (b.x < -100 || b.x > width + 100 || b.y < -100 || b.y > height + 100) {
                    state.bullets.splice(i, 1);
                }
            }

            // Needles
            if (state.difficulty >= 3 && Math.random() < 0.01 && state.needles.length < Math.min(5, state.difficulty - 2)) {
                const side = Math.floor(Math.random() * 4);
                let x, y;
                if (side === 0) { x = Math.random() * width; y = -20; }
                else if (side === 1) { x = width + 20; y = Math.random() * height; }
                else if (side === 2) { x = Math.random() * width; y = height + 20; }
                else { x = -20; y = Math.random() * height; }
                state.needles.push({ x, y, speed: 35 * U, angle: Math.atan2(state.player.y - y, state.player.x - x), timer: 8 });
            }

            for (let i = state.needles.length - 1; i >= 0; i--) {
                const n = state.needles[i];
                n.timer -= gdt;
                const targetAngle = Math.atan2(state.player.y - n.y, state.player.x - n.x);
                let da = targetAngle - n.angle;
                while (da > Math.PI) da -= Math.PI * 2;
                while (da < -Math.PI) da += Math.PI * 2;
                n.angle += Math.sign(da) * Math.min(Math.abs(da), (Math.PI / 2) * gdt);
                n.x += Math.cos(n.angle) * n.speed * gdt;
                n.y += Math.sin(n.angle) * n.speed * gdt;

                const dist = Math.hypot(n.x - state.player.x, n.y - state.player.y);
                if (dist < 0.8 * U + 1.2 * U) die(n);
                if (n.timer <= 0) state.needles.splice(i, 1);
            }

            // Lasers
            if (state.difficulty >= 6 && Math.random() < 0.005 && state.lasers.length < Math.min(3, state.difficulty - 5)) {
                const side = Math.floor(Math.random() * 4);
                let x, y, angle;
                if (side === 0) { x = Math.random() * width; y = 0; angle = Math.PI / 2; }
                else if (side === 1) { x = width; y = Math.random() * height; angle = Math.PI; }
                else if (side === 2) { x = Math.random() * width; y = height; angle = -Math.PI / 2; }
                else { x = 0; y = Math.random() * height; angle = 0; }
                state.lasers.push({ x, y, angle, timer: 1.5, active: false, sweep: 0 });
            }

            for (let i = state.lasers.length - 1; i >= 0; i--) {
                const l = state.lasers[i];
                l.timer -= gdt;
                if (l.timer <= 0) {
                    if (!l.active) {
                        l.active = true;
                        l.timer = 2;
                    } else {
                        state.lasers.splice(i, 1);
                        continue;
                    }
                }

                if (l.active) {
                    const sweepSpeed = (Math.PI / 3) / 2;
                    l.sweep += sweepSpeed * gdt;
                    const currentAngle = l.angle + l.sweep - Math.PI / 6;

                    const dx = state.player.x - l.x;
                    const dy = state.player.y - l.y;
                    const dist = Math.hypot(dx, dy);
                    const angleToPlayer = Math.atan2(dy, dx);
                    let da = angleToPlayer - currentAngle;
                    while (da > Math.PI) da -= Math.PI * 2;
                    while (da < -Math.PI) da += Math.PI * 2;

                    if (Math.abs(da) < Math.atan2(U, dist)) {
                        die(l);
                    }
                }
            }

            // Player trail
            for (let j = state.player.trail.length - 2; j >= 0; j--) state.player.trail[j+2] = state.player.trail[j];
            state.player.trail[0] = state.player.x; state.player.trail[1] = state.player.y;
        }

        function lerpColor(c1, c2, t) {
            const r1 = parseInt(c1.slice(1,3), 16), g1 = parseInt(c1.slice(3,5), 16), b1 = parseInt(c1.slice(5,7), 16);
            const r2 = parseInt(c2.slice(1,3), 16), g2 = parseInt(c2.slice(3,5), 16), b2 = parseInt(c2.slice(5,7), 16);
            const r = Math.round(r1 + (r2 - r1) * t), g = Math.round(g1 + (g2 - g1) * t), b = Math.round(b1 + (b2 - b1) * t);
            return `rgb(${r},${g},${b})`;
        }

        function draw() {
            const desat = 1 - state.timeScale;
            const hazardColor = lerpColor('#ff6ec7', '#7c6cff', desat);

            ctx.fillStyle = '#07080f';
            ctx.fillRect(0, 0, width, height);

            // Vignette
            if (!state.vignette || Math.abs(desat - state.lastDesat) > 0.01) {
                const grad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, Math.max(width, height));
                grad.addColorStop(0, 'transparent');
                grad.addColorStop(1, `rgba(124, 108, 255, ${0.15 * desat})`);
                state.vignette = grad;
                state.lastDesat = desat;
            }
            ctx.fillStyle = state.vignette;
            ctx.fillRect(0, 0, width, height);

            // Draw stars
            state.stars.forEach(s => {
                const pulse = 1 + 0.2 * Math.sin(state.gameTime * 10);
                ctx.fillStyle = '#7c6cff';
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r * pulse, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#7c6cff';
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            // Draw bullets
            state.bullets.forEach(b => {
                const isFatal = state.dying && b === state.fatalObject;
                const color = isFatal ? '#fff' : hazardColor;
                const radius = isFatal ? b.r * (1 + (0.9 - state.hitStop) * 2) : b.r;

                ctx.strokeStyle = color;
                ctx.lineWidth = radius;
                ctx.lineCap = 'round';
                ctx.beginPath();
                if (!isNaN(b.trail[2])) {
                    ctx.moveTo(b.trail[0], b.trail[1]);
                    for (let i = 2; i < b.trail.length; i+=2) {
                        if (isNaN(b.trail[i])) break;
                        ctx.lineTo(b.trail[i], b.trail[i+1]);
                    }
                } else {
                    ctx.arc(b.x, b.y, radius/2, 0, Math.PI * 2);
                }
                ctx.stroke();

                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(b.x, b.y, radius, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw needles
            state.needles.forEach(n => {
                const isFatal = state.dying && n === state.fatalObject;
                const color = isFatal ? '#fff' : hazardColor;
                ctx.fillStyle = color;
                ctx.save();
                ctx.translate(n.x, n.y);
                if (isFatal) ctx.scale(1 + (0.9 - state.hitStop) * 2, 1 + (0.9 - state.hitStop) * 2);
                ctx.rotate(n.angle);
                ctx.beginPath();
                ctx.moveTo(1.5 * U, 0);
                ctx.lineTo(-U, -0.5 * U);
                ctx.lineTo(-U, 0.5 * U);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            });

            // Draw lasers
            state.lasers.forEach(l => {
                const isFatal = state.dying && l === state.fatalObject;
                const currentAngle = l.active ? l.angle + l.sweep - Math.PI / 6 : l.angle - Math.PI / 6;
                ctx.save();
                ctx.translate(l.x, l.y);
                ctx.rotate(currentAngle);

                if (l.active) {
                    ctx.strokeStyle = isFatal ? '#fff' : '#7c6cff';
                    ctx.lineWidth = 2 * U * (isFatal ? 1 + (0.9 - state.hitStop) : 1);
                    ctx.globalAlpha = 0.8;
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(width * 2, 0);
                    ctx.stroke();
                } else {
                    ctx.strokeStyle = '#7c6cff';
                    ctx.lineWidth = 1;
                    ctx.setLineDash([5, 5]);
                    ctx.globalAlpha = state.reducedMotion ? 0.3 : 0.5 + 0.5 * Math.sin(state.gameTime * 20);
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(width * 2, 0);
                    ctx.stroke();
                }
                ctx.restore();
                ctx.globalAlpha = 1;
                ctx.setLineDash([]);
            });

            // Draw particles
            state.particles.forEach(p => {
                ctx.globalAlpha = p.life;
                if (p.type === 'ripple') {
                    ctx.strokeStyle = p.color;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.stroke();
                } else {
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            ctx.globalAlpha = 1;

            // Draw player
            if (!state.dying || state.hitStop > 0) {
                // Ribbon trail
                ctx.beginPath();
                if (!isNaN(state.player.trail[2])) {
                    for (let i = 0; i < state.player.trail.length - 2; i += 2) {
                        if (isNaN(state.player.trail[i+2])) break;
                        const alpha = 0.5 * (1 - i / state.player.trail.length);
                        ctx.strokeStyle = `rgba(70, 200, 255, ${alpha})`;
                        ctx.lineWidth = (1.2 * U) * (1 - i / state.player.trail.length);
                        ctx.beginPath();
                        ctx.moveTo(state.player.trail[i], state.player.trail[i+1]);
                        ctx.lineTo(state.player.trail[i+2], state.player.trail[i+3]);
                        ctx.stroke();
                    }
                }

                if (state.dying && state.reducedMotion) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                } else {
                    ctx.fillStyle = state.dying && Math.floor(state.gameTime * 20) % 2 === 0 ? '#fff' : '#46c8ff';
                }
                ctx.beginPath();
                ctx.arc(state.player.x, state.player.y, 1.2 * U, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#46c8ff';
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        let lastT = performance.now();
        function loop(t) {
            let dt = Math.min(t - lastT, 50) / 1000;
            lastT = t;

            update(dt);
            draw();

            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);

        document.addEventListener('visibilitychange', () => {
            state.paused = document.hidden;
            if (!state.paused) lastT = performance.now();
        });

    </script>
</body>
</html>
