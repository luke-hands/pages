<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Powered Space Interface</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-blue: #46c8ff;
            --accent-purple: #7c6cff;
            --accent-pink: #ff6ec7;
            --text: #e8eaf2;
            --text-muted: #8a90a6;
            --bg: #07080f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
        }

        canvas#space-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        canvas#matrix-canvas {
            position: fixed;
            inset: 0;
            z-index: 5;
            pointer-events: none;
            display: none;
            opacity: 0.6;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Control Panel */
        #control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 240px;
            padding: 16px;
            z-index: 10;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(70, 200, 255, 0.15);
            color: var(--accent-blue);
            margin-bottom: 12px;
        }

        .badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent-blue);
            border-radius: 50%;
            margin-right: 6px;
            box-shadow: 0 0 8px var(--accent-blue);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        .panel-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text);
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 12px;
        }

        .toggle {
            width: 36px;
            height: 18px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle.active {
            background: var(--accent-purple);
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            transition: left 0.3s;
        }

        .toggle.active::after {
            left: 20px;
        }

        /* AI Chat Interface */
        #chat-interface {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 320px;
            height: 450px;
            display: flex;
            flex-direction: column;
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: bottom right;
        }

        #chat-interface.minimized {
            height: 48px;
            width: 180px;
            overflow: hidden;
        }

        .chat-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .chat-title {
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-title::before {
            content: 'AI';
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 9px;
        }

        #chat-history {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: thin;
            scrollbar-color: var(--glass-border) transparent;
        }

        #chat-history::-webkit-scrollbar {
            width: 4px;
        }

        #chat-history::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        .message {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 12px;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--accent-purple);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .message.ai {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            border-bottom-left-radius: 2px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            width: fit-content;
            margin-top: 4px;
            display: none;
        }

        .dot {
            width: 4px;
            height: 4px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-4px); }
        }

        .chat-input-area {
            padding: 12px;
            border-top: 1px solid var(--glass-border);
        }

        #chat-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text);
            font-size: 12px;
            outline: none;
            transition: border-color 0.3s;
        }

        #chat-input:focus {
            border-color: var(--accent-blue);
        }

        .model-selector {
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: flex;
            gap: 8px;
        }

        .model-option {
            cursor: pointer;
            transition: color 0.3s;
        }

        .model-option.active {
            color: var(--accent-blue);
        }

        /* Secret Terminal */
        #secret-terminal {
            position: absolute;
            bottom: -300px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 800px;
            height: 250px;
            background: #000;
            border: 2px solid #0f0;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            z-index: 100;
            padding: 20px;
            font-family: 'Courier New', Courier, monospace;
            color: #0f0;
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            overflow-y: auto;
        }

        #secret-terminal.active {
            bottom: 0;
        }

        .terminal-line {
            margin-bottom: 4px;
            font-size: 14px;
            line-height: 1.2;
        }

        .terminal-cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: #0f0;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        @media (max-width: 600px) {
            #control-panel {
                width: calc(100% - 40px);
            }
            #chat-interface {
                width: calc(100% - 40px);
                height: 350px;
            }
            #secret-terminal {
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <canvas id="space-canvas"></canvas>
    <canvas id="matrix-canvas"></canvas>

    <div id="control-panel" class="glass">
        <div class="badge">WebGPU Active</div>
        <div class="panel-title">System Controls</div>

        <div class="setting-row">
            <span>Nebula Glow</span>
            <div id="toggle-glow" class="toggle active"></div>
        </div>
        <div class="setting-row">
            <span>Parallax Stars</span>
            <div id="toggle-stars" class="toggle active"></div>
        </div>
        <div class="setting-row">
            <span>Wireframe Mode</span>
            <div id="toggle-wireframe" class="toggle"></div>
        </div>
    </div>

    <div id="chat-interface" class="glass">
        <div class="chat-header" id="chat-header">
            <div class="chat-title">Neural Link</div>
            <div id="chat-toggle-icon">−</div>
        </div>
        <div id="chat-history">
            <div class="message ai">Welcome to the AI-Powered Space Interface. How can I assist your voyage today?</div>
        </div>
        <div class="typing-indicator" id="typing-indicator">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="chat-input-area">
            <div class="model-selector">
                <span class="model-option active" data-model="nova-1">NOVA-1</span>
                <span class="model-option" data-model="void-7">VOID-7</span>
                <span class="model-option" data-model="pulse-x">PULSE-X</span>
            </div>
            <input type="text" id="chat-input" placeholder="Message interface..." autocomplete="off">
        </div>
    </div>

    <div id="secret-terminal">
        <div class="terminal-line">SYSTEM OVERRIDE DETECTED...</div>
        <div class="terminal-line">ESTABLISHING ENCRYPTED LINK...</div>
        <div class="terminal-line">ACCESS GRANTED.</div>
        <div class="terminal-line">> <span id="terminal-content"></span><span class="terminal-cursor"></span></div>
    </div>

    <script>
        // Core state
        const state = {
            width: window.innerWidth,
            height: window.innerHeight,
            dpr: window.devicePixelRatio || 1,
            lastTime: 0,
            glowEnabled: true,
            starsEnabled: true,
            wireframeMode: false,
            matrixActive: false,
            konami: [],
            konamiCode: ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'],
            stars: [],
            nebulae: [],
            mouse: { x: 0, y: 0 },
        };

        // DOM elements
        const spaceCanvas = document.getElementById('space-canvas');
        const matrixCanvas = document.getElementById('matrix-canvas');
        const ctx = spaceCanvas.getContext('2d');
        const mCtx = matrixCanvas.getContext('2d');

        const chatInterface = document.getElementById('chat-interface');
        const chatHeader = document.getElementById('chat-header');
        const chatInput = document.getElementById('chat-input');
        const chatHistory = document.getElementById('chat-history');
        const typingIndicator = document.getElementById('typing-indicator');
        const secretTerminal = document.getElementById('secret-terminal');

        // Resize handler
        function resize() {
            state.width = window.innerWidth;
            state.height = window.innerHeight;
            state.dpr = Math.min(window.devicePixelRatio || 1, 2);

            spaceCanvas.width = state.width * state.dpr;
            spaceCanvas.height = state.height * state.dpr;
            ctx.scale(state.dpr, state.dpr);

            matrixCanvas.width = state.width * state.dpr;
            matrixCanvas.height = state.height * state.dpr;
            mCtx.scale(state.dpr, state.dpr);

            // Re-init matrix columns if active
            if (state.matrixActive) initMatrix();
        }

        window.addEventListener('resize', resize);
        resize();

        function initStars() {
            const count = 200;
            state.stars = [];
            for (let i = 0; i < count; i++) {
                state.stars.push({
                    x: Math.random() * state.width,
                    y: Math.random() * state.height,
                    z: Math.random() * 1000,
                    size: Math.random() * 2 + 0.5,
                    opacity: Math.random(),
                    color: Math.random() > 0.8 ? (Math.random() > 0.5 ? '#7c6cff' : '#46c8ff') : '#ffffff'
                });
            }
        }

        function initNebulae() {
            state.nebulae = [
                { x: 0.3, y: 0.4, r: 0.4, color: 'rgba(124, 108, 255, 0.15)', targetX: 0.3, targetY: 0.4 },
                { x: 0.7, y: 0.6, r: 0.5, color: 'rgba(70, 200, 255, 0.1)', targetX: 0.7, targetY: 0.6 },
                { x: 0.5, y: 0.5, r: 0.6, color: 'rgba(255, 110, 199, 0.08)', targetX: 0.5, targetY: 0.5 }
            ];
        }

        function drawSpace(dt) {
            ctx.fillStyle = '#07080f';
            ctx.fillRect(0, 0, state.width, state.height);

            if (state.glowEnabled) {
                state.nebulae.forEach(n => {
                    // Slow movement (frame-rate independent)
                    const lerpFactor = 1 - Math.pow(0.95, dt * 60);
                    n.x += (n.targetX - n.x) * lerpFactor;
                    n.y += (n.targetY - n.y) * lerpFactor;

                    if (Math.abs(n.x - n.targetX) < 0.01) n.targetX = Math.random() * 0.4 + 0.3;
                    if (Math.abs(n.y - n.targetY) < 0.01) n.targetY = Math.random() * 0.4 + 0.3;

                    const grad = ctx.createRadialGradient(
                        n.x * state.width, n.y * state.height, 0,
                        n.x * state.width, n.y * state.height, n.r * Math.max(state.width, state.height)
                    );
                    grad.addColorStop(0, n.color);
                    grad.addColorStop(1, 'transparent');

                    ctx.fillStyle = grad;
                    ctx.globalCompositeOperation = 'screen';
                    ctx.fillRect(0, 0, state.width, state.height);
                    ctx.globalCompositeOperation = 'source-over';
                });
            }

            if (state.starsEnabled) {
                const centerX = state.width / 2;
                const centerY = state.height / 2;

                state.stars.forEach(s => {
                    // Parallax movement
                    const moveX = (state.mouse.x - centerX) * 0.005 * (1000 - s.z) / 1000;
                    const moveY = (state.mouse.y - centerY) * 0.005 * (1000 - s.z) / 1000;

                    let drawX = s.x + moveX;
                    let drawY = s.y + moveY;

                    // Wrapping
                    if (drawX < 0) drawX += state.width;
                    if (drawX > state.width) drawX -= state.width;
                    if (drawY < 0) drawY += state.height;
                    if (drawY > state.height) drawY -= state.height;

                    if (state.wireframeMode) {
                        ctx.strokeStyle = s.color;
                        ctx.lineWidth = 0.5;
                        ctx.strokeRect(drawX - s.size, drawY - s.size, s.size * 2, s.size * 2);
                    } else {
                        ctx.fillStyle = s.color;
                        ctx.globalAlpha = s.opacity * (0.5 + 0.5 * Math.sin(state.lastTime / 1000 + s.z));
                        ctx.beginPath();
                        ctx.arc(drawX, drawY, s.size, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.globalAlpha = 1.0;
                    }
                });
            }
        }

        function loop(timestamp) {
            const dt = state.lastTime ? (timestamp - state.lastTime) / 1000 : 0;
            state.lastTime = timestamp;

            drawSpace(dt);

            if (state.matrixActive) {
                if (!state.lastMatrixTime || timestamp - state.lastMatrixTime > 50) {
                    drawMatrix();
                    state.lastMatrixTime = timestamp;
                }
            }

            requestAnimationFrame(loop);
        }

        initStars();
        initNebulae();
        requestAnimationFrame(loop);

        window.addEventListener('pointermove', (e) => {
            state.mouse.x = e.clientX;
            state.mouse.y = e.clientY;
        });

        window.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                state.mouse.x = e.touches[0].clientX;
                state.mouse.y = e.touches[0].clientY;
            }
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                state.mouse.x = e.touches[0].clientX;
                state.mouse.y = e.touches[0].clientY;
            }
        }, { passive: true });

        // Initial UI interactions
        chatHeader.addEventListener('click', () => {
            chatInterface.classList.toggle('minimized');
            document.getElementById('chat-toggle-icon').textContent =
                chatInterface.classList.contains('minimized') ? '+' : '−';
        });

        // Toggle buttons
        document.getElementById('toggle-glow').addEventListener('click', function() {
            this.classList.toggle('active');
            state.glowEnabled = this.classList.contains('active');
        });
        document.getElementById('toggle-stars').addEventListener('click', function() {
            this.classList.toggle('active');
            state.starsEnabled = this.classList.contains('active');
        });
        document.getElementById('toggle-wireframe').addEventListener('click', function() {
            this.classList.toggle('active');
            state.wireframeMode = this.classList.contains('active');
        });

        // Model Selector
        const modelOptions = document.querySelectorAll('.model-option');
        modelOptions.forEach(opt => {
            opt.addEventListener('click', () => {
                modelOptions.forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                state.currentModel = opt.dataset.model;
            });
        });

        // Chat logic
        function addMessage(text, sender) {
            const msg = document.createElement('div');
            msg.className = `message ${sender}`;
            msg.textContent = text;
            chatHistory.appendChild(msg);
            chatHistory.scrollTop = chatHistory.scrollHeight;

            saveChat();
        }

        function saveChat() {
            try {
                const history = Array.from(chatHistory.children).map(m => ({
                    text: m.textContent,
                    sender: m.classList.contains('user') ? 'user' : 'ai'
                }));
                localStorage.setItem('ai-space-chat', JSON.stringify(history));
            } catch (e) {
                console.error('Failed to save chat', e);
            }
        }

        function loadChat() {
            try {
                const saved = localStorage.getItem('ai-space-chat');
                if (saved) {
                    const history = JSON.parse(saved);
                    chatHistory.innerHTML = '';
                    history.forEach(m => addMessage(m.text, m.sender));
                }
            } catch (e) {
                console.error('Failed to load chat', e);
            }
        }

        const responses = [
            "Analyzing stellar coordinates... Sector 7-G looks clear.",
            "Solar flares detected in the nearby nebula. Proceed with caution.",
            "Energy levels at 94%. All systems nominal.",
            "Scanning for anomalous signals... None detected.",
            "I've optimized the thruster efficiency by 12.4%.",
            "The void is beautiful today, isn't it?",
            "Remember to recalibrate the sensors every 4.2 light-years."
        ];

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && chatInput.value.trim()) {
                const text = chatInput.value.trim();
                chatInput.value = '';

                addMessage(text, 'user');

                // Mock AI response
                typingIndicator.style.display = 'flex';
                chatHistory.scrollTop = chatHistory.scrollHeight;

                setTimeout(() => {
                    typingIndicator.style.display = 'none';
                    const response = responses[Math.floor(Math.random() * responses.length)];
                    addMessage(response, 'ai');
                }, 1000 + Math.random() * 2000);
            }
        });

        loadChat();

        // Matrix Rain
        let matrixColumns = [];
        const fontSize = 14;

        function initMatrix() {
            const columns = Math.floor(state.width / fontSize);
            matrixColumns = [];
            for (let i = 0; i < columns; i++) {
                matrixColumns[i] = 1;
            }
        }

        function drawMatrix() {
            mCtx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            mCtx.fillRect(0, 0, state.width, state.height);
            mCtx.fillStyle = '#0f0';
            mCtx.font = fontSize + 'px monospace';

            for (let i = 0; i < matrixColumns.length; i++) {
                const text = String.fromCharCode(Math.random() * 128);
                mCtx.fillText(text, i * fontSize, matrixColumns[i] * fontSize);

                if (matrixColumns[i] * fontSize > state.height && Math.random() > 0.975) {
                    matrixColumns[i] = 0;
                }
                matrixColumns[i]++;
            }
        }

        // Konami Code
        const terminalContent = document.getElementById('terminal-content');
        const secretCode = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
        let konamiIndex = 0;

        window.addEventListener('keydown', (e) => {
            if (e.key === secretCode[konamiIndex]) {
                konamiIndex++;
                if (konamiIndex === secretCode.length) {
                    activateSecrets();
                    konamiIndex = 0;
                }
            } else {
                konamiIndex = 0;
            }
        });

        function activateSecrets() {
            state.matrixActive = !state.matrixActive;
            matrixCanvas.style.display = state.matrixActive ? 'block' : 'none';
            if (state.matrixActive) {
                initMatrix();
                secretTerminal.classList.add('active');
                typeTerminal("ACCESSING DEEP SPACE TELEMETRY... BYPASSING NEURAL FILTERS... CONNECTION ESTABLISHED.");
            } else {
                secretTerminal.classList.remove('active');
            }
        }

        function typeTerminal(text) {
            terminalContent.textContent = '';
            let i = 0;
            const interval = setInterval(() => {
                terminalContent.textContent += text[i];
                i++;
                if (i >= text.length) clearInterval(interval);
                secretTerminal.scrollTop = secretTerminal.scrollHeight;
            }, 30);
        }
